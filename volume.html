<!DOCTYPE html>
<html lang="ja">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>カメラ見積｜立米AI Ryu兵衛</title>
  <link rel="manifest" href="manifest.json">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <link rel="stylesheet" href="assets/css/style.css">
  <style>
    /* カメラ専用スタイル */
    .header-glass {
      padding: 16px 20px;
    }

    .header-glass h1 {
      font-size: 1.25rem;
      margin: 0;
    }

    .tabs {
      display: flex;
      margin: 16px 0;
      background: var(--border-color);
      border-radius: var(--border-radius-lg);
      padding: 4px;
    }

    .tab-btn {
      flex: 1;
      text-align: center;
      padding: 10px;
      border-radius: var(--border-radius-md);
      font-size: 0.9rem;
      font-weight: 600;
      color: var(--text-muted);
      background: transparent;
      border: none;
      cursor: pointer;
      transition: background 0.2s, color 0.2s;
    }

    .tab-btn.active {
      background: var(--surface-color);
      color: var(--primary);
      box-shadow: var(--shadow-sm);
    }

    /* カメラビュー */
    .camera-container {
      position: relative;
      width: 100%;
      border-radius: var(--border-radius-lg);
      overflow: hidden;
      background: #000;
      margin-bottom: 16px;
      aspect-ratio: 3/4;
      /* スマホカメラの一般的な比率に近づける */
      display: flex;
      align-items: center;
      justify-content: center;
    }

    #camera-video {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: none;
    }

    .camera-placeholder {
      color: #fff;
      text-align: center;
      padding: 20px;
    }

    /* シャッターボタン周り */
    .camera-controls {
      display: flex;
      justify-content: space-around;
      align-items: center;
      margin-top: 16px;
    }

    .shutter-btn {
      width: 72px;
      height: 72px;
      border-radius: 50%;
      background: white;
      border: 4px solid var(--border-color);
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow: 0 4px 10px rgba(0, 0, 0, 0.1);
      transition: transform 0.1s;
    }

    .shutter-btn:active {
      transform: scale(0.9);
      background: #f0f0f0;
    }

    .shutter-inner {
      width: 54px;
      height: 54px;
      border-radius: 50%;
      background: white;
      border: 1px solid #ddd;
    }

    /* プレビュー画像リスト（横スクロール） */
    .preview-scroll {
      display: flex;
      overflow-x: auto;
      gap: 12px;
      padding-bottom: 8px;
      margin-bottom: 24px;
      /* スクロールバー非表示 (Chrome/Safari) */
    }

    .preview-scroll::-webkit-scrollbar {
      display: none;
    }

    .preview-item {
      position: relative;
      min-width: 80px;
      height: 80px;
      border-radius: var(--border-radius-md);
      overflow: hidden;
      border: 2px solid var(--border-color);
      flex-shrink: 0;
    }

    .preview-item img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    .remove-badge {
      position: absolute;
      top: -6px;
      right: -6px;
      width: 24px;
      height: 24px;
      background: var(--danger);
      color: white;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 14px;
      font-weight: bold;
      cursor: pointer;
      border: 2px solid white;
    }

    /* 結果表示エリア */
    #result-area {
      display: none;
    }

    .volume-huge {
      font-size: 3rem;
      font-weight: 800;
      color: var(--primary);
      text-align: center;
      margin: 10px 0;
    }

    /* ローディングオーバーレイ */
    .loading-overlay {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background: rgba(255, 255, 255, 0.9);
      z-index: 3000;
      display: none;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
    }

    .spinner {
      width: 50px;
      height: 50px;
      border: 4px solid var(--border-color);
      border-top-color: var(--primary);
      border-radius: 50%;
      animation: spin 1s linear infinite;
      margin-bottom: 20px;
    }

    @keyframes spin {
      to {
        transform: rotate(360deg);
      }
    }

    /* タグ型チェックボックス/ラジオボタンのスタイル */
    .tag-checkbox {
      display: inline-block;
      cursor: pointer;
    }

    .tag-checkbox input {
      display: none;
    }

    .tag-checkbox span {
      display: inline-block;
      padding: 6px 14px;
      background: var(--bg-color);
      border: 1px solid var(--border-color);
      border-radius: 20px;
      font-size: 0.85rem;
      color: var(--text-muted);
      transition: all 0.2s;
      user-select: none;
    }

    .tag-checkbox input:checked+span {
      background: var(--primary);
      color: white;
      border-color: var(--primary);
      font-weight: bold;
    }
  </style>
</head>

<body>

  <div class="header-glass">
    <h1>カメラで見積もり作成</h1>
  </div>

  <div class="container">

    <!-- タブメニュー -->
    <div class="tabs">
      <button class="tab-btn active" id="tab-btn-camera" onclick="switchTab('camera')">カメラ撮影</button>
      <button class="tab-btn" id="tab-btn-upload" onclick="switchTab('upload')">アルバムから</button>
    </div>

    <!-- ===== カメラ/アップロード領域 ===== -->
    <div id="capture-area">
      <!-- カメラ撮影ビュー -->
      <div id="tab-camera" class="tab-content" style="display: block;">
        <div class="camera-container">
          <div id="camera-placeholder" class="camera-placeholder">
            <p>カメラを起動してください</p>
            <button class="btn btn-primary mt-2" onclick="startCamera()">カメラを起動</button>
          </div>
          <video id="camera-video" autoplay playsinline></video>
          <canvas id="camera-canvas" style="display: none;"></canvas>
        </div>

        <div class="camera-controls" id="camera-controls" style="display: none;">
          <button class="btn btn-secondary btn-sm" onclick="stopCamera()">終了</button>
          <div class="shutter-btn" onclick="takePhoto()">
            <div class="shutter-inner"></div>
          </div>
          <div style="width: 50px;"></div><!-- バランス用空div -->
        </div>
      </div>

      <!-- ファイルアップロードビュー -->
      <div id="tab-upload" class="tab-content" style="display: none;">
        <div class="card text-center" style="border: 2px dashed var(--border-color); padding: 40px 20px;">
          <div style="font-size: 40px; margin-bottom: 16px;">📁</div>
          <h3 class="card-title" style="justify-content: center;">画像ファイルを選択</h3>
          <p class="small-text mb-2">スマホのアルバムから複数枚の画像を選択できます。<br>（最大20枚まで。自動で圧縮されます）</p>

          <input type="file" id="file-input" multiple accept="image/*" style="display: none;"
            onchange="handleFileSelect(event)">
          <button class="btn btn-primary" onclick="document.getElementById('file-input').click()">ファイルを選択</button>
        </div>
      </div>

      <!-- 選択済み画像のプレビュー（共通） -->
      <div class="mt-2">
        <h4>撮影した写真 (<span id="image-count">0</span> / 20枚)</h4>
        <div class="preview-scroll" id="preview-list">
          <!-- JSでプレビューが追加される -->
        </div>
      </div>

      <!-- 現況情報入力セクション -->
      <div class="card mt-2" style="padding: 16px;">
        <h4 style="margin-top: 0; margin-bottom: 12px; font-size: 1rem;">🏠 現場の状況（写真に写らない情報）</h4>

        <!-- 作業環境 -->
        <div class="form-group mb-2">
          <label style="font-weight: bold; color: var(--text-main);">搬出環境 (階段など)</label>
          <div style="display: flex; flex-wrap: wrap; gap: 8px; margin-top: 8px;">
            <label class="tag-checkbox">
              <input type="radio" name="env_stairs" value="none" checked>
              <span>なし/1F/EVあり</span>
            </label>
            <label class="tag-checkbox">
              <input type="radio" name="env_stairs" value="stairs_2f">
              <span>階段2F</span>
            </label>
            <label class="tag-checkbox">
              <input type="radio" name="env_stairs" value="stairs_3f_up">
              <span>階段3F以上</span>
            </label>
            <label class="tag-checkbox">
              <input type="checkbox" id="env_far_parking">
              <span>横付け不可(持ち出し長い)</span>
            </label>
          </div>
        </div>

        <!-- 手動追加（特処分や特定品目） -->
        <div class="form-group mb-1">
          <label style="font-weight: bold; color: var(--text-main);">確実にある特処分・大型品 (任意)</label>
          <p class="small-text mb-1" style="margin-top: 2px;">写真に写っていなくても見積もりに含めたい品目</p>
          <div style="display: flex; flex-wrap: wrap; gap: 8px;">
            <label class="tag-checkbox">
              <input type="checkbox" class="manual-item-chk" value="金庫">
              <span>金庫</span>
            </label>
            <label class="tag-checkbox">
              <input type="checkbox" class="manual-item-chk" value="マットレス">
              <span>マットレス</span>
            </label>
            <label class="tag-checkbox">
              <input type="checkbox" class="manual-item-chk" value="ソファー">
              <span>ソファー</span>
            </label>
            <label class="tag-checkbox">
              <input type="checkbox" class="manual-item-chk" value="消火器">
              <span>消火器 (危険物)</span>
            </label>
            <label class="tag-checkbox">
              <input type="checkbox" class="manual-item-chk" value="タイヤ">
              <span>タイヤ</span>
            </label>
            <label class="tag-checkbox">
              <input type="checkbox" class="manual-item-chk" value="リサイクル家電">
              <span>リサイクル家電</span>
            </label>
          </div>
        </div>
      </div>

      <!-- 計算実行ボタン -->
      <button id="submit-btn" class="btn btn-success" disabled onclick="submitImages()">
        <span style="font-size: 1.2rem;">✨ AIで立米を出力する</span>
      </button>
    </div> <!-- /capture-area -->

    <!-- ===== 結果表示領域 ===== -->
    <div id="result-area">
      <div class="card" style="border-top: 4px solid var(--primary);">
        <h2 class="text-center" style="margin-bottom: 0;">AI 計算結果</h2>
        <div class="volume-huge" id="res-volume">- ㎥</div>

        <!-- 自動計算された見積額 -->
        <div class="text-center mb-2"
          style="font-size: 1.15rem; font-weight: 600; background: rgba(52, 199, 89, 0.1); border-radius: 12px; padding: 12px; margin: 0 16px;">
          自動概算見積（料金マスタ基準）<br>
          <span style="font-size: 1.8rem; color: var(--secondary-dark);" id="res-price">- 円</span>
        </div>

        <div id="res-warnings"></div>

        <div class="d-flex justify-content-between mb-2 gap-2" id="res-actions">
          <button class="btn btn-primary flex-1" onclick="showJobForm()">案件として保存</button>
          <button class="btn btn-secondary flex-1" onclick="resetAll()">もう一度撮影</button>
        </div>
      </div>

      <!-- AI解析詳細（アコーディオン的・詳細表示） -->
      <div class="card">
        <h3 class="card-title">品目と注意事項</h3>
        <div id="res-items"></div>
        <div id="res-special" class="mt-2"></div>
      </div>
    </div>

    <!-- ===== 案件保存モーダル ===== -->
    <div class="modal-overlay" id="job-modal">
      <div class="modal-content">
        <button class="modal-close" onclick="closeJobForm()">×</button>
        <h3 class="card-title">案件情報の登録</h3>
        <p class="small-text mb-2">立米計算結果を新しい案件として保存します。</p>

        <div class="form-group">
          <label>案件・現場名</label>
          <input type="text" id="job-name" placeholder="〇〇様邸 引っ越し回収" required>
        </div>
        <div class="form-group">
          <label>お客様名</label>
          <input type="text" id="customer-name" placeholder="山田 太郎">
        </div>

        <div class="form-group">
          <label>現場住所</label>
          <div style="display: flex; gap: 8px;">
            <input type="text" id="job-address" placeholder="東京都渋谷区..." style="flex: 1;">
            <button type="button" class="btn btn-secondary" onclick="fetchGPSLocation()"
              style="margin: 0; padding: 0 12px; white-space: nowrap;">📍 現在地</button>
          </div>
          <small id="gps-status" class="small-text text-muted" style="display: block; margin-top: 4px;"></small>
        </div>

        <div class="d-flex" style="gap: 12px;">
          <div class="form-group" style="flex:1;">
            <label>作業予定日</label>
            <input type="date" id="work_date">
          </div>
          <div class="form-group" style="flex: 1;">
            <label>見積金額（円） <span style="font-size: 14px;">✎微調整可</span></label>
            <input type="number" id="price_total" placeholder="自動計算が入力されます">
          </div>
        </div>

        <button class="btn btn-primary mt-2" id="save-job-btn" onclick="saveJob()">保存して案件一覧へ</button>
      </div>
    </div><!-- /job-modal -->

  </div> <!-- /container -->

  <!-- ローディング -->
  <div class="loading-overlay" id="loading">
    <div class="spinner"></div>
    <h3 style="font-size: 1.2rem;">AI解析中...</h3>
    <p class="small-text mt-1">画像を送信して立米を計算しています。<br>しばらくお待ちください。</p>
  </div>

  <!-- ボトムナビゲーション -->
  <div class="bottom-nav">
    <a href="index.html" class="nav-item">
      <div class="nav-icon">🏠</div>
      <span>ホーム</span>
    </a>
    <a href="volume.html" class="nav-item active">
      <div class="nav-icon">📸</div>
      <span>カメラ見積</span>
    </a>
    <a href="jobs.html" class="nav-item">
      <div class="nav-icon">📁</div>
      <span>案件一覧</span>
    </a>
  </div>

  <script src="assets/js/utils.js"></script>
  <script src="assets/js/api.js"></script>
  <script>
    if (!RyubeeAPI.requireAuth()) throw new Error("Not authenticated");
    // 定数
    const MAX_FILES = 20;

    document.addEventListener('DOMContentLoaded', async () => {
      try {
        const settings = await RyubeeAPI.fetchSettings();
        if (settings) {
          localStorage.setItem('ryubee_pricing_settings', JSON.stringify(settings));
        }
      } catch (e) {
        console.warn("APIから設定を取得できませんでした。キャッシュを利用します。", e);
      }
    });

    // 状態管理
    let selectedFiles = [];
    let videoStream = null;
    let computedResult = null; // AI計算結果全体を保持
    let calculatedPrice = 0;   // マスタから算出した初期見積額

    // タブ切り替え
    function switchTab(tabId) {
      document.getElementById('tab-camera').style.display = 'none';
      document.getElementById('tab-upload').style.display = 'none';
      document.getElementById('tab-btn-camera').classList.remove('active');
      document.getElementById('tab-btn-upload').classList.remove('active');

      document.getElementById('tab-' + tabId).style.display = 'block';
      document.getElementById('tab-btn-' + tabId).classList.add('active');

      if (tabId === 'upload') {
        stopCamera();
      } else {
        // カメラタブに戻ったとき、プレースホルダーを表示する
        document.getElementById('camera-placeholder').style.display = 'block';
        document.getElementById('camera-video').style.display = 'none';
        document.getElementById('camera-controls').style.display = 'none';
      }
    }

    // カメラ操作
    async function startCamera() {
      const video = document.getElementById('camera-video');
      const placeholder = document.getElementById('camera-placeholder');
      const controls = document.getElementById('camera-controls');

      try {
        const constraints = {
          video: { facingMode: 'environment' } // 可能なら背面カメラ
        };
        videoStream = await navigator.mediaDevices.getUserMedia(constraints);
        video.srcObject = videoStream;

        placeholder.style.display = 'none';
        video.style.display = 'block';
        controls.style.display = 'flex';
      } catch (err) {
        console.error("Camera access failed:", err);
        alert("カメラの起動に失敗しました。権限が許可されていない可能性があります。");
      }
    }

    function stopCamera() {
      if (videoStream) {
        videoStream.getTracks().forEach(track => track.stop());
        videoStream = null;
      }
      document.getElementById('camera-video').style.display = 'none';
      document.getElementById('camera-controls').style.display = 'none';
      document.getElementById('camera-placeholder').style.display = 'block';
    }

    function takePhoto() {
      if (selectedFiles.length >= MAX_FILES) {
        alert("最大20枚までです。");
        return;
      }
      const video = document.getElementById('camera-video');
      const canvas = document.getElementById('camera-canvas');
      const ctx = canvas.getContext('2d');

      canvas.width = video.videoWidth;
      canvas.height = video.videoHeight;
      ctx.drawImage(video, 0, 0, canvas.width, canvas.height);

      canvas.toBlob((blob) => {
        if (!blob) return;
        const file = new File([blob], `photo_${Date.now()}.jpg`, { type: "image/jpeg" });
        selectedFiles.push(file);
        updatePreview();
      }, "image/jpeg", 0.9);

      // 軽いフラッシュエフェクト
      video.style.opacity = '0.5';
      setTimeout(() => video.style.opacity = '1', 100);
    }

    // ファイル選択
    function handleFileSelect(e) {
      const files = Array.from(e.target.files);
      for (const f of files) {
        if (selectedFiles.length < MAX_FILES) {
          selectedFiles.push(f);
        } else {
          alert(`追加できるのは最大 ${MAX_FILES} 枚までです。`);
          break;
        }
      }
      e.target.value = ''; // 選択リセット
      updatePreview();
    }

    function removeFile(index) {
      selectedFiles.splice(index, 1);
      updatePreview();
    }

    // プレビュー更新
    function updatePreview() {
      const list = document.getElementById('preview-list');
      const count = document.getElementById('image-count');
      const submitBtn = document.getElementById('submit-btn');

      count.textContent = selectedFiles.length;
      submitBtn.disabled = selectedFiles.length === 0;
      list.innerHTML = '';

      selectedFiles.forEach((file, index) => {
        const item = document.createElement('div');
        item.className = 'preview-item';

        const fr = new FileReader();
        fr.onload = (e) => {
          item.innerHTML = `
            <img src="${e.target.result}" alt="preview">
            <div class="remove-badge" onclick="removeFile(${index})" style="position:absolute; top:2px; right:2px;">×</div>
          `;
          list.appendChild(item);
        };
        fr.readAsDataURL(file);
      });
    }

    // -----------------------------------
    // API 送信（計算実行）
    // -----------------------------------
    async function submitImages() {
      if (selectedFiles.length === 0) return;

      const loading = document.getElementById('loading');
      loading.style.display = 'flex';

      try {
        const formData = new FormData();

        // --- 現場状況・手動追加アイテムの収集 ---
        const envStairs = document.querySelector('input[name="env_stairs"]:checked').value;
        const envFarParking = document.getElementById('env_far_parking').checked;

        // チェックされた手動アイテムの収集
        const manualItems = [];
        document.querySelectorAll('.manual-item-chk:checked').forEach(chk => {
          manualItems.push(chk.value);
        });

        // FormDataにテキストデータを追加
        formData.append("env_stairs", envStairs);
        formData.append("env_far_parking", envFarParking ? "true" : "false");
        formData.append("manual_items", JSON.stringify(manualItems));

        // --- 画像データの追加 ---
        for (const file of selectedFiles) {
          const compressed = await utils.compressImage(file, 1600, 1600, 0.7);
          formData.append("images", compressed, compressed.name);
        }

        // api.js経由で送信
        const data = await RyubeeAPI.estimateVolume(formData);

        computedResult = data;
        renderResult(data);

        // 画面を切り替え
        stopCamera();
        document.getElementById('capture-area').style.display = 'none';
        document.getElementById('result-area').style.display = 'block';
        window.scrollTo(0, 0);

      } catch (e) {
        alert("計算中にエラーが発生しました。\n" + e.message);
      } finally {
        loading.style.display = 'none';
      }
    }

    // -----------------------------------
    // 料金自動計算ロジック
    // -----------------------------------
    function calculateEstimatedPrice(data) {
      // ローカルストレージ内のマスタ設定をロード
      const defaultSettings = { base_price_m3: 15000, stairs_2f_price: 2000, stairs_3f_price: 4000, far_parking_price: 3000, safe_price: 15000, mattress_price: 5000, sofa_price: 3000, recycle_price: 4500 };
      const savedStr = localStorage.getItem('ryubee_pricing_settings');
      let settings = { ...defaultSettings };
      if (savedStr) {
        try { settings = { ...defaultSettings, ...JSON.parse(savedStr) }; } catch (e) { }
      }

      let total = 0;
      // 立米単価
      if (data.total_volume_m3) total += data.total_volume_m3 * settings.base_price_m3;

      // オプション
      const envStairs = document.querySelector('input[name="env_stairs"]:checked').value;
      if (envStairs === 'stairs_2f') total += settings.stairs_2f_price;
      if (envStairs === 'stairs_3f_up') total += settings.stairs_3f_price;
      if (document.getElementById('env_far_parking').checked) total += settings.far_parking_price;

      // 手動アイテム
      document.querySelectorAll('.manual-item-chk:checked').forEach(chk => {
        const val = chk.value;
        if (val === '金庫') total += settings.safe_price;
        if (val === 'マットレス') total += settings.mattress_price;
        if (val === 'ソファー') total += settings.sofa_price;
        if (val === 'リサイクル家電') total += settings.recycle_price;
      });

      // AI検知アイテムから特例品が来た場合はAPIレスポンスを参照してプラスするロジックも追加可能
      // ここでは簡略化のため手動チェックボックスを中心に計算します

      calculatedPrice = Math.floor(total);
      return calculatedPrice;
    }

    // -----------------------------------
    // 結果表示
    // -----------------------------------
    function renderResult(data) {
      // 全体立米
      document.getElementById('res-volume').textContent = data.total_volume_m3 != null ? `${data.total_volume_m3} ㎥` : "- ㎥";

      // 自動見積額の計算と表示
      const price = calculateEstimatedPrice(data);
      document.getElementById('res-price').textContent = `${price.toLocaleString()} 円`;

      // 警告・注意事項
      const warnEl = document.getElementById('res-warnings');
      if (Array.isArray(data.warnings) && data.warnings.length > 0) {
        warnEl.innerHTML = `<div class="alert alert-warning mb-2"><strong>⚠️ 確認事項：</strong><ul style="margin:4px 0 0; padding-left:20px;">` +
          data.warnings.map(w => `<li>${utils.escapeHtml(w)}</li>`).join('`</ul></div>');
      } else {
        warnEl.innerHTML = '';
      }

      // 特処分関係
      const specialEl = document.getElementById('res-special');
      let specialHtml = "";
      if (data.special_disposal) {
        const sp = data.special_disposal;
        if (sp.recycle_items && sp.recycle_items.length > 0) {
          specialHtml += `<span class="badge badge-warning" style="margin:2px;">家電リサイクル: ${utils.escapeHtml(sp.recycle_items.join(","))}</span>`;
        }
        if (sp.hard_disposal_items && sp.hard_disposal_items.length > 0) {
          specialHtml += `<span class="badge badge-primary" style="margin:2px;">特処分: ${utils.escapeHtml(sp.hard_disposal_items.join(","))}</span>`;
        }
        if (sp.dangerous_items && sp.dangerous_items.length > 0) {
          specialHtml += `<span class="badge badge-success" style="margin:2px;">危険物: ${utils.escapeHtml(sp.dangerous_items.join(","))}</span>`;
        }
      }
      specialEl.innerHTML = specialHtml;

      // 品目リスト（簡易テーブル）
      const itemsEl = document.getElementById('res-items');
      if (Array.isArray(data.items) && data.items.length > 0) {
        let rows = "";
        data.items.forEach(item => {
          rows += `
            <tr style="border-bottom: 1px solid #eee;">
              <td style="padding: 8px 4px;">${utils.escapeHtml(item.category)}</td>
              <td style="padding: 8px 4px; text-align:right;">${item.quantity ?? 1}</td>
              <td style="padding: 8px 4px; text-align:right;">${item.volume_total_m3 ?? "-"}㎥</td>
            </tr>
          `;
        });
        itemsEl.innerHTML = `
          <table style="width: 100%; border-collapse: collapse; font-size:0.9rem;">
            <tr style="border-bottom: 2px solid #ccc;">
              <th style="text-align:left; padding:4px;">品目</th>
              <th style="text-align:right; padding:4px;">数</th>
              <th style="text-align:right; padding:4px;">立米</th>
            </tr>
            ${rows}
          </table>
        `;
      } else {
        itemsEl.innerHTML = "<p class='small-text'>品目データはありません。</p>";
      }
    }

    // -----------------------------------
    // 案件として保存（モーダル＆API呼び出し）
    // -----------------------------------
    function showJobForm() {
      document.getElementById('job-name').value = ""; // クリア
      document.getElementById('customer-name').value = "";
      document.getElementById('job-address').value = "";
      document.getElementById('work_date').value = "";
      document.getElementById('gps-status').textContent = "";
      // AI結果から事前に入力できる項目
      document.getElementById('price_total').value = calculatedPrice > 0 ? calculatedPrice : "";

      document.getElementById('job-modal').style.display = 'flex';
    }

    function closeJobForm() {
      document.getElementById('job-modal').style.display = 'none';
    }

    async function saveJob() {
      if (!computedResult || !computedResult.job_id) {
        alert("保存対象の案件IDが見つかりません。");
        return;
      }

      const jobId = computedResult.job_id;
      const jobName = document.getElementById('job-name').value.trim();
      if (!jobName) {
        alert("案件名を入力してください");
        return;
      }

      const customerName = document.getElementById('customer-name').value.trim();
      const address = document.getElementById('job-address').value.trim();
      const workDate = document.getElementById('work_date').value;
      const priceTotal = document.getElementById('price_total').value;

      // 環境情報や手動アイテムを notes (備考) に追加しておく（API側でカラムがあればそちらに）
      const envStairs = document.querySelector('input[name="env_stairs"]:checked').value;
      const envFarParking = document.getElementById('env_far_parking').checked;

      const manualItems = [];
      document.querySelectorAll('.manual-item-chk:checked').forEach(chk => {
        manualItems.push(chk.value);
      });

      let autoNotes = "";
      if (envStairs !== "none") autoNotes += `[${envStairs === 'stairs_2f' ? '階段2F' : '階段3F以上'}] `;
      if (envFarParking) autoNotes += `[横付け不可] `;
      if (manualItems.length > 0) autoNotes += `\n特例品目: ${manualItems.join(', ')}`;

      // Assuming there's no separate 'notes' input in the new form, combine autoNotes with existing notes if any.
      // If a 'notes' input is added later, this logic might need adjustment.
      const combinedNotes = autoNotes.trim();

      const payload = {
        job_name: jobName,
        customer_name: customerName,
        address: address,
        work_date: workDate,
        price_total: Number(priceTotal) || null,
        notes: combinedNotes
      };

      const btn = document.getElementById('save-job-btn');
      btn.disabled = true;
      btn.textContent = "保存中...";

      try {
        let customerId = null;
        if (customerName) {
          try {
            const cPayload = {
              name: customerName,
              address: address || "",
              phone: "",
              email: "",
              form_data: JSON.stringify({ source: "AI見積生成" })
            };
            const newCus = await RyubeeAPI.createCustomer(cPayload);
            if (newCus && newCus.id) customerId = newCus.id;
          } catch (ce) { console.warn("Customer auto-create failed", ce); }
        }
        if (customerId) payload.customer_id = customerId;

        await RyubeeAPI.updateJob(jobId, payload);
        alert("✅ 案件を保存しました！");
        // 保存成功したら案件一覧へ遷移（その案件の詳細を開く想定）
        window.location.href = `jobs.html?id=${jobId}`;
      } catch (e) {
        alert("保存に失敗しました：" + e.message);
        btn.disabled = false;
        btn.textContent = "保存して案件一覧へ";
      }
    }

    function resetAll() {
      computedResult = null;
      selectedFiles = [];
      updatePreview();
      document.getElementById('result-area').style.display = 'none';
      document.getElementById('capture-area').style.display = 'block';
    }

    // === GPS位置情報取得処理 ===
    function fetchGPSLocation() {
      const statusEl = document.getElementById('gps-status');

      if (!navigator.geolocation) {
        statusEl.textContent = "お使いのブラウザは位置情報をサポートしていません。";
        statusEl.style.color = "red";
        return;
      }

      statusEl.textContent = "位置情報を取得中...";
      statusEl.style.color = "var(--text-muted)";

      navigator.geolocation.getCurrentPosition(
        async (position) => {
          const lat = position.coords.latitude;
          const lon = position.coords.longitude;

          try {
            // 簡易的にReverse Geocoding (Nominatim APIを使用, 商用時はGoogle Maps API等に変更が必要)
            const response = await fetch(`https://nominatim.openstreetmap.org/reverse?format=json&lat=${lat}&lon=${lon}`);
            const data = await response.json();

            if (data && data.display_name) {
              // 日本向けの住所表記に近い形にパース（簡易）
              let address = data.display_name;
              if (data.address) {
                const a = data.address;
                address = `${a.province || ''}${a.city || ''}${a.suburb || ''}${a.neighbourhood || ''}${a.road || ''}`;
              }
              document.getElementById('job-address').value = address.replace(/日本,?\s*/, '').trim();
              statusEl.textContent = "住所を自動入力しました。";
              statusEl.style.color = "var(--primary)";
            } else {
              statusEl.textContent = `緯度:${lat.toFixed(4)}, 経度:${lon.toFixed(4)}`;
            }
          } catch (e) {
            statusEl.textContent = "住所の変換に失敗しました。緯度経度のみ取得。";
            console.error(e);
          }
        },
        (error) => {
          statusEl.style.color = "red";
          switch (error.code) {
            case error.PERMISSION_DENIED:
              statusEl.textContent = "位置情報の取得が拒否されました。";
              break;
            case error.POSITION_UNAVAILABLE:
              statusEl.textContent = "位置情報が利用できません。";
              break;
            case error.TIMEOUT:
              statusEl.textContent = "タイムアウトしました。";
              break;
            default:
              statusEl.textContent = "エラーが発生しました。";
              break;
          }
        },
        { enableHighAccuracy: true, timeout: 5000, maximumAge: 0 }
      );
    }

    // Service Worker Registration
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('./sw.js').catch(err => console.log('SW reg failed:', err));
      });
    }

  </script>
