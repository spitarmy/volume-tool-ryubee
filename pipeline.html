<!DOCTYPE html>
<html lang="ja">

<head>
    <meta charset="UTF-8">
    <meta name="viewport"
        content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>営業パイプライン — Ryu兵衛 山文SaaS</title>
    <meta name="apple-mobile-web-app-capable" content="yes">
    <link rel="stylesheet" href="assets/css/style.css">
    <style>
        .pipeline-header {
            background: #FFFFFF;
            padding: 30px 24px 20px;
            border-bottom: 1px solid var(--border);
        }

        .pipeline-header h1 {
            font-size: 1.8rem;
            margin-bottom: 6px;
        }

        .header-actions {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .pipeline-container {
            display: flex;
            overflow-x: auto;
            gap: 16px;
            padding: 20px 16px 120px;
            scroll-snap-type: x mandatory;
            -webkit-overflow-scrolling: touch;
        }

        .pipeline-container::-webkit-scrollbar {
            height: 10px;
        }

        .pipeline-container::-webkit-scrollbar-track {
            background: rgba(0, 0, 0, 0.04);
            border-radius: var(--r-pill);
            margin: 0 16px;
        }

        .pipeline-container::-webkit-scrollbar-thumb {
            background-color: var(--text-tertiary);
            border-radius: var(--r-pill);
        }

        .pipeline-container::-webkit-scrollbar-thumb:hover {
            background-color: var(--text-secondary);
        }

        .pipeline-column {
            min-width: 240px;
            max-width: 320px;
            flex-shrink: 0;
            background: var(--bg-secondary);
            border-radius: var(--r-xl);
            padding: 16px;
            scroll-snap-align: start;
        }

        .col-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 12px;
            padding-bottom: 10px;
            border-bottom: 2px solid var(--border);
        }

        .col-title {
            font-size: 0.9rem;
            font-weight: 700;
        }

        .col-count {
            background: var(--blue-light);
            color: var(--blue-dark);
            font-size: 0.75rem;
            font-weight: 700;
            padding: 3px 8px;
            border-radius: 20px;
        }

        .pipeline-card {
            background: #fff;
            border-radius: var(--r-md);
            padding: 14px;
            margin-bottom: 10px;
            box-shadow: var(--shadow-xs);
            border: 1px solid var(--border);
            cursor: grab;
            transition: transform 0.15s, box-shadow 0.15s;
        }

        .pipeline-card:active {
            transform: scale(0.97);
            box-shadow: var(--shadow-md);
        }

        .pipeline-card.dragging {
            opacity: 0.5;
        }

        .pc-customer {
            font-weight: 700;
            font-size: 1rem;
            margin-bottom: 2px;
            color: var(--text-primary);
            line-height: 1.3;
        }

        .pc-name {
            font-size: 0.82rem;
            color: var(--text-secondary);
            margin-bottom: 6px;
            font-weight: 500;
        }

        .pc-assignee {
            font-size: 0.78rem;
            color: var(--text-tertiary);
            margin-top: 6px;
        }

        .pc-dates {
            display: flex;
            gap: 8px;
            font-size: 0.68rem;
            color: var(--text-tertiary);
            margin: 4px 0 6px;
        }

        .pc-dates span {
            white-space: nowrap;
        }

        .pc-type {
            background: var(--bg-secondary);
            color: var(--text-secondary);
        }

        .pc-type.estate {
            background: #FDF2F8;
            color: #BE185D;
        }

        .pc-type.store_removal {
            background: #EFF6FF;
            color: #1D4ED8;
        }

        .pc-type.welfare {
            background: #F0FDF4;
            color: #15803D;
        }

        .pc-type.general_waste {
            background: var(--orange-light);
            color: #C06000;
        }

        .pc-type.large_waste {
            background: #FEF3C7;
            color: #92400E;
        }

        .pc-type.industrial_waste {
            background: #EDE9FE;
            color: #6D28D9;
        }

        .stage-btn {
            border: none;
            background: none;
            cursor: pointer;
            font-size: 0.75rem;
            color: var(--blue);
            font-weight: 600;
            padding: 4px 8px;
            border-radius: 8px;
        }

        .stage-btn:hover {
            background: var(--blue-light);
        }

        .stage-btn:active {
            background: var(--blue-light);
            transform: scale(0.95);
        }

        .drop-zone {
            min-height: 60px;
            border: 2px dashed transparent;
            border-radius: var(--r-md);
            transition: border-color 0.2s;
        }

        .drop-zone.over {
            border-color: var(--blue);
            background: rgba(14, 165, 233, 0.05);
        }

        .pc-comments-badge {
            display: inline-flex;
            align-items: center;
            gap: 3px;
            font-size: 0.72rem;
            color: var(--text-tertiary);
            margin-left: 8px;
        }

        .pc-deal-amounts {
            display: flex;
            gap: 6px;
            align-items: center;
            margin-top: 6px;
            font-size: 0.78rem;
        }

        .pc-deal-amounts .estimated {
            color: var(--text-tertiary);
            text-decoration: line-through;
        }

        .pc-deal-amounts .final {
            color: var(--green-dark);
            font-weight: 700;
        }

        .pc-deal-amounts .diff-tag {
            font-size: 0.68rem;
            font-weight: 700;
            padding: 1px 5px;
            border-radius: 4px;
        }

        .pc-deal-amounts .diff-discount {
            background: var(--red-light);
            color: var(--red);
        }

        .pc-deal-amounts .diff-surcharge {
            background: var(--green-light);
            color: var(--green-dark);
        }

        /* Detail Drawer */
        .detail-drawer-overlay {
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.36);
            backdrop-filter: blur(10px);
            display: none;
            z-index: 3000;
            align-items: flex-end;
            justify-content: center;
        }

        .detail-drawer-overlay.show,
        .modal-overlay.show {
            display: flex;
        }

        .detail-drawer {
            background: #fff;
            border-radius: var(--r-xl) var(--r-xl) 0 0;
            width: 100%;
            max-width: 600px;
            max-height: 85vh;
            overflow-y: auto;
            padding: 20px;
            animation: sheetUp 0.3s cubic-bezier(0.25, 1, 0.5, 1);
        }

        .comment-thread {
            margin-top: 16px;
            border-top: 1px solid var(--border);
            padding-top: 12px;
        }

        .comment-item {
            padding: 10px 0;
            border-bottom: 1px solid var(--border);
        }

        .comment-item:last-child {
            border-bottom: none;
        }

        .comment-meta {
            font-size: 0.78rem;
            color: var(--text-tertiary);
            margin-bottom: 4px;
        }

        .comment-text {
            font-size: 0.9rem;
            line-height: 1.5;
        }

        .comment-input-row {
            display: flex;
            gap: 8px;
            margin-top: 12px;
        }

        .comment-input-row input {
            flex: 1;
            padding: 10px 14px;
            border-radius: var(--r-md);
            border: 1px solid var(--border);
            font-size: 0.9rem;
        }

        .comment-input-row button {
            white-space: nowrap;
        }

        /* ── Drawer Redesign ── */
        .drawer-customer-name {
            font-size: 1.4rem;
            font-weight: 800;
            color: var(--text-primary);
            margin-bottom: 4px;
            line-height: 1.3;
        }

        .drawer-section {
            margin-top: 16px;
            padding: 14px;
            background: var(--bg-secondary);
            border-radius: var(--r-md);
        }

        .drawer-section-title {
            font-size: 0.82rem;
            font-weight: 700;
            color: var(--text-secondary);
            margin-bottom: 10px;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .instruction-preview {
            display: block;
            background: linear-gradient(135deg, #E3F2FD, #BBDEFB);
            border-radius: var(--r-md);
            padding: 20px 16px;
            text-decoration: none;
            color: #1565C0;
            font-weight: 700;
            font-size: 0.95rem;
            text-align: center;
            border: 1px solid #90CAF9;
            transition: transform 0.15s, box-shadow 0.15s;
            position: relative;
            overflow: hidden;
        }

        .instruction-preview:active {
            transform: scale(0.97);
        }

        .instruction-preview .preview-hint {
            display: block;
            font-size: 0.72rem;
            font-weight: 500;
            color: #64B5F6;
            margin-top: 6px;
        }

        .instruction-preview .preview-lines {
            display: flex;
            flex-direction: column;
            gap: 4px;
            margin-top: 10px;
            padding: 0 20px;
        }

        .instruction-preview .preview-line {
            height: 3px;
            background: rgba(21, 101, 192, 0.15);
            border-radius: 2px;
        }

        .photo-category-tabs {
            display: flex;
            gap: 0;
            margin-bottom: 10px;
            border-radius: 8px;
            overflow: hidden;
            border: 1px solid var(--border);
        }

        .photo-cat-tab {
            flex: 1;
            padding: 8px 0;
            text-align: center;
            font-size: 0.82rem;
            font-weight: 700;
            cursor: pointer;
            border: none;
            background: #fff;
            color: var(--text-secondary);
            transition: all 0.2s;
        }

        .photo-cat-tab.active {
            background: var(--blue);
            color: #fff;
        }

        .photo-grid {
            display: flex;
            gap: 8px;
            overflow-x: auto;
            padding-bottom: 4px;
        }

        .photo-grid::-webkit-scrollbar {
            height: 4px;
        }

        .photo-grid::-webkit-scrollbar-thumb {
            background: var(--border);
            border-radius: 4px;
        }

        .photo-thumb {
            position: relative;
            flex-shrink: 0;
        }

        .photo-thumb img {
            width: 90px;
            height: 90px;
            object-fit: cover;
            border-radius: 10px;
            border: 1px solid var(--border);
        }

        .photo-thumb .photo-del {
            position: absolute;
            top: -6px;
            right: -6px;
            background: #EF4444;
            color: white;
            border: 2px solid #fff;
            border-radius: 50%;
            width: 22px;
            height: 22px;
            font-size: 10px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 1px 4px rgba(0,0,0,0.2);
        }

        .photo-add-btn {
            width: 90px;
            height: 90px;
            border-radius: 10px;
            border: 2px dashed var(--border);
            background: transparent;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-direction: column;
            gap: 2px;
            cursor: pointer;
            font-size: 1.4rem;
            color: var(--text-tertiary);
            flex-shrink: 0;
            transition: border-color 0.2s, background 0.2s;
        }

        .photo-add-btn:hover {
            border-color: var(--blue);
            background: rgba(14, 165, 233, 0.04);
        }

        .photo-add-btn span {
            font-size: 0.65rem;
            font-weight: 600;
        }

        .amount-card {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 14px;
            background: #fff;
            border-radius: var(--r-md);
            border: 1px solid var(--border);
            cursor: pointer;
            transition: box-shadow 0.15s;
            text-decoration: none;
            color: inherit;
        }

        .amount-card:active {
            box-shadow: var(--shadow-md);
        }

        .amount-value {
            font-size: 1.5rem;
            font-weight: 800;
            color: var(--text-primary);
        }

        .amount-label {
            font-size: 0.72rem;
            color: var(--text-tertiary);
        }

        .amount-tap-hint {
            font-size: 0.72rem;
            color: var(--blue);
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 4px;
        }

        .drawer-actions {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
            margin-top: 16px;
        }

        .drawer-actions .btn {
            padding: 14px 10px;
            font-size: 0.9rem;
            font-weight: 700;
            border-radius: var(--r-md);
        }
    </style>

    <meta name="theme-color" content="#1A237E">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Ryu兵衛">

</head>

<body>

    <header class="pipeline-header" style="display:flex; justify-content:space-between; align-items:center;">
        <div>
            <h1 style="margin-bottom:0;">📊 営業パイプライン</h1>
            <p style="color: var(--text-secondary); font-size: 0.9rem; margin-top:4px; margin-bottom:0;">案件の進捗を可視化 —
                ドラッグで移動</p>
        </div>
        <div style="display:flex; gap:8px; flex-direction:column; align-items:flex-end;">
            <a href="sales-calendar.html" class="btn btn-sm btn-secondary"
                style="width:auto; padding:6px 12px; font-size:0.8rem; text-decoration:none;">🤝 営業カレンダー</a>
            <button class="btn btn-sm btn-primary" style="width:auto; padding:8px 16px;" onclick="openNewJobModal()">➕
                新規追加</button>
        </div>
    </header>

    <div
        style="padding: 10px 20px 0px 20px; background:var(--glass-bg); border-bottom: 0.5px solid rgba(0, 0, 0, 0.06);">
        <input type="text" id="plSearch" placeholder="🔍 案件名・お客様名でスキャン..." oninput="filterPipeline()"
            style="width:100%; padding:10px 14px; border-radius:10px; border:1px solid var(--border); font-size:0.95rem; background:#fff; margin-bottom: 12px;">

        <!-- スタッフ絞り込みタブ -->
        <div style="display:flex; justify-content:space-between; align-items:center;">
            <div id="staffTabs"
                style="display:flex; gap:8px; overflow-x:auto; padding-bottom:10px; flex: 1; -webkit-overflow-scrolling: touch; scrollbar-width: none;">
                <button class="btn btn-xs btn-primary" style="flex-shrink:0;" onclick="filterByStaff('all')">全て</button>
            </div>
            <label
                style="display:flex; align-items:center; gap:6px; font-size:0.82rem; font-weight:600; cursor:pointer; color:var(--text-secondary); margin-left:16px; margin-bottom:10px; white-space:nowrap;"
                title="完了・不成約を非表示">
                <input type="checkbox" id="toggleHideDone" onchange="filterBoardVisibility()"> 完了/不成約を隠す
            </label>
        </div>
    </div>
    <div class="pipeline-container" id="pipelineContainer">
        <p style="text-align:center; width:100%; color:var(--text-tertiary); margin-top:40px;">読み込み中...</p>
    </div>

    <!-- Detail Drawer -->
    <div class="detail-drawer-overlay" id="drawerOverlay" onclick="closeDrawer(event)">
        <div class="detail-drawer" id="drawerContent">
            <div class="modal-drag-handle"></div>
            <div id="drawerBody"></div>
        </div>
    </div>

    <!-- New Job Modal -->
    <div class="modal-overlay" id="newJobModal" onclick="if(event.target===this) this.classList.remove('show')">
        <div class="modal-content" style="max-height: 85vh; max-width: 500px;">
            <div class="modal-drag-handle"></div>
            <button class="modal-close"
                onclick="document.getElementById('newJobModal').classList.remove('show')">✕</button>
            <h3 style="margin-bottom:20px; font-size:1.3rem;">✨ 新規案件 手動追加</h3>
            <div class="form-group">
                <label>案件・お客様名</label>
                <input type="text" id="njName" placeholder="例: 山田様邸 片付け">
            </div>
            <div class="form-group">
                <label>種別</label>
                <select id="njType">
                    <option value="general_waste">一般ゴミ</option>
                    <option value="industrial_waste">産業廃棄物</option>
                    <option value="large_waste">大型ゴミ等</option>
                </select>
            </div>
            <div class="form-group">
                <label>ステージ</label>
                <select id="njStage">
                    <option value="inquiry">問合せ</option>
                    <option value="estimate">見積</option>
                    <option value="negotiation">商談</option>
                    <option value="contract">契約</option>
                    <option value="waiting_manifest">マニフェスト待ち</option>
                </select>
            </div>
            <div class="form-group" style="margin-bottom:24px;">
                <label>見込金額</label>
                <input type="number" id="njAmount" placeholder="未定の場合は空欄" style="width:100%;">
            </div>
            <div class="form-group" style="margin-bottom:24px;">
                <label>担当営業</label>
                <select id="njAssignedTo">
                    <option value="">未設定</option>
                </select>
            </div>
            <button class="btn btn-primary" onclick="submitNewJob()">保存する</button>
        </div>
    </div>

    <!-- Bottom Nav -->
    <nav class="bottom-nav">
        <a href="index.html" class="nav-item"><span class="nav-icon">🏠</span><span>ホーム</span></a>
        <a href="pipeline.html" class="nav-item active"><span class="nav-icon">📊</span><span>パイプライン</span></a>
        <a href="billing.html" class="nav-item"><span class="nav-icon">💰</span><span>請求</span></a>
        <a href="customers.html" class="nav-item"><span class="nav-icon">🏢</span><span>顧客</span></a>
        <a href="company-data.html" class="nav-item"><span class="nav-icon">📁</span><span>データ</span></a>
    </nav>

    <script src="assets/js/utils.js"></script>
    <script src="assets/js/api.js"></script>
    <script>
        if (!RyubeeAPI.requireAuth()) throw new Error("Not authenticated");

        const STAGES = [
            { key: 'lost', label: '不成約', emoji: '❌' },
            { key: 'inquiry', label: '問合せ', emoji: '📩' },
            { key: 'negotiation', label: '商談', emoji: '🤝' },
            { key: 'estimate', label: '見積', emoji: '📝' },
            { key: 'contract', label: '契約', emoji: '📋' },
            { key: 'scheduled', label: '作業予定', emoji: '📅' },
            { key: 'waiting_manifest', label: 'マニフェスト待ち', emoji: '📜' },
            { key: 'completed', label: '完了', emoji: '✅' },
        ];

        const TYPE_LABELS = {
            general_waste: '一般ゴミ',
            industrial_waste: '産業廃棄物',
            large_waste: '大型ゴミ等'
        };

        let pipelineData = {};
        let allCustomers = [];
        let currentStaffFilter = 'all';

        function renderStaffTabs() {
            const allNames = new Set();
            for (const stage of Object.values(pipelineData)) {
                for (const job of stage) {
                    if (job.created_by_name && job.created_by_name.trim() !== 'Unknown') allNames.add(job.created_by_name.trim());
                    if (job.assigned_to_name && job.assigned_to_name.trim() !== 'Unknown') allNames.add(job.assigned_to_name.trim());
                }
            }

            const staffList = Array.from(allNames).sort();
            const tabsDiv = document.getElementById('staffTabs');

            let html = `<button class="btn btn-xs ${currentStaffFilter === 'all' ? 'btn-primary' : 'btn-secondary'}" style="flex-shrink:0;" onclick="filterByStaff('all')">全て</button>`;

            staffList.forEach(name => {
                const isActive = currentStaffFilter === name;
                html += `<button class="btn btn-xs ${isActive ? 'btn-primary' : 'btn-secondary'}" style="flex-shrink:0;" onclick="filterByStaff('${utils.escapeHtml(name).replace(/'/g, "\\'")}')">${utils.escapeHtml(name)}</button>`;
            });

            tabsDiv.innerHTML = html;
        }

        function filterByStaff(name) {
            currentStaffFilter = name;
            renderStaffTabs();
            renderPipeline();
            filterPipeline();
        }

        document.addEventListener('DOMContentLoaded', loadPipeline);

        async function loadPipeline() {
            try {
                const [pData, cData] = await Promise.all([
                    RyubeeAPI.fetchPipeline(),
                    RyubeeAPI.fetchCustomers()
                ]);
                pipelineData = pData;
                allCustomers = cData;
                renderStaffTabs();
                renderPipeline();
            } catch (e) {
                document.getElementById('pipelineContainer').innerHTML =
                    `<div class="alert alert-danger" style="width:100%">${e.message}</div>`;
            }
        }

        function renderPipeline() {
            const container = document.getElementById('pipelineContainer');
            container.innerHTML = '';

            STAGES.forEach(stage => {
                let jobs = pipelineData[stage.key] || [];

                if (currentStaffFilter !== 'all') {
                    jobs = jobs.filter(j =>
                        (j.created_by_name || '').trim() === currentStaffFilter ||
                        (j.assigned_to_name || '').trim() === currentStaffFilter
                    );
                }

                const col = document.createElement('div');
                col.className = 'pipeline-column';
                col.dataset.stage = stage.key;

                col.innerHTML = `
                    <div class="col-header">
                        <span class="col-title">${stage.emoji} ${stage.label}</span>
                        <span class="col-count">${jobs.length}</span>
                    </div>
                    <div class="drop-zone" data-stage="${stage.key}">
                        ${jobs.map(j => renderCard(j, stage.key)).join('')}
                    </div>
                `;
                container.appendChild(col);
            });

            // ドラッグ＆ドロップのセットアップ
            setupDragDrop();
            filterBoardVisibility();
        }

        function filterBoardVisibility() {
            const hideDone = document.getElementById('toggleHideDone')?.checked;
            document.querySelectorAll('.pipeline-column').forEach(col => {
                const stage = col.dataset.stage;
                if (hideDone && (stage === 'completed' || stage === 'lost')) {
                    col.style.display = 'none';
                } else {
                    col.style.display = '';
                }
            });
        }

        function renderCard(job, currentStage) {
            const typeClass = job.job_type || 'other';
            const typeLabel = TYPE_LABELS[job.job_type] || 'その他';
            const displayPrice = job.final_price || job.estimated_price || job.price_total || 0;
            const price = displayPrice ? `¥${displayPrice.toLocaleString()}` : '–';
            const stageIdx = STAGES.findIndex(s => s.key === currentStage);
            const nextStage = stageIdx < STAGES.length - 1 ? STAGES[stageIdx + 1] : null;
            const prevStage = stageIdx > 0 ? STAGES[stageIdx - 1] : null;

            const createdText = job.created_at ? new Date(job.created_at).toLocaleDateString('ja-JP', { month: 'numeric', day: 'numeric', hour: '2-digit', minute: '2-digit' }) : '';
            const updatedText = job.updated_at ? new Date(job.updated_at).toLocaleDateString('ja-JP', { month: 'numeric', day: 'numeric', hour: '2-digit', minute: '2-digit' }) : '';

        function setupDragDrop() {
            document.querySelectorAll('.pipeline-card').forEach(card => {
                card.addEventListener('dragstart', e => {
                    e.dataTransfer.setData('text/plain', card.dataset.jobId);
                    card.classList.add('dragging');
                });
                card.addEventListener('dragend', () => card.classList.remove('dragging'));
            });

            document.querySelectorAll('.drop-zone').forEach(zone => {
                zone.addEventListener('dragover', e => {
                    e.preventDefault();
                    zone.classList.add('over');
                });
                zone.addEventListener('dragleave', () => zone.classList.remove('over'));
                zone.addEventListener('drop', async e => {
                    e.preventDefault();
                    zone.classList.remove('over');
                    const jobId = e.dataTransfer.getData('text/plain');
                    const newStage = zone.dataset.stage;
                    await moveJob(jobId, newStage);
                });
            });
        }

        function filterPipeline() {
            const q = document.getElementById('plSearch').value.toLowerCase();
            document.querySelectorAll('.pipeline-card').forEach(card => {
                const text = card.textContent.toLowerCase();
                if (text.includes(q)) {

                } else {
                    card.style.display = 'none';
                }
            });
        }

            const amount = document.getElementById('njAmount').value;

        let _cachedCustomers = null;

        async function linkCustomerToJob(jobId) {
            const sel = document.getElementById('customerLinkSelect');
            const val = sel ? sel.value : '';

            if (!val) {
                alert('顧客を選択してください');
                return;
            }

            try {
                if (val === '__new__') {
                    // Find current job name for default
                    let job = null;
                    for (const jobs of Object.values(pipelineData)) {
                        job = jobs.find(j => j.job_id === jobId);
                        if (job) break;
                    }
                    const custName = job ? job.customer_name : '';
                    const name = prompt('新規顧客の「お客様名 / 法人名」を入力してください:', custName);
                    if (!name) return;

                    const cPayload = {
                        name: name,
                        address: '',
                        phone: '',
                        email: '',
                        form_data: JSON.stringify({ source: 'パイプラインからの本登録' })
                    };
                    const newCus = await RyubeeAPI.createCustomer(cPayload);
                    if (!newCus || !newCus.id) throw new Error('顧客作成に失敗しました');

                    await RyubeeAPI.updateJob(jobId, { customer_id: newCus.id, customer_name: name });
                    showToast(`✅ "${name}" 様を登録して紐づけました`);
                } else {
                    // Link to existing customer
                    const cust = _cachedCustomers.find(c => c.id === val);
                    const custName = cust ? cust.name : '';
                    await RyubeeAPI.updateJob(jobId, { customer_id: val, customer_name: custName });
                    showToast(`✅ "${custName}" 様を紐づけました`);
                }

                _cachedCustomers = null; // clear cache
                document.getElementById('drawerOverlay').classList.remove('show');
                loadPipeline();
            } catch (e) {
                alert('エラーが発生しました: ' + e.message);
            }
        }

        async function postJobComment(jobId) {

            const content = input.value.trim();
            if (!content) return;
            try {
                await RyubeeAPI.postComment(jobId, content);
                input.value = '';
                openJobDetail(jobId);
                showToast('✅ コメントを投稿しました');
            } catch (e) { alert('エラー: ' + e.message); }
        }

        async function convertToInvoice(jobId) {
            let job = null;
            for (const jobs of Object.values(pipelineData)) {
                job = jobs.find(j => j.job_id === jobId);
                if (job) break;
            }
            if (!job) return;

            const currentPrice = job.final_price || job.estimated_price || job.price_total || 0;
            const newPriceStr = prompt('発行する請求書の最終金額(税抜)を入力してください。変更がない場合はそのままOKを押してください。', currentPrice);
            if (newPriceStr === null) return; // cancelled

            const newPrice = parseInt(newPriceStr, 10);
            if (isNaN(newPrice)) { alert('正しい数値を入力してください'); return; }

            if (!confirm(`請求金額を ${newPrice.toLocaleString()}円 で発行してよろしいですか？\n（業者の締め払い設定に基づいて支払期限が自動設定されます）`)) return;

            try {
                // Update final price on Job if changed
                if (newPrice !== currentPrice) {
                    job.final_price = newPrice;
                    await RyubeeAPI.updateJob(jobId, { final_price: newPrice });
                }

                const inv = await RyubeeAPI.createInvoiceFromEstimate(jobId);
                showToast(`✅ 請求書を発行しました (税込¥${inv.total_amount.toLocaleString()})`);
                document.getElementById('drawerOverlay').classList.remove('show');
                setTimeout(() => { window.location.href = 'billing.html'; }, 1500);
            } catch (e) { alert('エラー: ' + e.message); }
        }

        async function collectCash(jobId) {
            let job = null;
            for (const jobs of Object.values(pipelineData)) {
                job = jobs.find(j => j.job_id === jobId);
                if (job) break;
            }
            if (!job) return;

            const currentPrice = job.final_price || job.estimated_price || job.price_total || 0;
            const newPriceStr = prompt('現金で受け取る最終金額(税抜)を入力してください。変更がない場合はそのままOKを押してください。', currentPrice);
            if (newPriceStr === null) return;

            const newPrice = parseInt(newPriceStr, 10);
            if (isNaN(newPrice)) { alert('正しい数値を入力してください'); return; }

            if (!confirm(`現金 ${newPrice.toLocaleString()}円(税抜) を受け取りましたか？\n（請求書が自動生成され、入金済みとして処理されます）`)) return;

            try {
                if (newPrice !== currentPrice) {
                    await RyubeeAPI.updateJob(jobId, { final_price: newPrice });
                }

                const inv = await RyubeeAPI.createInvoiceAndCollectCash(jobId);
                showToast(`✅ 現金回収を記録しました (税込¥${inv.total_amount.toLocaleString()})`);
                document.getElementById('drawerOverlay').classList.remove('show');
                loadPipeline();
            } catch (e) { alert('エラー: ' + e.message); }
        }

        async function updateJobFormData(jobId) {
            let job = null;
            for (const jobs of Object.values(pipelineData)) {
                job = jobs.find(j => j.job_id === jobId);
                if (job) break;
            }
            if (!job) return;

            let fd = {};
            try { fd = JSON.parse(job.form_data || "{}"); } catch (e) { }

            fd.subcontractor_name = document.getElementById('jobSubcontractor').value.trim();
            fd.vehicle_number = document.getElementById('jobVehicleNum').value.trim();
            const newFormData = JSON.stringify(fd);
            job.form_data = newFormData;

            try {
                await RyubeeAPI.updateJob(jobId, { form_data: newFormData });
                showToast("✅ 配車情報を保存しました");
            } catch (e) { alert("保存エラー"); }
        }

        // 回収前/回収後タブ切替
        function switchPhotoTab(tab, btn) {
            document.querySelectorAll('.photo-cat-tab').forEach(t => t.classList.remove('active'));
            btn.classList.add('active');
            document.getElementById('photosBeforeGrid').style.display = tab === 'before' ? 'flex' : 'none';
            document.getElementById('photosAfterGrid').style.display = tab === 'after' ? 'flex' : 'none';
        }

        // カテゴリ別写真アップロード
        async function uploadCategoryPhotos(event, jobId, category) {
            const files = Array.from(event.target.files);
            if (!files.length) return;

            showToast(`📸 ${files.length}枚の写真をアップロード中...`);

            try {
                // 先にフルデータ取得
                const job = await RyubeeAPI.fetchJob(jobId);
                let fd = {};
                try { fd = JSON.parse(job.form_data || "{}"); } catch (e) { }
                let currentBeforeCount = fd.photos_before_count || 0;

                // アップロード
                const result = await RyubeeAPI.uploadJobPhotos(jobId, files);

                // 回収前の場合、beforeCountを更新
                if (category === 'before') {
                    currentBeforeCount += files.length;
                }
                // 回収後の場合はそのまま（末尾に追加される）

                fd.photos_before_count = currentBeforeCount;
                await RyubeeAPI.updateJob(jobId, { form_data: JSON.stringify(fd) });

                showToast(`📸 ${result.uploaded}枚の写真を保存しました`);
                await loadPipeline();
                openJobDetail(jobId);
            } catch (err) { alert("アップロード失敗: " + err.message); }
        }

        // 旧互換用
        async function uploadJobPhotos(event, jobId) {
            return uploadCategoryPhotos(event, jobId, 'after');
        }

        async function deleteJobPhoto(jobId, index) {
            if (!confirm("この写真を削除しますか？")) return;

            try {
                const job = await RyubeeAPI.fetchJob(jobId);
                let pArr = Array.isArray(job.photos) ? [...job.photos] : [];
                try { if (typeof job.photos === 'string') pArr = JSON.parse(job.photos); } catch (e) { }

                // form_dataのbeforeCountも調整
                let fd = {};
                try { fd = JSON.parse(job.form_data || "{}"); } catch (e) { }
                let beforeCount = fd.photos_before_count || 0;

                // 削除対象が回収前写真の範囲内ならbeforeCountを減らす
                if (index < beforeCount) {
                    fd.photos_before_count = beforeCount - 1;
                    await RyubeeAPI.updateJob(jobId, { form_data: JSON.stringify(fd) });
                }

                pArr.splice(index, 1);
                await RyubeeAPI.updateJob(jobId, { photos: JSON.stringify(pArr) });
                await loadPipeline();
                openJobDetail(jobId);
            } catch (err) { alert("削除失敗: " + err.message); }
        }
    </script>
    <script>
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('sw.js').catch(e => console.log('SW registration failed:', e));
        }
    </script>
