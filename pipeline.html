<!DOCTYPE html>
<html lang="ja">

<head>
    <meta charset="UTF-8">
    <meta name="viewport"
        content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>営業パイプライン — Ryu兵衛 山文SaaS</title>
    <meta name="apple-mobile-web-app-capable" content="yes">
    <link rel="stylesheet" href="assets/css/style.css">
    <style>
        .pipeline-header {
            background: #FFFFFF;
            padding: 30px 24px 20px;
            border-bottom: 1px solid var(--border);
        }

        .pipeline-header h1 {
            font-size: 1.8rem;
            margin-bottom: 6px;
        }

        .pipeline-container {
            display: flex;
            overflow-x: auto;
            gap: 16px;
            padding: 20px 16px 120px;
            scroll-snap-type: x mandatory;
            -webkit-overflow-scrolling: touch;
        }

        .pipeline-container::-webkit-scrollbar {
            height: 10px;
        }

        .pipeline-container::-webkit-scrollbar-track {
            background: rgba(0, 0, 0, 0.04);
            border-radius: var(--r-pill);
            margin: 0 16px;
        }

        .pipeline-container::-webkit-scrollbar-thumb {
            background-color: var(--text-tertiary);
            border-radius: var(--r-pill);
        }

        .pipeline-container::-webkit-scrollbar-thumb:hover {
            background-color: var(--text-secondary);
        }

        .pipeline-column {
            min-width: 280px;
            max-width: 320px;
            flex-shrink: 0;
            background: var(--bg-secondary);
            border-radius: var(--r-xl);
            padding: 16px;
            scroll-snap-align: start;
        }

        .col-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 12px;
            padding-bottom: 10px;
            border-bottom: 2px solid var(--border);
        }

        .col-title {
            font-size: 0.9rem;
            font-weight: 700;
        }

        .col-count {
            background: var(--blue-light);
            color: var(--blue-dark);
            font-size: 0.75rem;
            font-weight: 700;
            padding: 3px 8px;
            border-radius: 20px;
        }

        .pipeline-card {
            background: #fff;
            border-radius: var(--r-md);
            padding: 14px;
            margin-bottom: 10px;
            box-shadow: var(--shadow-xs);
            border: 1px solid var(--border);
            cursor: grab;
            transition: transform 0.15s, box-shadow 0.15s;
        }

        .pipeline-card:active {
            transform: scale(0.97);
            box-shadow: var(--shadow-md);
        }

        .pipeline-card.dragging {
            opacity: 0.5;
        }

        .pc-name {
            font-weight: 700;
            font-size: 0.95rem;
            margin-bottom: 4px;
        }

        .pc-customer {
            font-size: 0.82rem;
            color: var(--text-secondary);
            margin-bottom: 6px;
        }

        .pc-bottom {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .pc-price {
            font-weight: 700;
            color: var(--blue-dark);
            font-size: 0.9rem;
        }

        .pc-type {
            font-size: 0.7rem;
            font-weight: 600;
            padding: 2px 8px;
            border-radius: 10px;
            background: var(--bg-secondary);
            color: var(--text-secondary);
        }

        .pc-type.estate {
            background: #FDF2F8;
            color: #BE185D;
        }

        .pc-type.store_removal {
            background: #EFF6FF;
            color: #1D4ED8;
        }

        .pc-type.welfare {
            background: #F0FDF4;
            color: #15803D;
        }

        .pc-type.general_waste {
            background: var(--orange-light);
            color: #C06000;
        }

        .pc-assignee {
            font-size: 0.75rem;
            color: var(--text-tertiary);
            margin-top: 6px;
        }

        .stage-btn {
            border: none;
            background: none;
            cursor: pointer;
            font-size: 0.75rem;
            color: var(--blue);
            font-weight: 600;
            padding: 4px 8px;
            border-radius: 8px;
        }

        .stage-btn:hover {
            background: var(--blue-light);
        }

        .drop-zone {
            min-height: 60px;
            border: 2px dashed transparent;
            border-radius: var(--r-md);
            transition: border-color 0.2s;
        }

        .drop-zone.over {
            border-color: var(--blue);
            background: rgba(14, 165, 233, 0.05);
        }

        .pc-comments-badge {
            display: inline-flex;
            align-items: center;
            gap: 3px;
            font-size: 0.72rem;
            color: var(--text-tertiary);
            margin-left: 8px;
        }

        .pc-deal-amounts {
            display: flex;
            gap: 6px;
            align-items: center;
            margin-top: 6px;
            font-size: 0.78rem;
        }

        .pc-deal-amounts .estimated {
            color: var(--text-tertiary);
            text-decoration: line-through;
        }

        .pc-deal-amounts .final {
            color: var(--green-dark);
            font-weight: 700;
        }

        .pc-deal-amounts .diff-tag {
            font-size: 0.68rem;
            font-weight: 700;
            padding: 1px 5px;
            border-radius: 4px;
        }

        .pc-deal-amounts .diff-discount {
            background: var(--red-light);
            color: var(--red);
        }

        .pc-deal-amounts .diff-surcharge {
            background: var(--green-light);
            color: var(--green-dark);
        }

        /* Detail Drawer */
        .detail-drawer-overlay {
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.36);
            backdrop-filter: blur(10px);
            display: none;
            z-index: 3000;
            align-items: flex-end;
            justify-content: center;
        }

        .detail-drawer-overlay.show,
        .modal-overlay.show {
            display: flex;
        }

        .detail-drawer {
            background: #fff;
            border-radius: var(--r-xl) var(--r-xl) 0 0;
            width: 100%;
            max-width: 600px;
            max-height: 85vh;
            overflow-y: auto;
            padding: 20px;
            animation: sheetUp 0.3s cubic-bezier(0.25, 1, 0.5, 1);
        }

        .comment-thread {
            margin-top: 16px;
            border-top: 1px solid var(--border);
            padding-top: 12px;
        }

        .comment-item {
            padding: 10px 0;
            border-bottom: 1px solid var(--border);
        }

        .comment-item:last-child {
            border-bottom: none;
        }

        .comment-meta {
            font-size: 0.78rem;
            color: var(--text-tertiary);
            margin-bottom: 4px;
        }

        .comment-text {
            font-size: 0.9rem;
            line-height: 1.5;
        }

        .comment-input-row {
            display: flex;
            gap: 8px;
            margin-top: 12px;
        }

        .comment-input-row input {
            flex: 1;
            padding: 10px 14px;
            border-radius: var(--r-md);
            border: 1px solid var(--border);
            font-size: 0.9rem;
        }

        .comment-input-row button {
            white-space: nowrap;
        }
    </style>
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#1A237E">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Ryu兵衛">
    <link rel="apple-touch-icon" href="assets/icons/icon-192.png">
</head>

<body>

    <header class="pipeline-header" style="display:flex; justify-content:space-between; align-items:center;">
        <div>
            <h1 style="margin-bottom:0;">📊 営業パイプライン</h1>
            <p style="color: var(--text-secondary); font-size: 0.9rem; margin-top:4px; margin-bottom:0;">案件の進捗を可視化 —
                ドラッグで移動</p>
        </div>
        <button class="btn btn-sm btn-primary" style="width:auto; padding:8px 16px;" onclick="openNewJobModal()">➕
            新規追加</button>
    </header>

    <div
        style="padding: 10px 20px 0px 20px; background:var(--glass-bg); border-bottom: 0.5px solid rgba(0, 0, 0, 0.06);">
        <input type="text" id="plSearch" placeholder="🔍 案件名・お客様名でスキャン..." oninput="filterPipeline()"
            style="width:100%; padding:10px 14px; border-radius:10px; border:1px solid var(--border); font-size:0.95rem; background:#fff; margin-bottom: 12px;">

        <!-- スタッフ絞り込みタブ -->
        <div style="display:flex; justify-content:space-between; align-items:center;">
            <div id="staffTabs"
                style="display:flex; gap:8px; overflow-x:auto; padding-bottom:10px; flex: 1; -webkit-overflow-scrolling: touch; scrollbar-width: none;">
                <button class="btn btn-xs btn-primary" style="flex-shrink:0;" onclick="filterByStaff('all')">全て</button>
            </div>
            <label
                style="display:flex; align-items:center; gap:6px; font-size:0.82rem; font-weight:600; cursor:pointer; color:var(--text-secondary); margin-left:16px; margin-bottom:10px; white-space:nowrap;"
                title="完了・不成約を非表示">
                <input type="checkbox" id="toggleHideDone" onchange="filterBoardVisibility()"> 完了/不成約を隠す
            </label>
        </div>
    </div>
    <div class="pipeline-container" id="pipelineContainer">
        <p style="text-align:center; width:100%; color:var(--text-tertiary); margin-top:40px;">読み込み中...</p>
    </div>

    <!-- Detail Drawer -->
    <div class="detail-drawer-overlay" id="drawerOverlay" onclick="closeDrawer(event)">
        <div class="detail-drawer" id="drawerContent">
            <div class="modal-drag-handle"></div>
            <div id="drawerBody"></div>
        </div>
    </div>

    <!-- New Job Modal -->
    <div class="modal-overlay" id="newJobModal" onclick="if(event.target===this) this.classList.remove('show')">
        <div class="modal-content" style="max-height: 85vh; max-width: 500px;">
            <div class="modal-drag-handle"></div>
            <button class="modal-close"
                onclick="document.getElementById('newJobModal').classList.remove('show')">✕</button>
            <h3 style="margin-bottom:20px; font-size:1.3rem;">✨ 新規案件 手動追加</h3>
            <div class="form-group">
                <label>案件・お客様名</label>
                <input type="text" id="njName" placeholder="例: 山田様邸 片付け">
            </div>
            <div class="form-group">
                <label>種別</label>
                <select id="njType">
                    <option value="general_waste">一般ゴミ</option>
                    <option value="industrial_waste">産業廃棄物</option>
                    <option value="large_waste">大型ゴミ等</option>
                </select>
            </div>
            <div class="form-group">
                <label>ステージ</label>
                <select id="njStage">
                    <option value="inquiry">問合せ</option>
                    <option value="estimate">見積</option>
                    <option value="negotiation">商談</option>
                    <option value="contract">契約</option>
                    <option value="waiting_manifest">マニフェスト待ち</option>
                </select>
            </div>
            <div class="form-group" style="margin-bottom:24px;">
                <label>見込金額</label>
                <input type="number" id="njAmount" placeholder="未定の場合は空欄" style="width:100%;">
            </div>
            <button class="btn btn-primary" onclick="submitNewJob()">保存する</button>

            <!-- Bottom Nav -->
            <nav class="bottom-nav">
                <a href="index.html" class="nav-item"><span class="nav-icon">🏠</span><span>ホーム</span></a>
                <a href="pipeline.html" class="nav-item active"><span class="nav-icon">📊</span><span>パイプライン</span></a>
                <a href="billing.html" class="nav-item"><span class="nav-icon">💰</span><span>請求</span></a>
                <a href="customers.html" class="nav-item"><span class="nav-icon">🏢</span><span>顧客</span></a>
                <a href="company-data.html" class="nav-item"><span class="nav-icon">📁</span><span>データ</span></a>
            </nav>

            <script src="assets/js/utils.js"></script>
            <script src="assets/js/api.js"></script>
            <script>
                if (!RyubeeAPI.requireAuth()) throw new Error("Not authenticated");

                const STAGES = [
                    { key: 'inquiry', label: '問合せ', emoji: '📩' },
                    { key: 'estimate', label: '見積', emoji: '📝' },
                    { key: 'negotiation', label: '商談', emoji: '🤝' },
                    { key: 'contract', label: '契約', emoji: '📋' },
                    { key: 'scheduled', label: '作業予定', emoji: '📅' },
                    { key: 'waiting_manifest', label: 'マニフェスト待ち', emoji: '📜' },
                    { key: 'completed', label: '完了', emoji: '✅' },
                    { key: 'lost', label: '不成約', emoji: '❌' },
                ];

                const TYPE_LABELS = {
                    general_waste: '一般ゴミ',
                    industrial_waste: '産業廃棄物',
                    large_waste: '大型ゴミ等'
                };

                let pipelineData = {};
                let allCustomers = [];
                let currentStaffFilter = 'all';

                function renderStaffTabs() {
                    const allNames = new Set();
                    for (const stage of Object.values(pipelineData)) {
                        for (const job of stage) {
                            if (job.created_by_name && job.created_by_name.trim() !== 'Unknown') allNames.add(job.created_by_name.trim());
                            if (job.assigned_to_name && job.assigned_to_name.trim() !== 'Unknown') allNames.add(job.assigned_to_name.trim());
                        }
                    }

                    const staffList = Array.from(allNames).sort();
                    const tabsDiv = document.getElementById('staffTabs');

                    let html = `<button class="btn btn-xs ${currentStaffFilter === 'all' ? 'btn-primary' : 'btn-secondary'}" style="flex-shrink:0;" onclick="filterByStaff('all')">全て</button>`;

                    staffList.forEach(name => {
                        const isActive = currentStaffFilter === name;
                        html += `<button class="btn btn-xs ${isActive ? 'btn-primary' : 'btn-secondary'}" style="flex-shrink:0;" onclick="filterByStaff('${utils.escapeHtml(name).replace(/'/g, "\\'")}')">${utils.escapeHtml(name)}</button>`;
                    });

                    tabsDiv.innerHTML = html;
                }

                function filterByStaff(name) {
                    currentStaffFilter = name;
                    renderStaffTabs();
                    renderPipeline();
                    filterPipeline();
                }

                document.addEventListener('DOMContentLoaded', loadPipeline);

                async function loadPipeline() {
                    try {
                        const [pData, cData] = await Promise.all([
                            RyubeeAPI.fetchPipeline(),
                            RyubeeAPI.fetchCustomers()
                        ]);
                        pipelineData = pData;
                        allCustomers = cData;
                        renderStaffTabs();
                        renderPipeline();
                    } catch (e) {
                        document.getElementById('pipelineContainer').innerHTML =
                            `<div class="alert alert-danger" style="width:100%">${e.message}</div>`;
                    }
                }

                function renderPipeline() {
                    const container = document.getElementById('pipelineContainer');
                    container.innerHTML = '';

                    STAGES.forEach(stage => {
                        let jobs = pipelineData[stage.key] || [];

                        if (currentStaffFilter !== 'all') {
                            jobs = jobs.filter(j =>
                                (j.created_by_name || '').trim() === currentStaffFilter ||
                                (j.assigned_to_name || '').trim() === currentStaffFilter
                            );
                        }

                        const col = document.createElement('div');
                        col.className = 'pipeline-column';
                        col.dataset.stage = stage.key;

                        col.innerHTML = `
                    <div class="col-header">
                        <span class="col-title">${stage.emoji} ${stage.label}</span>
                        <span class="col-count">${jobs.length}</span>
                    </div>
                    <div class="drop-zone" data-stage="${stage.key}">
                        ${jobs.map(j => renderCard(j, stage.key)).join('')}
                    </div>
                `;
                        container.appendChild(col);
                    });

                    // ドラッグ＆ドロップのセットアップ
                    setupDragDrop();
                    filterBoardVisibility();
                }

                function filterBoardVisibility() {
                    const hideDone = document.getElementById('toggleHideDone')?.checked;
                    document.querySelectorAll('.pipeline-column').forEach(col => {
                        const stage = col.dataset.stage;
                        if (hideDone && (stage === 'completed' || stage === 'lost')) {
                            col.style.display = 'none';
                        } else {
                            col.style.display = 'flex'; // `.pipeline-column` is naturally a flex column
                        }
                    });
                }

                function renderCard(job, currentStage) {
                    const typeClass = job.job_type || 'other';
                    const typeLabel = TYPE_LABELS[job.job_type] || 'その他';
                    const price = job.price_total ? `¥${job.price_total.toLocaleString()}` : '–';
                    const stageIdx = STAGES.findIndex(s => s.key === currentStage);
                    const nextStage = stageIdx < STAGES.length - 2 ? STAGES[stageIdx + 1] : null;
                    const prevStage = stageIdx > 0 ? STAGES[stageIdx - 1] : null;

                    const createdText = job.created_at ? new Date(job.created_at).toLocaleDateString('ja-JP', { month: 'numeric', day: 'numeric', hour: '2-digit', minute: '2-digit' }) : '';
                    const updatedText = job.updated_at ? new Date(job.updated_at).toLocaleDateString('ja-JP', { month: 'numeric', day: 'numeric', hour: '2-digit', minute: '2-digit' }) : '';

                    const cust = allCustomers.find(c => c.id === job.customer_id) || {};
                    let fd = {};
                    try { fd = JSON.parse(cust.form_data || "{}"); } catch (e) { }
                    const yamaNum = fd.yamabun_management_number || '';

                    return `
                <div class="pipeline-card" draggable="true" data-job-id="${job.job_id}" data-stage="${currentStage}" onclick="openJobDetail('${job.job_id}')">
                    <div class="pc-name">
                        ${utils.escapeHtml(job.job_name || '案件')}
                        ${job.comment_count ? `<span class="pc-comments-badge">💬 ${job.comment_count}</span>` : ''}
                        ${(Array.isArray(job.photos) ? job.photos.length : 0) > 0 ? `<span class="pc-comments-badge">📷 ${Array.isArray(job.photos) ? job.photos.length : 0}</span>` : ''}
                    </div>
                    ${yamaNum ? `<div style="font-size:0.75rem; font-weight:700; color:var(--primary); margin:2px 0 4px;">🎫 管理番号: ${utils.escapeHtml(yamaNum)}</div>` : ''}
                    <div class="pc-customer">👤 ${utils.escapeHtml(job.customer_name || '未設定')}</div>
                    
                    <div style="font-size:0.65rem; color:var(--text-tertiary); margin:4px 0;">
                        受付: ${createdText} | 更新: ${updatedText}
                    </div>

                    <div class="pc-bottom">
                        <span class="pc-price">${price}</span>
                        <span class="pc-type ${typeClass}">${typeLabel}</span>
                    </div>
                    ${(job.estimated_price && job.final_price && job.estimated_price !== job.final_price) ? `
                        <div class="pc-deal-amounts">
                            <span class="estimated">¥${job.estimated_price.toLocaleString()}</span>
                            <span>→</span>
                            <span class="final">¥${job.final_price.toLocaleString()}</span>
                            ${job.discount_amount ? `<span class="diff-tag diff-discount">-¥${job.discount_amount.toLocaleString()}</span>` : ''}
                            ${job.surcharge_amount ? `<span class="diff-tag diff-surcharge">+¥${job.surcharge_amount.toLocaleString()}</span>` : ''}
                        </div>
                    ` : ''}
                    ${job.assigned_to_name ? `<div class="pc-assignee">担当: ${utils.escapeHtml(job.assigned_to_name)}</div>` : ''}
                    <div style="display:flex; justify-content:space-between; margin-top:8px;">
                        ${prevStage ? `<button class="stage-btn" onclick="event.stopPropagation();moveJob('${job.job_id}', '${prevStage.key}')">← ${prevStage.label}</button>` : '<div></div>'}
                        ${nextStage ? `<button class="stage-btn" onclick="event.stopPropagation();moveJob('${job.job_id}', '${nextStage.key}')">${nextStage.label} →</button>` : '<div></div>'}
                    </div>
                </div>
            `;
                }

                function setupDragDrop() {
                    document.querySelectorAll('.pipeline-card').forEach(card => {
                        card.addEventListener('dragstart', e => {
                            e.dataTransfer.setData('text/plain', card.dataset.jobId);
                            card.classList.add('dragging');
                        });
                        card.addEventListener('dragend', () => card.classList.remove('dragging'));
                    });

                    document.querySelectorAll('.drop-zone').forEach(zone => {
                        zone.addEventListener('dragover', e => {
                            e.preventDefault();
                            zone.classList.add('over');
                        });
                        zone.addEventListener('dragleave', () => zone.classList.remove('over'));
                        zone.addEventListener('drop', async e => {
                            e.preventDefault();
                            zone.classList.remove('over');
                            const jobId = e.dataTransfer.getData('text/plain');
                            const newStage = zone.dataset.stage;
                            await moveJob(jobId, newStage);
                        });
                    });
                }

                function filterPipeline() {
                    const q = document.getElementById('plSearch').value.toLowerCase();
                    document.querySelectorAll('.pipeline-card').forEach(card => {
                        const text = card.textContent.toLowerCase();
                        if (text.includes(q)) {
                            card.style.display = 'block';
                        } else {
                            card.style.display = 'none';
                        }
                    });
                }

                async function moveJob(jobId, newStage) {
                    try {
                        await RyubeeAPI.updateJobStage(jobId, newStage);
                        await loadPipeline();
                        showToast(`✅ ステージを「${STAGES.find(s => s.key === newStage)?.label}」に変更`);
                    } catch (e) { alert('更新エラー: ' + e.message); }
                }

                function showToast(msg) {
                    const t = document.createElement('div');
                    t.textContent = msg;
                    t.style.cssText = 'position:fixed;bottom:90px;left:50%;transform:translateX(-50%);background:#34C759;color:#fff;padding:10px 20px;border-radius:20px;font-weight:600;z-index:9999;';
                    document.body.appendChild(t);
                    setTimeout(() => t.remove(), 2500);
                }

                async function submitNewJob() {
                    const name = document.getElementById('njName').value.trim();
                    const type = document.getElementById('njType').value;
                    const stage = document.getElementById('njStage').value;
                    const amount = document.getElementById('njAmount').value;

                    if (!name) { alert("案件名を入力してください"); return; }

                    try {
                        // 手動でのジョブ作成（API）
                        await RyubeeAPI.createJob({
                            job_name: name,
                            customer_name: name, // 顧客名と案件名を同じにして簡略化
                            job_type: type,
                            pipeline_stage: stage,
                            estimated_price: amount ? parseInt(amount, 10) : 0,
                            source: 'manual'
                        });
                        document.getElementById('newJobModal').classList.remove('show');
                        showToast("✅ 新規案件を手動追加しました");
                        loadPipeline();
                        // フォームリセット
                        document.getElementById('njName').value = '';
                        document.getElementById('njAmount').value = '';
                    } catch (e) {
                        alert("追加エラー: " + e.message);
                    }
                }

                function openNewJobModal() {
                    document.getElementById('newJobModal').classList.add('show');
                }

                // ── Detail Drawer (Comments + Deal Amounts) ───
                function closeDrawer(e) {
                    if (e && e.target !== document.getElementById('drawerOverlay')) return;
                    document.getElementById('drawerOverlay').classList.remove('show');
                }

                async function openJobDetail(jobId) {
                    const drawer = document.getElementById('drawerOverlay');
                    const body = document.getElementById('drawerBody');

                    // Find job in pipeline data
                    let job = null;
                    for (const jobs of Object.values(pipelineData)) {
                        const found = jobs.find(j => j.job_id === jobId);
                        if (found) { job = found; break; }
                    }
                    if (!job) return;

                    // Load comments
                    let comments = [];
                    try { comments = await RyubeeAPI.fetchComments(jobId); } catch (e) { }

                    const est = job.estimated_price || job.price_total || 0;
                    const fin = job.final_price || 0;
                    const disc = job.discount_amount || 0;
                    const surcharge = job.surcharge_amount || 0;

                    // Form Data for Subcontractor
                    let fd = {};
                    try { fd = JSON.parse(job.form_data || "{}"); } catch (e) { }

                    // Photos parsing
                    let photos = [];
                    try { photos = JSON.parse(job.photos || "[]"); } catch (e) { }

                    body.innerHTML = `
                <div style="display:flex;justify-content:space-between;align-items:flex-start;">
                    <h3 style="font-size:1.2rem;font-weight:700;margin-bottom:4px;flex:1;">${utils.escapeHtml(job.job_name || '案件')}</h3>
                    <a href="jobs.html?id=${jobId}" style="flex-shrink:0;margin-left:8px;padding:4px 10px;font-size:0.72rem;background:#FEE2E2;color:#DC2626;border:1px solid #FECACA;border-radius:8px;text-decoration:none;font-weight:700;white-space:nowrap;">✏️ フル編集</a>
                </div>
                <p class="small-text">
                    👤 ${utils.escapeHtml(job.customer_name || '未設定')} | ${TYPE_LABELS[job.job_type] || 'その他'}
                    ${job.address ? `<br>📍 ${utils.escapeHtml(job.address)} <a href="https://www.google.com/maps/search/?api=1&query=${encodeURIComponent(job.address)}" target="_blank" style="margin-left:4px;text-decoration:none;font-size:0.75rem;background:#E2E8F0;padding:2px 6px;border-radius:4px;color:var(--text-primary);">🗺 マップ</a>` : ''}
                    ${!job.customer_id ? `
                        <br><div id="customerLinkSection" style="margin-top:8px;">
                            <div style="display:flex;gap:6px;align-items:center;">
                                <select id="customerLinkSelect" style="flex:1;padding:6px;border-radius:6px;border:1px solid var(--border);font-size:0.8rem;">
                                    <option value="">📋 既存の顧客を選択...</option>
                                    <option value="__new__">➕ 新規顧客として登録</option>
                                </select>
                                <button class="btn btn-xs btn-primary" style="white-space:nowrap;" onclick="linkCustomerToJob('${jobId}')">紐づけ</button>
                            </div>
                            <p style="font-size:0.68rem;color:var(--text-tertiary);margin:4px 0 0;">⚠️ 請求書の発行には顧客の紐づけが必要です</p>
                        </div>
                    ` : `
                        <br><span class="badge badge-success" style="margin-top:8px;display:inline-block;">✅ 顧客登録済</span>
                    `}
                </p>

                <div style="margin-top:16px;padding:12px;background:var(--bg-secondary);border-radius:var(--r-md);">
                    <h4 style="font-size:0.85rem;color:var(--text-secondary);margin-bottom:8px;">🚚 配車・協力業者アサイン</h4>
                    <div style="display:flex;gap:8px;">
                        <input type="text" id="jobSubcontractor" placeholder="協力業者名 (例: 山本文夫)" value="${utils.escapeHtml(fd.subcontractor_name || '')}" style="flex:1;font-size:0.85rem;padding:6px;border-radius:6px;border:1px solid var(--border);" onchange="updateJobFormData('${jobId}')">
                        <input type="text" id="jobVehicleNum" placeholder="号車 (例: 3号車)" value="${utils.escapeHtml(fd.vehicle_number || '')}" style="width:100px;font-size:0.85rem;padding:6px;border-radius:6px;border:1px solid var(--border);" onchange="updateJobFormData('${jobId}')">
                    </div>
                </div>

                <div style="margin-top:16px;">
                    <a href="jobs.html?id=${jobId}&mode=preview" class="btn btn-sm btn-outline" style="width:100%;text-align:center;padding:12px;display:block;">👁 案件の詳細を確認する（プレビュー）</a>
                </div>

                <div style="margin-top:12px;padding:12px;background:var(--bg-secondary);border-radius:var(--r-md);">
                    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px;">
                        <h4 style="font-size:0.85rem;color:var(--text-secondary);margin:0;">📸 現場写真</h4>
                        <label class="btn btn-xs btn-primary" style="cursor:pointer;margin:0;">追加
                            <input type="file" style="display:none;" accept="image/*" multiple onchange="uploadJobPhotos(event, '${jobId}')">
                        </label>
                    </div>
                    <div id="jobPhotosGrid" style="display:flex;gap:8px;overflow-x:auto;">
                        ${photos.length ? photos.map((p, i) => `
                            <div style="position:relative;flex-shrink:0;">
                                <img src="${p}" style="width:80px;height:80px;object-fit:cover;border-radius:8px;border:1px solid var(--border);">
                                <button onclick="deleteJobPhoto('${jobId}', ${i})" style="position:absolute;top:-5px;right:-5px;background:red;color:white;border:none;border-radius:50%;width:20px;height:20px;font-size:10px;cursor:pointer;">✕</button>
                            </div>
                        `).join('') : '<p class="small-text">写真はありません</p>'}
                    </div>
                </div>

                <div style="margin-top:12px;padding:12px;background:var(--bg-secondary);border-radius:var(--r-md);">
                    <h4 style="font-size:0.85rem;color:var(--text-secondary);margin-bottom:10px;">💰 金額トラッキング</h4>
                    <div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;">
                        <div><span class="small-text">見積金額</span><br><strong>¥${est.toLocaleString()}</strong></div>
                        <div><span class="small-text">成約金額</span><br><strong style="color:var(--green-dark);">¥${fin ? fin.toLocaleString() : '–'}</strong></div>
                        ${disc ? `<div><span class="small-text">割引</span><br><strong style="color:var(--red);">-¥${disc.toLocaleString()}</strong></div>` : ''}
                        ${surcharge ? `<div><span class="small-text">追加料金</span><br><strong style="color:var(--blue);">+¥${surcharge.toLocaleString()}</strong></div>` : ''}
                    </div>
                    ${job.price_notes ? `<p class="small-text" style="margin-top:8px;">📝 ${utils.escapeHtml(job.price_notes)}</p>` : ''}
                </div>

                <div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:16px;">
                    <a href="invoice.html?id=${jobId}" target="_blank" class="btn btn-secondary" style="text-align:center;text-decoration:none;font-size:0.85rem;padding:10px;">📄 見積書を発行</a>
                    <a href="packer-sheet.html?job_id=${jobId}" target="_blank" class="btn btn-secondary" style="text-align:center;text-decoration:none;font-size:0.85rem;padding:10px;">🖨 パッカー指示書</a>
                    <button class="btn btn-success" onclick="convertToInvoice('${jobId}')" style="font-size:0.85rem;padding:10px;">🧾 請求書を発行</button>
                    <button class="btn btn-warning" onclick="collectCash('${jobId}')" style="font-size:0.85rem;padding:10px;">💴 現金を回収</button>
                </div>

                <div class="comment-thread">
                    <h4 style="font-size:0.85rem;color:var(--text-secondary);margin-bottom:8px;">💬 コメント (${comments.length})</h4>
                    <div id="commentList">
                        ${comments.length ? comments.map(c => `
                            <div class="comment-item">
                                <div class="comment-meta">${utils.escapeHtml(c.user_name)} ・ ${c.created_at ? new Date(c.created_at).toLocaleString('ja-JP') : ''}</div>
                                <div class="comment-text">${utils.escapeHtml(c.content)}</div>
                            </div>
                        `).join('') : '<p class="small-text">コメントなし</p>'}
                    </div>
                    <div class="comment-input-row">
                        <input type="text" id="commentInput" placeholder="コメントを入力..." onkeypress="if(event.key==='Enter')postJobComment('${jobId}')">
                        <button class="btn btn-xs btn-primary" onclick="postJobComment('${jobId}')">送信</button>
                    </div>
                </div>
            `;
                    drawer.classList.add('show');
                    // Populate customer dropdown if job has no customer_id
                    if (!job.customer_id) {
                        populateCustomerDropdown();
                    }
                }

                async function registerCustomerFromPipeline(jobId, custName) {
                    // Legacy fallback — now handled by linkCustomerToJob
                    await linkCustomerToJob(jobId);
                }

                let _cachedCustomers = null;
                async function populateCustomerDropdown() {
                    const sel = document.getElementById('customerLinkSelect');
                    if (!sel) return;
                    if (!_cachedCustomers) {
                        try { _cachedCustomers = await RyubeeAPI.fetchCustomers(); } catch (e) { _cachedCustomers = []; }
                    }
                    _cachedCustomers.forEach(c => {
                        const opt = document.createElement('option');
                        opt.value = c.id;
                        opt.textContent = `${c.name}${c.address ? ' — ' + c.address : ''}`;
                        sel.appendChild(opt);
                    });
                }

                async function linkCustomerToJob(jobId) {
                    const sel = document.getElementById('customerLinkSelect');
                    const val = sel ? sel.value : '';

                    if (!val) {
                        alert('顧客を選択してください');
                        return;
                    }

                    try {
                        if (val === '__new__') {
                            // Find current job name for default
                            let job = null;
                            for (const jobs of Object.values(pipelineData)) {
                                job = jobs.find(j => j.job_id === jobId);
                                if (job) break;
                            }
                            const custName = job ? job.customer_name : '';
                            const name = prompt('新規顧客の「お客様名 / 法人名」を入力してください:', custName);
                            if (!name) return;

                            const cPayload = {
                                name: name,
                                address: '',
                                phone: '',
                                email: '',
                                form_data: JSON.stringify({ source: 'パイプラインからの本登録' })
                            };
                            const newCus = await RyubeeAPI.createCustomer(cPayload);
                            if (!newCus || !newCus.id) throw new Error('顧客作成に失敗しました');

                            await RyubeeAPI.updateJob(jobId, { customer_id: newCus.id, customer_name: name });
                            showToast(`✅ "${name}" 様を登録して紐づけました`);
                        } else {
                            // Link to existing customer
                            const cust = _cachedCustomers.find(c => c.id === val);
                            const custName = cust ? cust.name : '';
                            await RyubeeAPI.updateJob(jobId, { customer_id: val, customer_name: custName });
                            showToast(`✅ "${custName}" 様を紐づけました`);
                        }

                        _cachedCustomers = null; // clear cache
                        document.getElementById('drawerOverlay').classList.remove('show');
                        loadPipeline();
                    } catch (e) {
                        alert('エラーが発生しました: ' + e.message);
                    }
                }

                async function postJobComment(jobId) {
                    const input = document.getElementById('commentInput');
                    const content = input.value.trim();
                    if (!content) return;
                    try {
                        await RyubeeAPI.postComment(jobId, content);
                        input.value = '';
                        openJobDetail(jobId);
                        showToast('✅ コメントを投稿しました');
                    } catch (e) { alert('エラー: ' + e.message); }
                }

                async function convertToInvoice(jobId) {
                    let job = null;
                    for (const jobs of Object.values(pipelineData)) {
                        job = jobs.find(j => j.job_id === jobId);
                        if (job) break;
                    }
                    if (!job) return;

                    const currentPrice = job.final_price || job.estimated_price || job.price_total || 0;
                    const newPriceStr = prompt('発行する請求書の最終金額(税抜)を入力してください。変更がない場合はそのままOKを押してください。', currentPrice);
                    if (newPriceStr === null) return; // cancelled

                    const newPrice = parseInt(newPriceStr, 10);
                    if (isNaN(newPrice)) { alert('正しい数値を入力してください'); return; }

                    if (!confirm(`請求金額を ${newPrice.toLocaleString()}円 で発行してよろしいですか？\n（業者の締め払い設定に基づいて支払期限が自動設定されます）`)) return;

                    try {
                        // Update final price on Job if changed
                        if (newPrice !== currentPrice) {
                            job.final_price = newPrice;
                            await fetch(`${RyubeeAPI.baseUrl}/jobs/${jobId}`, {
                                method: 'PUT', headers: RyubeeAPI.getHeaders(), body: JSON.stringify({ final_price: newPrice })
                            });
                        }

                        const inv = await RyubeeAPI.createInvoiceFromEstimate(jobId);
                        showToast(`✅ 請求書を発行しました (税込¥${inv.total_amount.toLocaleString()})`);
                        document.getElementById('drawerOverlay').classList.remove('show');
                        setTimeout(() => { window.location.href = 'billing.html'; }, 1500);
                    } catch (e) { alert('エラー: ' + e.message); }
                }

                async function collectCash(jobId) {
                    let job = null;
                    for (const jobs of Object.values(pipelineData)) {
                        job = jobs.find(j => j.job_id === jobId);
                        if (job) break;
                    }
                    if (!job) return;

                    const currentPrice = job.final_price || job.estimated_price || job.price_total || 0;
                    const newPriceStr = prompt('現金で受け取る最終金額(税抜)を入力してください。変更がない場合はそのままOKを押してください。', currentPrice);
                    if (newPriceStr === null) return;

                    const newPrice = parseInt(newPriceStr, 10);
                    if (isNaN(newPrice)) { alert('正しい数値を入力してください'); return; }

                    if (!confirm(`現金 ${newPrice.toLocaleString()}円(税抜) を受け取りましたか？\n（請求書が自動生成され、入金済みとして処理されます）`)) return;

                    try {
                        if (newPrice !== currentPrice) {
                            await fetch(`${RyubeeAPI.baseUrl}/jobs/${jobId}`, {
                                method: 'PUT', headers: RyubeeAPI.getHeaders(), body: JSON.stringify({ final_price: newPrice })
                            });
                        }

                        const inv = await RyubeeAPI.createInvoiceAndCollectCash(jobId);
                        showToast(`✅ 現金回収を記録しました (税込¥${inv.total_amount.toLocaleString()})`);
                        document.getElementById('drawerOverlay').classList.remove('show');
                        loadPipeline();
                    } catch (e) { alert('エラー: ' + e.message); }
                }

                async function updateJobFormData(jobId) {
                    let job = null;
                    for (const jobs of Object.values(pipelineData)) {
                        job = jobs.find(j => j.job_id === jobId);
                        if (job) break;
                    }
                    if (!job) return;

                    let fd = {};
                    try { fd = JSON.parse(job.form_data || "{}"); } catch (e) { }

                    fd.subcontractor_name = document.getElementById('jobSubcontractor').value.trim();
                    fd.vehicle_number = document.getElementById('jobVehicleNum').value.trim();
                    const newFormData = JSON.stringify(fd);
                    job.form_data = newFormData;

                    try {
                        await RyubeeAPI.updateJob(jobId, { form_data: newFormData });
                        showToast("✅ 配車情報を保存しました");
                    } catch (e) { alert("保存エラー"); }
                }

                async function uploadJobPhotos(event, jobId) {
                    const files = Array.from(event.target.files);
                    if (!files.length) return;

                    // Find job to get existing photos
                    let job = null;
                    for (const jobs of Object.values(pipelineData)) {
                        job = jobs.find(j => j.job_id === jobId);
                        if (job) break;
                    }
                    if (!job) return;

                    let pArr = [];
                    try {
                        pArr = Array.isArray(job.photos) ? [...job.photos] : JSON.parse(job.photos || "[]");
                    } catch (e) { }

                    showToast(`📸 ${files.length}枚の写真を処理中...`);

                    // Process all files in parallel with canvas resize
                    const processFile = (file) => new Promise((resolve) => {
                        const reader = new FileReader();
                        reader.onload = function (e) {
                            const img = new Image();
                            img.onload = function () {
                                const canvas = document.createElement('canvas');
                                const MAX_WIDTH = 800;
                                const scale = Math.min(1, MAX_WIDTH / img.width);
                                canvas.width = img.width * scale;
                                canvas.height = img.height * scale;
                                const ctx = canvas.getContext('2d');
                                ctx.drawImage(img, 0, 0, canvas.width, canvas.height);
                                resolve(canvas.toDataURL('image/jpeg', 0.8));
                            };
                            img.src = e.target.result;
                        };
                        reader.readAsDataURL(file);
                    });

                    try {
                        const base64Results = await Promise.all(files.map(f => processFile(f)));
                        pArr.push(...base64Results);
                        const photosStr = JSON.stringify(pArr);
                        await RyubeeAPI.updateJob(jobId, { photos: photosStr });
                        showToast(`📸 ${files.length}枚の写真を保存しました`);
                        await loadPipeline();
                        openJobDetail(jobId);
                    } catch (err) { alert("アップロード失敗: " + err.message); }
                }

                async function deleteJobPhoto(jobId, index) {
                    if (!confirm("この写真を削除しますか？")) return;
                    let job = null;
                    for (const jobs of Object.values(pipelineData)) {
                        job = jobs.find(j => j.job_id === jobId);
                        if (job) break;
                    }
                    if (!job) return;

                    let pArr = [];
                    try {
                        pArr = Array.isArray(job.photos) ? job.photos : JSON.parse(job.photos || "[]");
                    } catch (e) { }
                    pArr.splice(index, 1);
                    const photosStr = JSON.stringify(pArr);

                    try {
                        await RyubeeAPI.updateJob(jobId, { photos: photosStr });
                        await loadPipeline();
                        openJobDetail(jobId); // reload drawer
                    } catch (err) { alert("削除失敗"); }
                }
            </script>
            <script>
                if ('serviceWorker' in navigator) {
                    navigator.serviceWorker.register('sw.js').catch(e => console.log('SW registration failed:', e));
                }
            </script>
</body>

</html>
