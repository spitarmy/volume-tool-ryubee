<!DOCTYPE html>
<html lang="ja">

<head>
    <meta charset="UTF-8">
    <meta name="viewport"
        content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>データ管理 — Ryu兵衛</title>
    <meta name="apple-mobile-web-app-capable" content="yes">
    <link rel="stylesheet" href="assets/css/style.css">
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#1A237E">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Ryu兵衛">
    <style>
        .data-header {
            background: #FFFFFF;
            padding: 30px 24px 20px;
            border-bottom: 1px solid var(--border);
        }

        .data-header h1 {
            font-size: 1.8rem;
            margin-bottom: 6px;
        }

        /* ── Main tab bar ─── */
        .main-tabs {
            display: flex;
            gap: 6px;
            padding: 12px 20px 0;
            background: #fff;
            border-bottom: 1px solid var(--border);
        }

        .main-tab {
            flex: 1;
            padding: 12px 8px;
            border: none;
            background: transparent;
            font-weight: 700;
            font-size: 0.85rem;
            cursor: pointer;
            color: var(--text-secondary);
            border-bottom: 3px solid transparent;
            transition: all 0.2s;
            text-align: center;
            font-family: inherit;
        }

        .main-tab.active {
            color: var(--blue);
            border-bottom-color: var(--blue);
        }

        /* ── Alert banner ─── */
        .alert-banner {
            margin: 12px 20px;
            padding: 14px 16px;
            border-radius: var(--r-md);
            font-weight: 600;
            font-size: 0.88rem;
        }

        .alert-banner.expired {
            background: var(--red-light);
            color: #B00B06;
            border: 1px solid rgba(239, 68, 68, 0.2);
        }

        .alert-banner.urgent {
            background: var(--orange-light);
            color: #C06000;
            border: 1px solid rgba(245, 158, 11, 0.2);
        }

        .alert-banner.warning {
            background: var(--blue-light);
            color: var(--blue-dark);
            border: 1px solid rgba(14, 165, 233, 0.2);
        }

        /* ── Data list ─── */
        .data-list {
            padding: 12px 20px 120px;
        }

        .data-card {
            background: #fff;
            border-radius: var(--r-xl);
            padding: 20px;
            margin-bottom: 12px;
            box-shadow: var(--shadow-sm);
            border: 1px solid var(--border);
            cursor: pointer;
            transition: transform 0.15s;
        }

        .data-card:active {
            transform: scale(0.98);
        }

        .dc-top {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 8px;
        }

        .dc-title {
            font-weight: 700;
            font-size: 1.05rem;
        }

        .dc-meta {
            font-size: 0.85rem;
            color: var(--text-secondary);
            margin-bottom: 3px;
        }

        .dc-badge {
            padding: 3px 10px;
            border-radius: 50px;
            font-size: 0.75rem;
            font-weight: 700;
        }

        .dc-badge.ok {
            background: var(--green-light);
            color: var(--green-dark);
        }

        .dc-badge.warn {
            background: var(--orange-light);
            color: #C06000;
        }

        .dc-badge.danger {
            background: var(--red-light);
            color: var(--red);
        }

        /* ── Plate display ─── */
        .plate-display {
            display: inline-flex;
            align-items: center;
            gap: 4px;
            background: #F0FDF4;
            border: 2px solid #86EFAC;
            border-radius: 8px;
            padding: 4px 10px;
            font-weight: 800;
            font-size: 0.9rem;
            color: #166534;
            letter-spacing: 0.02em;
        }

        /* ── Actions row ─── */
        .card-actions {
            display: flex;
            gap: 8px;
            margin-top: 12px;
            padding-top: 12px;
            border-top: 1px solid var(--border);
        }

        .card-actions .btn-xs {
            flex: 1;
        }

        /* ── FAX Modal ─── */
        .fax-overlay {
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.36);
            backdrop-filter: blur(10px);
            display: none;
            z-index: 3500;
            align-items: center;
            justify-content: center;
        }

        .fax-overlay.show {
            display: flex;
        }

        .fax-modal {
            background: #fff;
            border-radius: var(--r-xl);
            width: 90%;
            max-width: 400px;
            padding: 28px 24px;
            animation: sheetUp 0.3s cubic-bezier(0.25, 1, 0.5, 1);
        }

        .fax-modal h3 {
            font-size: 1.1rem;
            margin-bottom: 16px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        /* ── Modal ─── */
        .cd-modal-overlay {
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.36);
            backdrop-filter: blur(10px);
            display: none;
            z-index: 3000;
            align-items: flex-end;
            justify-content: center;
        }

        .cd-modal-overlay.show {
            display: flex;
        }

        .cd-modal {
            background: #fff;
            border-radius: var(--r-xl) var(--r-xl) 0 0;
            width: 100%;
            max-width: 600px;
            padding: 24px 20px 40px;
            max-height: 90vh;
            overflow-y: auto;
            animation: sheetUp 0.3s cubic-bezier(0.25, 1, 0.5, 1);
        }

        /* Tab panel visibility */
        .tab-panel {
            display: none;
        }

        .tab-panel.active {
            display: block;
        }

        .empty-msg {
            text-align: center;
            color: var(--text-tertiary);
            margin-top: 30px;
            font-size: 0.95rem;
        }

        /* ── Vehicle detail modal ── */
        .vd-overlay {
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, .4);
            backdrop-filter: blur(8px);
            display: none;
            z-index: 3100;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .vd-overlay.show {
            display: flex;
        }

        .vd-modal {
            background: #fff;
            border-radius: 12px;
            width: 100%;
            max-width: 600px;
            max-height: 90vh;
            overflow-y: auto;
            box-shadow: 0 20px 60px rgba(0, 0, 0, .2);
            animation: sheetUp .25s ease-out;
            padding: 24px;
        }

        .vd-record {
            background: var(--bg-secondary);
            padding: 12px;
            border-left: 3px solid var(--blue);
            border-radius: 0 8px 8px 0;
            margin-bottom: 10px;
            font-size: 0.85rem;
        }

        .vd-record img {
            max-width: 100%;
            border-radius: 8px;
            margin-top: 8px;
        }

        .record-type-tabs {
            display: flex;
            gap: 6px;
            margin-bottom: 16px;
        }

        .record-type-tabs button {
            flex: 1;
            padding: 8px;
            border: 1px solid var(--border);
            background: #fff;
            border-radius: 8px;
            font-weight: 600;
            font-size: 0.8rem;
            cursor: pointer;
            transition: all .15s;
            font-family: inherit;
        }

        .record-type-tabs button.active {
            background: var(--blue-light);
            border-color: var(--blue);
            color: var(--blue-dark);
        }

        /* ── Training material card ── */
        .training-card {
            background: #fff;
            border-radius: var(--r-xl);
            padding: 20px;
            margin-bottom: 12px;
            box-shadow: var(--shadow-sm);
            border: 1px solid var(--border);
            display: flex;
            gap: 16px;
            align-items: center;
        }

        .training-card .t-icon {
            font-size: 2rem;
            width: 48px;
            text-align: center;
        }

        .training-card .t-info {
            flex: 1;
        }

        .training-card .t-title {
            font-weight: 700;
            font-size: 1rem;
            margin-bottom: 4px;
        }

        .training-card .t-meta {
            font-size: 0.82rem;
            color: var(--text-secondary);
        }
    </style>
</head>

            </div>
            <div class="form-group"><label>タイヤ交換日</label><input type="date" id="vTireDate"></div>

            </div>
            <div class="form-group"><label>許可有効年月日</label><input type="date" id="pExpiryDate"></div>
            <div class="form-group"><label>申請月</label><input type="text" id="pAppMonth" placeholder="9月"></div>
            <div class="form-group"><label>備考</label><textarea id="pNotes" rows="2" placeholder="葉書、ネット申請など"></textarea>

            <button class="btn btn-secondary mt-1"

    <script src="assets/js/utils.js"></script>
    <script src="assets/js/api.js"></script>
    <script>
        if (!RyubeeAPI.requireAuth()) throw new Error("Not authenticated");

        let allVehicles = [];
        let allPermits = [];
        let allContracts = [];
        let currentTab = 'vehicles';
        let editingId = null;

        document.addEventListener('DOMContentLoaded', async () => {
            await Promise.all([loadVehicles(), loadPermits(), loadContracts(), loadAlerts()]);
        });

        // ── Tab switching ────────────────────────
        function switchTab(tab, btn) {
            currentTab = tab;
            document.querySelectorAll('.main-tab').forEach(t => t.classList.remove('active'));
            btn.classList.add('active');
            document.querySelectorAll('.tab-panel').forEach(p => p.classList.remove('active'));
            document.getElementById(`panel-${tab}`).classList.add('active');
        }

        // ── Alerts ───────────────────────────────
        async function loadAlerts() {
            try {
                const alerts = await RyubeeAPI.fetchCompanyDataAlerts();
                const area = document.getElementById('alertArea');
                if (!alerts.length) { area.innerHTML = ''; return; }

                const expired = alerts.filter(a => a.level === 'expired');
                const urgent = alerts.filter(a => a.level === 'urgent');
                const warning = alerts.filter(a => a.level === 'warning');

                let html = '';
                if (expired.length) {
                    html += `<div class="alert-banner expired">🔴 期限切れ ${expired.length}件: ${expired.map(a => a.label).join(', ')}</div>`;
                }
                if (urgent.length) {
                    html += `<div class="alert-banner urgent">⚠️ 30日以内 ${urgent.length}件: ${urgent.map(a => a.label).join(', ')}</div>`;
                }
                if (warning.length) {
                    html += `<div class="alert-banner warning">📌 60日以内 ${warning.length}件: ${warning.map(a => a.label).join(', ')}</div>`;
                }
                area.innerHTML = html;

        // ── Date helper ──────────────────────────
        function getExpiryBadge(dateStr) {
            if (!dateStr) return '<span class="dc-badge ok">–</span>';
            const d = new Date(dateStr);
            const today = new Date();
            today.setHours(0, 0, 0, 0);
            const diff = Math.ceil((d - today) / (1000 * 60 * 60 * 24));
            if (diff < 0) return `<span class="dc-badge danger">期限切れ</span>`;
            if (diff <= 30) return `<span class="dc-badge danger">${diff}日後</span>`;
            if (diff <= 60) return `<span class="dc-badge warn">${diff}日後</span>`;
            return `<span class="dc-badge ok">有効</span>`;
        }

            const fd = new FormData();
            fd.append('record_type', document.getElementById('vrType').value);

            fd.append('title', document.getElementById('vrTitle').value.trim());
            fd.append('description', document.getElementById('vrDesc').value.trim());
            fd.append('cost', document.getElementById('vrCost').value || '0');
            const fileInput = document.getElementById('vrFile');
            if (fileInput.files.length) fd.append('file', fileInput.files[0]);
            try {
                await RyubeeAPI.createVehicleRecord(currentVehicleId, fd);
                showToast('✅ 履歴を追加しました');
                allRecords = await RyubeeAPI.fetchVehicleRecords(currentVehicleId);
                renderRecords();
                ['vrDate', 'vrCost', 'vrTitle', 'vrDesc'].forEach(id => document.getElementById(id).value = '');
                document.getElementById('vrFile').value = '';
            } catch (e) { alert('エラー: ' + e.message); }
        }

        async function deleteRecord(rid) {
            if (!confirm('この履歴を削除しますか？')) return;
            try {
                await RyubeeAPI.deleteVehicleRecord(currentVehicleId, rid);
                showToast('🗑️ 削除しました');
                allRecords = await RyubeeAPI.fetchVehicleRecords(currentVehicleId);
                renderRecords();
            } catch (e) { alert('エラー: ' + e.message); }
        }

        // ── Training Materials ───────────────────
        let allTraining = [];

        async function loadTraining() {
            try {
                allTraining = await RyubeeAPI.fetchTrainingMaterials();
                renderTraining();
            } catch (e) { console.error(e); }
        }

        function renderTraining() {
            const list = document.getElementById('trainingList');
            if (!allTraining.length) {
                list.innerHTML = '<p class="empty-msg">📚 研修資料なし。「📤 資料をアップロード」から登録してください。</p>';
                return;
            }
            const API_BASE = localStorage.getItem('ryubee_api_base') || 'http://localhost:8000';
            list.innerHTML = allTraining.map(t => `
                <div class="training-card">
                    <div class="t-icon">${t.file_type === 'pdf' ? '📄' : '🖼️'}</div>
                    <div class="t-info">
                        <div class="t-title">${utils.escapeHtml(t.title)}</div>
                        <div class="t-meta">${t.notes ? utils.escapeHtml(t.notes) + ' | ' : ''}${new Date(t.created_at).toLocaleDateString('ja-JP')}</div>
                    </div>
                    <div style="display:flex;gap:8px;">
                        <a href="${API_BASE}${t.file_url}" target="_blank" class="btn btn-xs btn-primary" style="text-decoration:none;">📖 表示</a>
                        <button class="btn btn-xs btn-danger" onclick="deleteTraining('${t.id}')">🗑</button>
                    </div>
                </div>
            `).join('');
        }

        function openTrainingUpload() {
            document.getElementById('tTitle').value = '';
            document.getElementById('tFile').value = '';
            document.getElementById('tNotes').value = '';
            document.getElementById('trainingOverlay').classList.add('show');
        }

        async function uploadTraining() {
            const fileInput = document.getElementById('tFile');
            if (!fileInput.files.length) { alert('ファイルを選択してください'); return; }
            const fd = new FormData();
            fd.append('title', document.getElementById('tTitle').value.trim());
            fd.append('notes', document.getElementById('tNotes').value.trim());
            fd.append('file', fileInput.files[0]);
            try {
                await RyubeeAPI.createTrainingMaterial(fd);
                showToast('✅ 研修資料をアップロードしました');
                document.getElementById('trainingOverlay').classList.remove('show');
                await loadTraining();
            } catch (e) { alert('エラー: ' + e.message); }
        }

        async function deleteTraining(id) {
            if (!confirm('この研修資料を削除しますか？')) return;
            try {
                await RyubeeAPI.deleteTrainingMaterial(id);
                showToast('🗑️ 削除しました');
                await loadTraining();
            } catch (e) { alert('エラー: ' + e.message); }
        }

        function showToast(msg) {
            const t = document.createElement('div');
            t.textContent = msg;
            t.style.cssText = 'position:fixed;bottom:90px;left:50%;transform:translateX(-50%);background:#34C759;color:#fff;padding:10px 20px;border-radius:20px;font-weight:600;z-index:9999;white-space:nowrap;';
            document.body.appendChild(t);
            setTimeout(() => t.remove(), 2500);
        }
    </script>
    <script>
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('sw.js').catch(e => console.log('SW registration failed:', e));
        }
    </script>
</body>

</html>
