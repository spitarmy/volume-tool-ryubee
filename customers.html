<!DOCTYPE html>
<html lang="ja">

<head>
    <meta charset="UTF-8">
    <meta name="viewport"
        content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>顧客管理CRM — Ryu兵衛 山文SaaS</title>
    <meta name="apple-mobile-web-app-capable" content="yes">
    <link rel="stylesheet" href="assets/css/style.css">
    <style>
        .customers-header {
            background: #FFFFFF;
            padding: 30px 24px 20px;
            border-bottom: 1px solid var(--border);
        }

        .customers-header h1 {
            font-size: 1.8rem;
            margin-bottom: 6px;
        }

        .search-wrap {
            padding: 12px 20px;
        }

        .search-wrap input {
            width: 100%;
            padding: 12px 16px;
            border-radius: var(--r-pill);
            border: 1px solid var(--border);
            font-size: 0.95rem;
        }

        .customer-list {
            padding: 0 20px 120px;
        }

        .customer-card {
            background: #fff;
            border-radius: var(--r-xl);
            padding: 20px;
            margin-bottom: 12px;
            box-shadow: var(--shadow-sm);
            border: 1px solid var(--border);
            cursor: pointer;
            transition: transform 0.15s;
        }

        .customer-card:active {
            transform: scale(0.98);
        }

        .cc-top {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            margin-bottom: 8px;
        }

        .cc-name {
            font-weight: 700;
            font-size: 1.1rem;
        }

        .cc-meta {
            font-size: 0.85rem;
            color: var(--text-secondary);
            margin-bottom: 3px;
        }

        .cc-expiry {
            font-size: 0.8rem;
            color: var(--orange);
            font-weight: 600;
        }

        /* モーダル */
        .cust-modal-overlay {
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.36);
            backdrop-filter: blur(10px);
            display: none;
            z-index: 3000;
            align-items: flex-end;
            justify-content: center;
        }

        .cust-modal-overlay.show {
            display: flex;
        }

        .cust-modal {
            background: #fff;
            border-radius: var(--r-xl) var(--r-xl) 0 0;
            width: 100%;
            max-width: 600px;
            padding: 24px 20px 40px;
            max-height: 90vh;
            overflow-y: auto;
            animation: sheetUp 0.3s cubic-bezier(0.25, 1, 0.5, 1);
        }

        /* ── Customer Contract Styles ── */
        .contract-card {
            background: #fff;
            border-radius: 10px;
            padding: 12px 14px;
            margin-bottom: 8px;
            border: 1px solid var(--border);
            display: block;
            cursor: pointer;
            transition: transform 0.15s, box-shadow 0.15s;
            height: auto;
            text-align: left;
        }

        .contract-card:active {
            transform: scale(0.98);
            box-shadow: var(--shadow-sm);
        }

        .contract-card .cc-company {
            font-weight: 700;
            font-size: 0.85rem;
            color: var(--text-primary);
        }

        .contract-card .cc-waste {
            font-size: 0.8rem;
            color: var(--text-secondary);
            margin-top: 4px;
            margin-bottom: 4px;
        }

        .contract-card .cc-status {
            font-size: 0.68rem;
            font-weight: 700;
            padding: 2px 8px;
            border-radius: 10px;
            flex-shrink: 0;
        }

        .contract-add-btn {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
            width: 100%;
            padding: 10px;
            margin-top: 8px;
            background: #fff;
            border: 2px dashed var(--border);
            border-radius: 10px;
            font-size: 0.82rem;
            font-weight: 700;
            color: var(--text-tertiary);
            cursor: pointer;
            transition: border-color 0.2s, color 0.2s;
        }

        .contract-add-btn:hover {
            border-color: var(--blue);
            color: var(--blue);
        }

        .contract-modal-overlay {
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.4);
            backdrop-filter: blur(8px);
            display: none;
            z-index: 4000;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .contract-modal-overlay.show {
            display: flex;
        }

        .contract-modal {
            background: #fff;
            border-radius: 16px;
            width: 100%;
            max-width: 440px;
            padding: 24px 20px;
            animation: sheetUp 0.25s ease-out;
            max-height: 85vh;
            overflow-y: auto;
        }

        .contract-modal h3 {
            font-size: 1.1rem;
            margin-bottom: 16px;
        }

        .contract-form-group {
            margin-bottom: 12px;
        }

        .contract-form-group label {
            display: block;
            font-size: 0.78rem;
            font-weight: 600;
            color: var(--text-secondary);
            margin-bottom: 4px;
        }

        .contract-form-group select,
        .contract-form-group input,
        .contract-form-group textarea {
            width: 100%;
            padding: 10px 12px;
            border-radius: 8px;
            border: 1px solid var(--border);
            font-size: 0.88rem;
            box-sizing: border-box;
            font-family: inherit;
        }

        /* 一括追加モーダル */
        .cc-batch-row {
            border: 1px solid var(--border);
            border-radius: 10px;
            padding: 10px 12px;
            margin-bottom: 6px;
            background: #FAFAFA;
            transition: all 0.15s;
            text-align: left;
        }
        .cc-batch-row:has(.cc-company-check:checked) {
            background: #EFF6FF;
            border-color: var(--blue);
        }
        .cc-batch-company {
            display: flex;
            align-items: center;
            gap: 8px;
            cursor: pointer;
            font-size: 0.88rem;
            font-weight: 600;
        }
        .cc-batch-company input[type="checkbox"] {
            width: 18px;
            height: 18px;
            accent-color: var(--blue);
            margin: 0;
        }
        .cc-batch-chips {
            display: flex;
            flex-wrap: wrap;
            gap: 4px;
            margin-top: 8px;
            padding-left: 26px;
        }
        .cc-waste-chip {
            padding: 4px 10px;
            font-size: 0.73rem;
            border-radius: 12px;
            border: 1px solid var(--border);
            background: #fff;
            color: var(--text-secondary);
            cursor: pointer;
            transition: all 0.15s;
            font-family: inherit;
        }
        .cc-waste-chip.selected {
            background: var(--blue);
            color: #fff;
            border-color: var(--blue);
        }
        .cc-waste-chip.cc-all-btn {
            border-color: #059669;
            background: #ECFDF5;
            color: #059669;
            font-weight: 700;
        }
        .cc-tracking {
            display: flex;
            flex-wrap: wrap;
            gap: 3px;
            margin-top: 4px;
        }
        .cc-track {
            font-size: 0.65rem;
            padding: 2px 6px;
            border-radius: 6px;
            background: #F3F4F6;
            color: var(--text-tertiary);
        }
        .cc-track.cc-ok {
            background: #ECFDF5;
            color: #059669;
            font-weight: 600;
        }
        .cc-status.pending { background: #FEF3C7; color: #92400E; border-color: #FDE68A; }
        .cc-status.sent { background: #DBEAFE; color: #1D4ED8; border-color: #BFDBFE; }
        .contract-card .cc-status.returned { background: #EBF8FF; color: #3182CE; border-color: #BEE3F8; }
        .contract-card .cc-status.completed { background: #F0FFF4; color: #38A169; border-color: #C6F6D5; }

        /* ナンバーインプットのスピンボタンを非表示にする */
        input[type="number"]::-webkit-outer-spin-button,
        input[type="number"]::-webkit-inner-spin-button {
            -webkit-appearance: none;
            margin: 0;
        }
        input[type="number"] {
            -moz-appearance: textfield;
        }
        .cc-checkbox-label {
            display: flex;
            align-items: center;
            gap: 6px;
            font-size: 0.85rem;
            font-weight: 600;
            cursor: pointer;
            padding: 8px 10px;
            border-radius: 8px;
            border: 1px solid var(--border);
            background: #FAFAFA;
            margin-top: 6px;
        }
        .cc-checkbox-label input[type="checkbox"] {
            width: 18px;
            height: 18px;
            accent-color: var(--blue);
            margin: 0;
        }
    </style>
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#1A237E">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Ryu兵衛">
    <link rel="apple-touch-icon" href="assets/icons/icon-192.png">
</head>

<body>

    <header class="customers-header">
        <h1>🏢 顧客管理</h1>
        <p style="color: var(--text-secondary); font-size: 0.9rem;">顧客の登録・編集・契約管理</p>
    </header>

    <div class="search-wrap">
        <input type="text" id="searchInput" placeholder="🔍 顧客名・住所・電話で検索..." oninput="filterCustomers()">
        <div style="display:flex; gap:8px; margin-top:12px;">
            <button class="btn btn-primary" id="btn-tab-all" style="flex:1" onclick="setCustTab('all')">全て</button>
            <button class="btn btn-secondary" id="btn-tab-a" style="flex:1"
                onclick="setCustTab('group_a')">10・15・25</button>
            <button class="btn btn-secondary" id="btn-tab-20" style="flex:1"
                onclick="setCustTab('group_20')">20日</button>
            <button class="btn btn-secondary" id="btn-tab-end" style="flex:1"
                onclick="setCustTab('group_end')">末日</button>
            <button class="btn btn-secondary" id="btn-tab-auto" style="flex:1"
                onclick="setCustTab('auto')">自動振替</button>
        </div>
    </div>

    <div class="customer-list" id="customerList">
        <p style="text-align:center; color: var(--text-tertiary); margin-top: 20px;">読み込み中...</p>
    </div>

    <button class="fab" onclick="openModal()">+</button>

    <!-- 顧客プレビューモーダル -->
    <div class="cust-modal-overlay" id="previewOverlay" onclick="if(event.target===this) this.classList.remove('show')">
        <div class="cust-modal" style="padding-top:16px;">
            <div class="modal-drag-handle"></div>
            <button class="modal-close"
                onclick="document.getElementById('previewOverlay').classList.remove('show')">✕</button>
            <div id="previewContent"></div>
            <button class="btn btn-primary mt-2" onclick="openEditFromPreview()">✏️ 編集する</button>
            <button class="btn btn-secondary mt-1"
                onclick="document.getElementById('previewOverlay').classList.remove('show')">閉じる</button>
        </div>
    </div>

    <!-- 一括削除アクションバー -->
    <div id="bulkCustomerBar"
        style="display:none; position:fixed; bottom: 80px; left:50%; transform:translateX(-50%); width: 90%; max-width: 600px; background:#2c3e50; color:#fff; border-radius:var(--r-xl); padding:16px 20px; z-index:2000; align-items:center; justify-content:space-between; box-shadow:0 10px 40px rgba(0,0,0,0.4);">
        <span id="bulkCustomerCount" style="font-weight:700; font-size:1.05rem;">0件選択中</span>
        <button class="btn btn-sm btn-danger" onclick="bulkDeleteCustomers()">🗑 一括削除</button>
    </div>

    <!-- 顧客編集モーダル -->
    <div class="cust-modal-overlay" id="custOverlay">
        <div class="cust-modal">
            <style>
                .section-title {
                    font-size: 1.05rem;
                    margin: 24px 0 12px;
                    font-weight: 800;
                    color: var(--primary);
                    border-bottom: 2px solid var(--border);
                    padding-bottom: 6px;
                }

                .pricing-row {
                    display: flex;
                    gap: 8px;
                    margin-bottom: 8px;
                }

                .pricing-row input {
                    flex: 1;
                }

                .pricing-row .del-btn {
                    background: var(--danger);
                    color: white;
                    border: none;
                    border-radius: 8px;
                    width: 40px;
                    cursor: pointer;
                }
            </style>
            <div class="modal-drag-handle"></div>
            <h3 class="card-title" id="modalTitle">顧客を登録</h3>
            <input type="hidden" id="editId">

            <h4 class="section-title">🏢 基本情報</h4>
            <div style="display:grid;grid-template-columns:1fr 2fr;gap:8px;">
                <div class="form-group"><label>山文管理番号 *</label><input type="text" id="custYamabunNumber"
                        placeholder="例: Y-101"></div>
                <div class="form-group"><label>法人名 / 会社名 *</label><input type="text" id="custName" placeholder="株式会社○○">
                </div>
            </div>
            <div class="form-group">
                <label>担当営業 (自社)</label>
                <select id="custAssignedUser">
                    <option value="">未設定</option>
                </select>
            </div>
            <div class="form-group">
                <label>廃棄物カテゴリ (管理用)</label>
                <select id="custWasteCategory">
                    <option value="general">一般ゴミ</option>
                    <option value="industrial">産業廃棄物</option>
                    <option value="large">大型ゴミ等</option>
                </select>
            </div>
            <div class="form-group"><label>ご住所</label><input type="text" id="custAddress" placeholder="京都市..."></div>
            <div class="form-group"><label>担当者名</label><input type="text" id="custContact" placeholder="山田太郎"></div>
            <div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;">
                <div class="form-group"><label>電話番号</label><input type="tel" id="custPhone" inputmode="tel" placeholder="075-XXX-XXXX">
                </div>
                <div class="form-group"><label>携帯番号</label><input type="tel" id="custMobile" inputmode="tel"
                        placeholder="090-XXXX-XXXX"></div>
            </div>
            <div class="form-group"><label>メールアドレス</label><input type="email" id="custEmail" inputmode="email"
                    placeholder="info@example.com"></div>

            <h4 class="section-title">📍 事業所・回収情報 <span id="branchCount" style="font-size:0.75rem;font-weight:400;color:var(--text-tertiary);"></span></h4>
            <p style="font-size:0.78rem;color:var(--text-secondary);margin-bottom:8px;">回収場所ごとに情報を登録できます（複数可）</p>
            <div id="branchesContainer"></div>
            <button class="btn btn-secondary btn-sm mt-1" style="width:100%;" onclick="addBranchCard()">＋ 事業所（回収場所）を追加</button>

            <h4 class="section-title">💰 請求・契約情報</h4>
            <div class="form-group">
                <label>契約タイプ</label>
                <select id="custType">
                    <option value="spot">スポット</option>
                    <option value="subscription">定期契約</option>
                </select>
            </div>
            <div class="form-group"><label>委託契約書 期限</label><input type="date" id="custExpiry"></div>

            <div style="background:var(--bg-secondary);padding:14px;border-radius:var(--r-md);margin:8px 0;">
                <label style="font-weight:700;font-size:0.85rem;">📅 締め・支払サイクル</label>
                <div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:8px;">
                    <div class="form-group" style="margin:0;">
                        <label style="font-size:0.78rem;">支払方法</label>
                        <select id="custPaymentMethod">
                            <option value="振込">振込</option>
                            <option value="自動引落し">自動引落し</option>
                        </select>
                    </div>
                    <div class="form-group" style="margin:0;">
                        <label style="font-size:0.78rem;">締め日</label>
                        <select id="custClosingDay">
                            <option value="31">月末</option>
                            <option value="25">25日</option>
                            <option value="20">20日</option>
                            <option value="15">15日</option>
                            <option value="10">10日</option>
                        </select>
                    </div>
                    <div class="form-group" style="margin:0;">
                        <label style="font-size:0.78rem;">支払月</label>
                        <select id="custPayMonthOffset">
                            <option value="0">当月</option>
                            <option value="1" selected>翌月</option>
                            <option value="2">翌々月</option>
                        </select>
                    </div>
                    <div class="form-group" style="margin:0;">
                        <label style="font-size:0.78rem;">支払日</label>
                        <select id="custPayDay">
                            <option value="31">月末</option>
                            <option value="27">27日</option>
                            <option value="25">25日</option>
                            <option value="20">20日</option>
                            <option value="15">15日</option>
                            <option value="10">10日</option>
                        </select>
                    </div>
                </div>
            </div>

            <div class="form-group"><label>ご請求先 宛名 / 住所 <button type="button" onclick="document.getElementById('custBillingAddress').value=document.getElementById('custAddress').value" style="font-size:0.7rem;padding:2px 8px;border-radius:4px;border:1px solid var(--border);background:#EBF5FF;color:var(--blue);cursor:pointer;margin-left:4px;">📋 住所と同じ</button></label><input type="text" id="custBillingAddress"
                    placeholder="○○株式会社 京都市..."></div>
            <div class="form-group"><label>ご請求先 メールアドレス</label><input type="email" id="custBillingEmail"
                    placeholder="billing@example.com"></div>
            <div class="form-group"><label>ご請求先 ご担当者名</label><input type="text" id="custBillingContact"
                    placeholder="経理担当者名"></div>
            <div class="form-group" style="margin-top:12px;">
                <label style="display:flex;align-items:center;gap:6px;cursor:pointer;font-weight:600;color:var(--text-primary);background:#FEF2F2;padding:8px 12px;border:1px solid #FCA5A5;border-radius:6px;">
                    <input type="checkbox" id="custExcludeMailing">
                    システムからの郵送代行CSV・メール一括送信の対象から除外する<br>(BtoBプラットフォームや専用用紙などを使用する場合)
                </label>
            </div>

            <div style="background:var(--bg-secondary);padding:14px;border-radius:var(--r-md);margin:12px 0;">
                <label style="font-weight:700;font-size:0.85rem;">📄 契約書送付先（請求先と異なる場合）</label>
                <button type="button" onclick="copyBillingToContract()" style="font-size:0.7rem;padding:2px 8px;border-radius:4px;border:1px solid var(--border);background:#EBF5FF;color:var(--blue);cursor:pointer;margin-left:4px;">📋 請求先と同じ</button>
                <div style="margin-top:8px;">
                    <div class="form-group" style="margin-bottom:6px;"><input type="text" id="custContractAddress" placeholder="契約書送付先 宛名 / 住所"></div>
                    <div class="form-group" style="margin-bottom:6px;"><input type="email" id="custContractEmail" placeholder="契約書送付先 メールアドレス"></div>
                    <div class="form-group" style="margin-bottom:0;"><input type="text" id="custContractContact" placeholder="契約書送付先 ご担当者名"></div>
                </div>
            </div>

            <h4 class="section-title">📄 単価・契約リスト</h4>
            <p style="font-size:0.8rem;color:var(--text-secondary);margin-bottom:12px;">顧客固有の品目別単価（例: 一般ごみ / 40 / kg）
            </p>
            <div id="pricingListContainer"></div>
            <button class="btn btn-secondary btn-sm mt-1" style="width:100%;" onclick="addPricingRow()">＋ 品目を追加</button>

            <h4 class="section-title mt-4">🏢 関連手配先・処分先</h4>
            <p style="font-size:0.8rem;color:var(--text-secondary);margin-bottom:8px;">
                ご契約中、または今後手配する可能性のある処分先にチェックを入れてください</p>
            <div id="custContractorsList"
                style="display:flex; flex-wrap:wrap; gap:8px; border:1px solid var(--border); padding:10px; border-radius:var(--r-md); background:var(--bg-secondary);">
                <!-- JSで動的にチェックボックスを生成 -->
            </div>

            <div id="custContractsSection" style="display:none; border-top: 1px dashed var(--border); margin-top: 20px; padding-top: 10px;">
                <h4 class="section-title">📄 3社間契約 状況・履歴</h4>
                <div id="custContractsList" style="margin-bottom:12px;"></div>
                <button type="button" class="contract-add-btn" id="custContractAddBtn" onclick="openCustContractModal()">➕ 新規3社契約を登録</button>
            </div>

            <div class="form-group mt-2"><label>社内用メモ</label><textarea id="custNotes"
                    placeholder="特記事項など..."></textarea></div>

            <div style="margin-top:24px;">
                <button class="btn btn-primary" id="saveBtn" onclick="saveCustomer()">登録する</button>
                <a class="btn btn-primary mt-1" id="printContractBtn"
                    style="display:none; text-align:center; text-decoration:none; background:#34C759; color:#fff;"
                    target="_blank">📄 産廃契約書を作成</a>
                <button class="btn btn-secondary mt-1" onclick="closeModal()">キャンセル</button>
                <button class="btn btn-danger mt-1" id="deleteBtn" onclick="deleteCustomer()" style="display:none;">🗑
                    削除</button>
            </div>
        </div>
    </div>

    <!-- Bottom Nav -->
    <nav class="bottom-nav">
        <a href="index.html" class="nav-item"><span class="nav-icon">🏠</span><span>ホーム</span></a>
        <a href="pipeline.html" class="nav-item"><span class="nav-icon">📊</span><span>パイプライン</span></a>
        <a href="billing.html" class="nav-item"><span class="nav-icon">💰</span><span>請求</span></a>
        <a href="customers.html" class="nav-item active"><span class="nav-icon">🏢</span><span>顧客</span></a>
        <a href="company-data.html" class="nav-item"><span class="nav-icon">📁</span><span>データ</span></a>
    </nav>

    <script src="assets/js/utils.js"></script>
    <script src="assets/js/api.js"></script>
    <script>
        // 強制的にService Workerを解除する（一度だけ）
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.getRegistrations().then(function (registrations) {
                for (let registration of registrations) {
                    registration.unregister();
                }
            });
        }
    </script>
    <script>
        if (!RyubeeAPI.requireAuth()) throw new Error("Not authenticated");

        // 処分先ごとの処分項目マスタ
        const CONTRACTOR_ITEMS = {
            'ホームケルン': ['一般廃棄物', '粗大ごみ', '事業系一般'],
            '光アスコン': ['感染性', '廃プラ', '発泡スチロール', '畳'],
            '旭興産業': ['蛍光灯', '電池', '電球', 'ガラス'],
            '木材開発': ['木くず', '剪定枝', '木製パレット'],
            '厳本金属': ['金属くず'],
            '京都有機資源': ['動植物性残渣', '食品残渣', '有機汚泥'],
            'HIRAYAMA': ['ガラス', '陶磁器くず', 'ガレキ類'],
            '大剛': ['一般廃棄物', '産業廃棄物', '廃プラスチック類'],
            '京都環境保全公社': ['焼却灰', '汚泥', '廃油', '廃酸・廃アルカリ', '感染性廃棄物', '廃プラ(選別)', '廃プラ(焼却)', '陶磁器くず'],
            '西山環境サービス': ['一般廃棄物', '事業系一般', '資源ごみ'],
            '家電リサイクル': ['テレビ', 'エアコン', '冷蔵庫・冷凍庫', '洗濯機・乾燥機'],
        };

        let allCustomers = [];
        let allWasteContracts = [];
        let allUsers = [];
        let allTemplates = [];
        let appSettings = {};
        let editingId = null;
        let _selectedWasteTypes = new Set();
        let _contractsMaster = null;
        let _editingContractId = null;

        document.addEventListener('DOMContentLoaded', loadCustomers);

        let allDisposalCompaniesMaster = [];

        async function loadCustomers() {
            try {
                const [custRes, contractsRes, usersRes, settingsRes, templatesRes, disposalRes] = await Promise.all([
                    RyubeeAPI.fetchCustomers(),
                    RyubeeAPI.fetchWasteContracts().catch(() => []),
                    RyubeeAPI.fetchUsers().catch(() => []),
                    RyubeeAPI.fetchSettings().catch(() => ({})),
                    RyubeeAPI.fetchTemplates().catch(() => []),
                    RyubeeAPI.fetchDisposalCompanies().catch(() => [])
                ]);
                allCustomers = custRes;
                allWasteContracts = contractsRes;
                allUsers = usersRes || [];
                appSettings = settingsRes || {};
                allTemplates = templatesRes || [];
                allDisposalCompaniesMaster = disposalRes || [];

                const sel = document.getElementById('custAssignedUser');
                if (sel) {
                    sel.innerHTML = '<option value="">未設定</option>' + allUsers.map(u => `<option value="${u.id}">${utils.escapeHtml(u.name)}</option>`).join('');
                }

                allCustomers.forEach(c => {
                    try { c.parsed_form = JSON.parse(c.form_data || "{}"); } catch (e) { c.parsed_form = {}; }
                });
                filterCustomers();
            } catch (e) {
                document.getElementById('customerList').innerHTML = `<div class="alert alert-danger">${e.message}</div>`;
            }
        }

        let currentCustTab = 'all';
        function setCustTab(tab) {
            currentCustTab = tab;
            ['all', 'a', '20', 'end', 'auto'].forEach(k => {
                const el = document.getElementById('btn-tab-' + k);
                if (!el) return;
                const tabKey = k === 'a' ? 'group_a' : k === '20' ? 'group_20' : k === 'end' ? 'group_end' : k;
                el.className = 'btn ' + (tab === tabKey ? 'btn-primary' : 'btn-secondary');
            });
            filterCustomers();
        }

        function filterCustomers() {
            const q = document.getElementById('searchInput').value.toLowerCase();
            const filtered = allCustomers.filter(c => {
                const fd = c.parsed_form || {};
                let pricingItems = '';
                if (fd.pricing_list) pricingItems = fd.pricing_list.map(p => p.item).join(' ');

                const text = (
                    c.name + ' ' + (c.address || '') + ' ' + (c.phone || '') + ' ' + (c.contact_person || '') + ' ' + (c.email || '') +
                    ' ' + (fd.yamabun_management_number || '') +
                    ' ' + (fd.collection_general || '') + ' ' + (fd.collection_recycle || '') +
                    ' ' + (fd.collection_plastic || '') + ' ' + (fd.collection_paper || '') +
                    ' ' + pricingItems
                ).toLowerCase();

                const matchQ = text.includes(q);
                let matchT = true;
                const closingDay = c.billing_closing_day || 31;
                const payMethod = fd.payment_method || '振込';

                if (currentCustTab === 'group_a') {
                    matchT = [10, 15, 25].includes(closingDay);
                } else if (currentCustTab === 'group_20') {
                    matchT = closingDay === 20;
                } else if (currentCustTab === 'group_end') {
                    matchT = closingDay === 31;
                } else if (currentCustTab === 'auto') {
                    matchT = payMethod === '自動引落し';
                }
                return matchQ && matchT;
            });
            // 締め日順 -> 管理番号順にソート (Phase 5)
            filtered.sort((a, b) => {
                const dayA = a.billing_closing_day || 31;
                const dayB = b.billing_closing_day || 31;
                if (dayA !== dayB) return dayA - dayB;

                const numA = a.parsed_form?.yamabun_management_number || "";
                const numB = b.parsed_form?.yamabun_management_number || "";
                return numA.localeCompare(numB);
            });
            renderCustomers(filtered);
        }

        function renderCustomers(customers) {
            const list = document.getElementById('customerList');
            if (!customers.length) {
                list.innerHTML = '<p style="text-align:center;color:var(--text-tertiary);margin-top:30px;">顧客が見つかりません</p>';
                return;
            }
            list.innerHTML = customers.map(c => {
                const typeBadge = c.contract_type === 'subscription'
                    ? '<span class="badge badge-success">定期契約</span>'
                    : '<span class="badge badge-primary">スポット</span>';

                let wasteBadge = '<span class="badge" style="background:#48BB78; color:white;">一般</span>'; // general
                const wc = c.parsed_form?.waste_category;
                if (wc === 'industrial') wasteBadge = '<span class="badge" style="background:#5A67D8; color:white;">産廃</span>';
                if (wc === 'large') wasteBadge = '<span class="badge" style="background:#ED8936; color:white;">大型</span>';

                const expiry = c.contract_expiry_date
                    ? `<div class="cc-expiry">📋 契約期限: ${c.contract_expiry_date}</div>` : '';
                return `
                    <div class="customer-card" onclick="openPreview('${c.id}')">
                        <div class="cc-top">
                            <div style="display:flex; align-items:center;">
                                <input type="checkbox" class="cust-sel-cb" value="${c.id}" onclick="event.stopPropagation(); checkCustSelection()" style="margin-right:12px; transform:scale(1.3);">
                                <span class="cc-name">${utils.escapeHtml(c.name)}</span>
                            </div>
                            <div>${wasteBadge} ${typeBadge}</div>
                        </div>
                        ${c.parsed_form?.yamabun_management_number ? `<div class="cc-meta" style="font-weight:700; color:var(--primary); margin-top:2px; font-size:13px;">🎫 山文管理番号: ${utils.escapeHtml(c.parsed_form.yamabun_management_number)}</div>` : ''}
                        <div class="cc-meta" style="font-size:12px; color:var(--text-tertiary); margin-bottom:8px;">📅 締め日: ${c.billing_closing_day === 31 ? '月末' : c.billing_closing_day + '日'}締め</div>
                        <div class="cc-meta">👥 営業担当: <strong style="color:var(--text-primary);">${utils.escapeHtml(c.assigned_user_name || '未設定')}</strong></div>
                        ${c.contact_person ? `<div class="cc-meta">👤 先方担当: ${utils.escapeHtml(c.contact_person)}</div>` : ''}
                        <div class="cc-meta">📍 ${utils.escapeHtml(c.address || '未設定')}</div>
                        <div class="cc-meta">📞 ${utils.escapeHtml(c.phone || '未設定')}</div>
                        ${c.email ? `<div class="cc-meta">✉️ ${utils.escapeHtml(c.email)}</div>` : ''}
                        ${(() => {
                            const b = (c.parsed_form?.branches && c.parsed_form.branches[0]) || c.parsed_form || {};
                            if (!b.collection_general && !b.collection_recycle) return '';
                            let genPrice = '';
                            if (c.parsed_form?.pricing_list) {
                                const p = c.parsed_form.pricing_list.find(x => x.item && (x.item.includes('一般') || x.item.includes('基本') || x.item.includes('定額')));
                                if (p && p.price) genPrice = ` ${p.price}円`;
                            }
                            return `
                                <div style="margin-top:8px; padding-top:8px; border-top:1px dashed var(--border); font-size:12px; color:var(--text-secondary);">
                                    ${b.collection_general ? `<div><strong>回収:</strong> 一般 ${utils.escapeHtml(b.collection_general)} ${b.vehicle_number ? utils.escapeHtml(b.vehicle_number)+'号車' : ''}${genPrice}</div>` : ''}
                                    ${b.collection_recycle ? `<div><strong>資源:</strong> ${utils.escapeHtml(b.collection_recycle)} ${b.vehicle_number ? utils.escapeHtml(b.vehicle_number)+'号車' : ''}</div>` : ''}
                                </div>
                            `;
                        })()}
                        ${expiry}
                    </div>
                `;
            }).join('');
            checkCustSelection();
        }

        function checkCustSelection() {
            const checkboxes = document.querySelectorAll('.cust-sel-cb:checked');
            const bar = document.getElementById('bulkCustomerBar');
            const countSpan = document.getElementById('bulkCustomerCount');
            if (checkboxes.length > 0) {
                bar.style.display = 'flex';
                countSpan.textContent = checkboxes.length + '件選択中';
            } else {
                bar.style.display = 'none';
            }
        }

        async function bulkDeleteCustomers() {
            const checkboxes = document.querySelectorAll('.cust-sel-cb:checked');
            if (checkboxes.length === 0) return;
            const ids = Array.from(checkboxes).map(cb => cb.value);

            if (!confirm(`選択した ${ids.length} 件の顧客データを一斉に削除します。\n一度削除すると元に戻せませんがよろしいですか？\n（関連するマニフェスト等も削除される、または見えなくなる可能性があります）`)) return;

            const btn = document.querySelector('#bulkCustomerBar button');
            btn.disabled = true;
            btn.textContent = '削除中...';
            try {
                await RyubeeAPI.bulkDeleteCustomers(ids);
                showToast(`✅ ${ids.length}件の顧客を削除しました`);
                document.getElementById('bulkCustomerBar').style.display = 'none';
                loadCustomers();
            } catch (e) {
                alert('削除エラー: ' + e.message);
                btn.disabled = false;
                btn.textContent = '🗑 一括削除';
            }
        }

        function openModal(cust = null) {
            editingId = cust ? cust.id : null;
            document.getElementById('modalTitle').textContent = cust ? '顧客を編集' : '顧客を登録';
            document.getElementById('saveBtn').textContent = cust ? '更新する' : '登録する';
            document.getElementById('deleteBtn').style.display = cust ? 'block' : 'none';
            const printBtn = document.getElementById('printContractBtn');
            if (cust) {
                printBtn.style.display = 'block';
                printBtn.href = `contract-form.html?id=${cust.id}`;
            } else {
                printBtn.style.display = 'none';
            }
            document.getElementById('custName').value = cust?.name || '';
            document.getElementById('custAssignedUser').value = cust?.assigned_user_id || '';
            document.getElementById('custContact').value = cust?.contact_person || '';
            document.getElementById('custAddress').value = cust?.address || '';
            document.getElementById('custPhone').value = cust?.phone || '';
            document.getElementById('custEmail').value = cust?.email || '';
            document.getElementById('custType').value = cust?.contract_type || 'spot';
            document.getElementById('custExpiry').value = cust?.contract_expiry_date || '';
            document.getElementById('custClosingDay').value = cust?.billing_closing_day || '31';
            document.getElementById('custPayMonthOffset').value = cust?.payment_due_month_offset ?? '1';
            document.getElementById('custPayDay').value = cust?.payment_due_day || '31';
            document.getElementById('custNotes').value = cust?.notes || '';

            // 拡張データ(JSON)の展開
            let fd = {};
            if (cust && cust.form_data) {
                try { fd = JSON.parse(cust.form_data); } catch (e) { }
            }
            document.getElementById('custYamabunNumber').value = fd.yamabun_management_number || '';
            document.getElementById('custWasteCategory').value = fd.waste_category || 'general';
            document.getElementById('custMobile').value = fd.mobile || '';
            document.getElementById('custPaymentMethod').value = fd.payment_method || '振込';
            document.getElementById('custBillingAddress').value = fd.billing_address || '';
            document.getElementById('custBillingEmail').value = fd.billing_email || '';
            document.getElementById('custBillingContact').value = fd.billing_contact || '';
            document.getElementById('custExcludeMailing').checked = !!fd.exclude_from_mailing;

            document.getElementById('custContractAddress').value = fd.contract_address || '';
            document.getElementById('custContractEmail').value = fd.contract_email || '';
            document.getElementById('custContractContact').value = fd.contract_contact || '';

            // ── 複数事業所の読み込み（2-1）──
            document.getElementById('branchesContainer').innerHTML = '';
            if (fd.branches && Array.isArray(fd.branches) && fd.branches.length > 0) {
                // 新形式: branches配列
                fd.branches.forEach(b => addBranchCard(b));
            } else if (fd.branch_name || fd.branch_address) {
                // 旧形式: 単一事業所 → 自動変換
                addBranchCard({
                    branch_name: fd.branch_name || '',
                    branch_address: fd.branch_address || '',
                    industry_type: fd.industry_type || '',
                    average_volume: fd.average_volume || '',
                    vehicle_number: fd.vehicle_number || '',
                    subcontractor: fd.subcontractor || '',
                    collection_general: fd.collection_general || '',
                    collection_recycle: fd.collection_recycle || '',
                    collection_plastic: fd.collection_plastic || '',
                    collection_paper: fd.collection_paper || '',
                    business_hours: fd.business_hours || '',
                    regular_holiday: fd.regular_holiday || '',
                    collection_start_date: fd.collection_start_date || '',
                    collection_end_date: fd.collection_end_date || '',
                });
            } else if (!cust) {
                // 新規: 空の事業所カード1枚
                addBranchCard();
            }
            updateBranchCount();

            // 単価リストの展開
            document.getElementById('pricingListContainer').innerHTML = '';
            if (fd.pricing_list && Array.isArray(fd.pricing_list) && fd.pricing_list.length > 0) {
                fd.pricing_list.forEach(p => addPricingRow(p.item, p.price, p.unit));
            } else {
                if (!cust) addPricingRow('', '', 'kg');
            }

            // 処分先リストの展開
            const contractorsListDiv = document.getElementById('custContractorsList');
            contractorsListDiv.innerHTML = '';
            const activeCbs = Array.isArray(fd.active_contractors) ? fd.active_contractors : [];
            const savedContractorItems = fd.contractor_items || {};  // {会社名: [選択項目...]}
            const masterNames = allDisposalCompaniesMaster.map(c => c.name);
            const oldMasterList = Array.isArray(appSettings.contractors_master) ? appSettings.contractors_master : [];
            const masterList = [...new Set([...masterNames, ...oldMasterList])];
            if (masterList.length === 0) {
                masterList.push('ホームケルン', '光アスコン', '旭興産業', '木材開発', '厳本金属', '京都有機資源', 'HIRAYAMA', '大剛', '京都環境保全公社', '西山環境サービス', '家電リサイクル');
            }

            const allContractors = [...masterList];
            activeCbs.forEach(ct => { if (ct && !allContractors.includes(ct)) allContractors.push(ct); });

            allContractors.forEach(ct => {
                const isChecked = activeCbs.includes(ct);
                const hasDetails = allDisposalCompaniesMaster.some(c => c.name === ct);
                const badgeHtml = hasDetails ? '<span style="font-size:0.7rem; color:#1976d2; background:#e3f2fd; padding:2px 6px; border-radius:4px; margin-left:8px;">✅ マスタ登録済</span>' : '<span style="font-size:0.7rem; color:#d32f2f; background:#ffebee; padding:2px 6px; border-radius:4px; margin-left:8px;">⚠️ マスタ未登録</span>';
                
                const wrapper = document.createElement('div');
                wrapper.style.cssText = 'width:100%; margin-bottom:4px;';
                const label = document.createElement('label');
                label.style.cssText = 'display:flex; align-items:center; gap:4px; font-size:0.85rem; padding:6px 10px; background:#fff; border:1px solid var(--border); border-radius:6px; cursor:pointer;';
                const cb = document.createElement('input');
                cb.type = 'checkbox';
                cb.className = 'cust-contractor-cb';
                cb.value = ct;
                cb.checked = isChecked;
                label.appendChild(cb);
                label.appendChild(document.createTextNode(' ' + ct));
                
                const badgeSpan = document.createElement('span');
                badgeSpan.innerHTML = badgeHtml;
                label.appendChild(badgeSpan);
                
                wrapper.appendChild(label);

                // 処分項目サブリスト
                const items = CONTRACTOR_ITEMS[ct];
                if (items && items.length > 0) {
                    const subDiv = document.createElement('div');
                    subDiv.className = 'contractor-sub-items';
                    subDiv.style.cssText = `display:${isChecked ? 'flex' : 'none'}; flex-wrap:wrap; gap:4px; margin:4px 0 4px 24px; padding:6px 8px; background:#f0f7ff; border-radius:4px; border-left:3px solid var(--blue);`;
                    const savedItems = savedContractorItems[ct] || [];
                    items.forEach(item => {
                        const itemLabel = document.createElement('label');
                        itemLabel.style.cssText = 'display:flex; align-items:center; gap:3px; font-size:0.78rem; padding:2px 6px; background:#fff; border:1px solid #ddd; border-radius:3px; cursor:pointer; white-space:nowrap;';
                        itemLabel.innerHTML = `<input type="checkbox" class="contractor-item-cb" data-contractor="${utils.escapeHtml(ct)}" value="${utils.escapeHtml(item)}" ${savedItems.includes(item) ? 'checked' : ''}> ${utils.escapeHtml(item)}`;
                        subDiv.appendChild(itemLabel);
                    });
                    wrapper.appendChild(subDiv);

                    cb.addEventListener('change', function() {
                        subDiv.style.display = this.checked ? 'flex' : 'none';
                    });
                }

                contractorsListDiv.appendChild(wrapper);
            });

            if (cust) {
                document.getElementById('custContractsSection').style.display = 'block';
                loadCustContracts(cust.id);
            } else {
                document.getElementById('custContractsSection').style.display = 'none';
            }

            document.getElementById('custOverlay').classList.add('show');
        }

        // ── 事業所カード動的生成（2-1）──
        let _branchCounter = 0;

            const idx = _branchCounter;

            const headerLabel = data.branch_name ? utils.escapeHtml(data.branch_name) : `事業所 #${container.children.length + 1}`;
            card.innerHTML = `

                                <option value="オフィス" ${data.industry_type==='オフィス'?'selected':''}>オフィス</option>
                                <option value="ファミリー・単身" ${data.industry_type==='ファミリー・単身'?'selected':''}>ファミリー・単身</option>
                                <option value="その他" ${data.industry_type==='その他'?'selected':''}>その他</option>

                        </div>
                        <div class="form-group"><label>平均回収量</label><input type="text" class="br-volume" value="${utils.escapeHtml(data.average_volume || '')}" placeholder="例: 2m3/回"></div>
                    </div>
                    <div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;">

                    </div>
                    <div style="background:#f8f9fa;padding:10px;border-radius:8px;margin:8px 0;">
                        <label style="font-size:0.8rem;font-weight:700;">回収頻度</label>
                        <div style="display:grid;grid-template-columns:1fr 1fr;gap:6px;margin-top:6px;">
                            <div class="form-group" style="margin:0;"><label style="font-size:0.72rem;">一般ごみ</label><input type="text" class="br-freq-general" value="${utils.escapeHtml(data.collection_general || '')}" placeholder="毎日"></div>
                            <div class="form-group" style="margin:0;"><label style="font-size:0.72rem;">資源</label><input type="text" class="br-freq-recycle" value="${utils.escapeHtml(data.collection_recycle || '')}" placeholder="週2回"></div>
                            <div class="form-group" style="margin:0;"><label style="font-size:0.72rem;">プラ</label><input type="text" class="br-freq-plastic" value="${utils.escapeHtml(data.collection_plastic || '')}" placeholder="月1回"></div>
                            <div class="form-group" style="margin:0;"><label style="font-size:0.72rem;">段ボール</label><input type="text" class="br-freq-paper" value="${utils.escapeHtml(data.collection_paper || '')}" placeholder="週1回"></div>

                    </div>
                    <div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;">
                        <div class="form-group"><label>営業時間</label><input type="text" class="br-hours" value="${utils.escapeHtml(data.business_hours || '')}" placeholder="9:00-18:00"></div>

        function toggleBranch(header) {
            const body = header.nextElementSibling;
            const chevron = header.querySelector('.branch-chevron');
            if (body.style.display === 'none') {
                body.style.display = 'block';
                chevron.textContent = '▼';
            } else {
                body.style.display = 'none';
                chevron.textContent = '▶';
            }
        }

        function updateBranchCount() {
            const count = document.querySelectorAll('.branch-card').length;
            document.getElementById('branchCount').textContent = count > 0 ? `(${count}件)` : '';
        }

        function copyBillingToContract() {
            document.getElementById('custContractAddress').value = document.getElementById('custBillingAddress').value;
            document.getElementById('custContractEmail').value = document.getElementById('custBillingEmail').value;
            document.getElementById('custContractContact').value = document.getElementById('custBillingContact').value;
        }

        // ── 事業所データ収集 ──
        function collectBranches() {
            const branches = [];
            document.querySelectorAll('.branch-card').forEach(card => {
                const b = {
                    branch_name: card.querySelector('.br-name')?.value?.trim() || '',
                    branch_address: card.querySelector('.br-address')?.value?.trim() || '',
                    industry_type: card.querySelector('.br-industry')?.value || '',
                    average_volume: card.querySelector('.br-volume')?.value?.trim() || '',
                    vehicle_number: card.querySelector('.br-vehicle')?.value?.trim() || '',
                    subcontractor: card.querySelector('.br-subcontractor')?.value?.trim() || '',
                    collection_general: card.querySelector('.br-freq-general')?.value?.trim() || '',
                    collection_recycle: card.querySelector('.br-freq-recycle')?.value?.trim() || '',
                    collection_plastic: card.querySelector('.br-freq-plastic')?.value?.trim() || '',
                    collection_paper: card.querySelector('.br-freq-paper')?.value?.trim() || '',
                    business_hours: card.querySelector('.br-hours')?.value?.trim() || '',
                    regular_holiday: card.querySelector('.br-holiday')?.value?.trim() || '',
                    collection_start_date: card.querySelector('.br-start')?.value || '',
                    collection_end_date: card.querySelector('.br-end')?.value || '',
                };
                // 何か入力があるカードだけ保存
                if (Object.values(b).some(v => v)) branches.push(b);
            });
            return branches;
        }

        function addPricingRow(item = '', price = '', unit = 'kg') {
            const container = document.getElementById('pricingListContainer');
            let optionsHtml = '<option value="">-- 品目を選択 --</option>';
            let found = false;
            allTemplates.forEach(t => {
                const selected = (t.name === item) ? 'selected' : '';
                if (t.name === item) found = true;
                optionsHtml += `<option value="${utils.escapeHtml(t.name)}" data-price="${t.unit_price || ''}" data-unit="${utils.escapeHtml(t.unit || '')}" ${selected}>${utils.escapeHtml(t.name)}</option>`;
            });
            if (item && !found) {
                optionsHtml += `<option value="${utils.escapeHtml(item)}" selected>${utils.escapeHtml(item)}</option>`;
            }
            optionsHtml += '<option value="__custom__">✏️ 直接入力...</option>';

            const row = document.createElement('div');
            row.className = 'pricing-row';
            row.innerHTML = `
                <div style="flex:1; min-width:140px; position:relative;">
                    <select class="pr-item-sel" style="width:100%; border:1px solid var(--border); border-radius:6px; padding:8px; display:${(!item || found || item==='') ? 'block' : 'none'};" onchange="
                        const input = this.nextElementSibling;
                        if(this.value === '__custom__') {
                            this.style.display = 'none';
                            input.style.display = 'block';
                            input.focus();
                            input.value = '';
                        } else {
                            const opt = this.options[this.selectedIndex];
                            if(opt.dataset.price) this.parentElement.parentElement.querySelector('.pr-price').value = opt.dataset.price;
                            if(opt.dataset.unit) this.parentElement.parentElement.querySelector('.pr-unit').value = opt.dataset.unit;
                            input.value = this.value;
                        }
                    ">
                        ${optionsHtml}
                    </select>
                    <input type="text" class="pr-item" placeholder="品目を入力" style="width:100%; display:${(item && !found) ? 'block' : 'none'};" value="${utils.escapeHtml(item)}" onblur="
                        const sel = this.previousElementSibling;
                        if(this.value === '') {
                            this.style.display = 'none';
                            sel.style.display = 'block';
                            sel.selectedIndex = 0;
                        } else {
                            let opt = Array.from(sel.options).find(o => o.value === this.value);
                            if (!opt) {
                                opt = new Option(this.value, this.value);
                                sel.add(opt, sel.options.length - 1);
                            }
                            sel.value = this.value;
                            this.style.display = 'none';
                            sel.style.display = 'block';
                        }
                    ">
                </div>
                <input type="number" class="pr-price" placeholder="単価" style="width:100px; text-align:right;" value="${price}">
                <input type="text" class="pr-unit" placeholder="単位" style="width:60px;" value="${utils.escapeHtml(unit)}">
                <button type="button" style="background:var(--bg-secondary);border:1px solid var(--border);border-radius:6px;width:30px;height:35px;cursor:pointer;font-size:0.8rem;display:flex;align-items:center;justify-content:center;" onclick="movePricingRow(this.parentElement,-1)" title="上に移動">▲</button>
                <button type="button" style="background:var(--bg-secondary);border:1px solid var(--border);border-radius:6px;width:30px;height:35px;cursor:pointer;font-size:0.8rem;display:flex;align-items:center;justify-content:center;" onclick="movePricingRow(this.parentElement,1)" title="下に移動">▼</button>
                <button class="del-btn" style="height:35px;display:flex;align-items:center;justify-content:center;" onclick="this.parentElement.remove()">×</button>
            `;
            // 品目選択時に単価・単位を自動入力
            const itemInput = row.querySelector('.pr-item');
            itemInput.addEventListener('input', function() {
                const tpl = allTemplates.find(t => t.name === this.value);
                if (tpl) {
                    const priceInput = row.querySelector('.pr-price');
                    const unitInput = row.querySelector('.pr-unit');
                    if (!priceInput.value || priceInput.value === '0') priceInput.value = tpl.unit_price || '';
                    if (!unitInput.value || unitInput.value === 'kg') unitInput.value = tpl.unit || '';
                }
            });
            container.appendChild(row);
        }

        // ── O-4: 単価リスト行の並び替え ──
        function movePricingRow(row, direction) {
            const container = document.getElementById('pricingListContainer');
            const rows = Array.from(container.children);
            const idx = rows.indexOf(row);
            if (direction === -1 && idx > 0) {
                container.insertBefore(row, rows[idx - 1]);
            } else if (direction === 1 && idx < rows.length - 1) {
                container.insertBefore(rows[idx + 1], row);
            }
        }

            const formData = {

                branches: collectBranches(),

                payment_method: document.getElementById('custPaymentMethod').value,

                billing_email: document.getElementById('custBillingEmail').value.trim(),
                billing_contact: document.getElementById('custBillingContact').value.trim(),
                exclude_from_mailing: document.getElementById('custExcludeMailing').checked,
                // 契約書送付先（2-4）
                contract_address: document.getElementById('custContractAddress').value.trim(),
                contract_email: document.getElementById('custContractEmail').value.trim(),
                contract_contact: document.getElementById('custContractContact').value.trim(),
                pricing_list: pricing_list,
                active_contractors: activeContractors,
                contractor_items: contractorItems,
            };

            const body = {
                name: document.getElementById('custName').value.trim(),
                assigned_user_id: document.getElementById('custAssignedUser').value || null,
                contact_person: document.getElementById('custContact').value.trim(),
                address: document.getElementById('custAddress').value.trim(),
                phone: document.getElementById('custPhone').value.trim(),
                email: document.getElementById('custEmail').value.trim(),

        async function loadCustContracts(customerId) {
            const el = document.getElementById('custContractsList');
            if (el) {
                el.innerHTML = '<p style="font-size:0.8rem;color:var(--text-tertiary);">読み込み中...</p>';
            }

            try {
                const contracts = await RyubeeAPI.fetchCustomerContracts(customerId);
                if (!contracts || contracts.length === 0) {
                    el.innerHTML = '<p style="font-size:0.82rem;color:var(--text-tertiary);text-align:center;margin:8px 0;">3社契約なし</p>';
                    return;
                }

                // Sort by contract_date DESC, then created_at DESC
                const sortedContracts = [...contracts].sort((a, b) => {
                    const dateA = a.contract_date || a.created_at;
                    const dateB = b.contract_date || b.created_at;
                    return new Date(dateB) - new Date(dateA);
                });

                el.innerHTML = sortedContracts.map(c => {
                    const statusLabels = { pending: '未送付', sent: '送付済', returned: '返却済', completed: '完了' };
                    const statusClass = c.status || 'pending';
                    // 日付トラッキング表示
                    let tracking = '';
                    if (c.sent_date) tracking += `<span class="cc-track">📤 ${c.sent_date}</span>`;
                    if (c.returned_date) tracking += `<span class="cc-track">📥 ${c.returned_date}</span>`;
                    if (c.accepted) tracking += `<span class="cc-track cc-ok">✅ 排受OK</span>`;
                    if (c.manifest_registered) tracking += `<span class="cc-track cc-ok">📋 マニ登録</span>`;
                    if (c.completion_date) tracking += `<span class="cc-track">🏁 ${c.completion_date}</span>`;

                    // 単価・備考表示
                    let priceHtml = '';
                    if (c.unit_price != null) {
                        priceHtml = `<span style="font-size:0.72rem; color:var(--text-secondary); background:#eef2f6; padding:2px 6px; border-radius:4px; margin-left:6px; font-weight:700;">¥${c.unit_price.toLocaleString()}/${c.unit || 'kg'}</span>`;
                    }
                    let notesHtml = '';
                    if (c.notes) {
                        notesHtml = `<div style="font-size:0.75rem; color:var(--text-tertiary); margin-top:4px; border-top:1px dashed #eee; padding-top:4px; white-space:pre-wrap;">📝 ${utils.escapeHtml(c.notes)}</div>`;
                    }

                    let pdfHtml = '';
                    if (c.contract_pdf_url) {
                        pdfHtml = `
                            <div style="margin-top:8px; display:flex; gap:6px;">
                                <button type="button" class="btn btn-sm" style="background:#e3f2fd; color:#1976d2; border:none; padding:4px 8px; font-size:0.75rem;" onclick="event.stopPropagation(); handleDownloadPDF('${c.customer_id}', '${c.id}')">📄 PDFダウンロード</button>
                                <button type="button" class="btn btn-sm" style="background:#f5f5f5; color:#666; border:none; padding:4px 8px; font-size:0.75rem;" onclick="event.stopPropagation(); document.getElementById('uploadPdfInput_${c.id}').click()">📎 再アップロード</button>
                            </div>
                        `;
                    } else {
                        pdfHtml = `
                            <div style="margin-top:8px; display:flex; gap:6px;">
                                <button type="button" class="btn btn-sm" style="background:#e8f5e9; color:#2e7d32; border:none; padding:4px 8px; font-size:0.75rem;" onclick="event.stopPropagation(); handleGeneratePDF('${c.customer_id}', '${c.id}')">📄 契約書を生成</button>
                                <button type="button" class="btn btn-sm" style="background:#f5f5f5; color:#666; border:none; padding:4px 8px; font-size:0.75rem;" onclick="event.stopPropagation(); document.getElementById('uploadPdfInput_${c.id}').click()">📎 PDFをアップロード</button>
                            </div>
                        `;
                    }
                    
                    let uploadInputHtml = `<input type="file" id="uploadPdfInput_${c.id}" accept=".pdf,image/*" style="display:none;" onchange="handleUploadPDF('${c.customer_id}', '${c.id}', this)">`;

                    return `
                        <div class="contract-card" onclick="openCustContractModal('${c.id}')" style="display:block; padding:12px; height:auto;">
                            <div style="display:flex; justify-content:space-between; align-items:flex-start;">
                                <div class="cc-company" style="font-weight:700; font-size:0.85rem;">🏭 ${utils.escapeHtml(c.disposal_company || '–')}</div>
                                <span class="cc-status ${statusClass}" style="margin:0;">${statusLabels[statusClass] || '未送付'}</span>
                            </div>
                            <div class="cc-waste" style="margin-top:4px; margin-bottom:4px; font-size:0.8rem;">
                                ♻️ ${utils.escapeHtml(c.waste_type || '–')}
                                ${priceHtml}
                            </div>
                            ${tracking ? `<div class="cc-tracking" style="margin-top:6px; margin-bottom:4px;">${tracking}</div>` : ''}
                            ${notesHtml}
                            ${pdfHtml}
                            ${uploadInputHtml}
                        </div>
                    `;
                }).join('');
            } catch (e) {
                console.error(e);
                el.innerHTML = '<p style="font-size:0.82rem;color:var(--red);text-align:center;">3社契約 読込失敗</p>';
            }
        }

        function toggleBatchCompany(checkbox) {
            const company = checkbox.dataset.company;
            const row = checkbox.closest('.cc-batch-row');
            const chipsDiv = row.querySelector('.cc-batch-chips');
            chipsDiv.style.display = checkbox.checked ? 'flex' : 'none';
            if (!checkbox.checked) {
                row.querySelectorAll('.cc-waste-chip.selected').forEach(c => c.classList.remove('selected'));
                row.querySelectorAll('.cc-custom-waste').forEach(i => i.value = '');
            }
            updateBatchSummary();
        }

        function toggleBatchWaste(chip) {
            chip.classList.toggle('selected');
            updateBatchSummary();
        }

        function selectAllWaste(btn, company) {
            const row = btn.closest('.cc-batch-row');
            const chips = row.querySelectorAll('.cc-waste-chip:not(.cc-all-btn)');
            const allSelected = Array.from(chips).every(c => c.classList.contains('selected'));
            chips.forEach(c => {
                if (allSelected) c.classList.remove('selected');
                else c.classList.add('selected');
            });
            updateBatchSummary();
        }

        function updateBatchSummary() {
            const pairs = getBatchSelections();
            const el = document.getElementById('ccBatchSummary');
            if (el) {
                el.textContent = pairs.length > 0 ? `📋 ${pairs.length}件の契約を追加します` : '';
            }
        }

        function getBatchSelections() {
            const pairs = [];
            document.querySelectorAll('.cc-company-check:checked').forEach(cb => {
                const company = cb.dataset.company;
                const row = cb.closest('.cc-batch-row');
                const selectedChips = row.querySelectorAll('.cc-waste-chip.selected:not(.cc-all-btn)');
                const customInput = row.querySelector('.cc-custom-waste');
                if (selectedChips.length > 0) {
                    selectedChips.forEach(c => pairs.push({ company, waste: c.dataset.waste }));
                } else if (customInput && customInput.value.trim()) {
                    pairs.push({ company, waste: customInput.value.trim() });
                } else {
                    pairs.push({ company, waste: '' });
                }
            });
            return pairs;
        }

        async function saveCustContractBatch() {
            const pairs = getBatchSelections();
            if (pairs.length === 0) {
                alert('処分先を選択してください');
                return;
            }

            if (!editingId) {
                alert('顧客IDが未設定です。');
                return;
            }

            const btn = event?.target;
            if (btn) { btn.disabled = true; btn.textContent = '保存中...'; }

            try {
                let created = 0;
                for (const { company, waste } of pairs) {
                    console.log(`Creating contract: customer=${editingId}, company=${company}, waste=${waste}`);
                    await RyubeeAPI.createCustomerContract(editingId, {
                        disposal_company: company,
                        waste_type: waste,
                        status: 'pending',
                    });
                    created++;
                }
                showToast(`✅ ${created}件の契約を追加しました`);
                document.getElementById('contractModalOverlay').classList.remove('show');
                loadCustContracts(editingId);
            } catch (e) {
                console.error('Contract save error:', e);
                alert(`エラー: ${e.message}\n\n顧客ID: ${editingId}\n件数: ${pairs.length}`);
                if (btn) { btn.disabled = false; btn.textContent = '一括保存する'; }
            }
        }

        async function handleGeneratePDF(customerId, contractId) {
            try {
                showToast('生成中...');
                const res = await RyubeeAPI.generateContractPDF(customerId, contractId);
                showToast('✅ PDFを生成しました');
                loadCustContracts(customerId);
                if (res && res.pdf_url) {
                    window.open(RyubeeAPI.resolvePhotoUrl(res.pdf_url), '_blank');
                }
            } catch (e) {
                alert('エラー: ' + e.message);
            }
        }

        async function handleUploadPDF(customerId, contractId, inputEl) {
            if (!inputEl.files || inputEl.files.length === 0) return;
            const file = inputEl.files[0];
            try {
                showToast('アップロード中...');
                await RyubeeAPI.uploadContractPDF(customerId, contractId, file);
                showToast('✅ アップロード完了');
                loadCustContracts(customerId);
            } catch (e) {
                alert('エラー: ' + e.message);
            } finally {
                inputEl.value = '';
            }
        }

        async function handleDownloadPDF(customerId, contractId) {
            try {
                showToast('ダウンロード中...');
                const blob = await RyubeeAPI.downloadContractPDF(customerId, contractId);
                const url = window.URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.href = url;
                a.download = `contract_${contractId}.pdf`;
                document.body.appendChild(a);
                a.click();
                a.remove();
                window.URL.revokeObjectURL(url);
            } catch (e) {
                alert('エラー: ' + e.message);
            }
        }

        // ── O-1: Enterキーで次入力項目に移動 ──
        document.getElementById('custOverlay').addEventListener('keydown', function(e) {
            if (e.key === 'Enter' && (e.target.tagName === 'INPUT' || e.target.tagName === 'SELECT')) {
                e.preventDefault();
                const focusable = Array.from(this.querySelectorAll('input:not([type=hidden]):not([type=checkbox]), select, textarea'));
                const idx = focusable.indexOf(e.target);
                if (idx >= 0 && idx < focusable.length - 1) {
                    focusable[idx + 1].focus();
                }
            }
        });
    </script>
    <script>
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('sw.js').catch(e => console.log('SW registration failed:', e));
        }
    </script>
</body>

</html>
