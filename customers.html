<!DOCTYPE html>
<html lang="ja">

<head>
    <meta charset="UTF-8">
    <meta name="viewport"
        content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>顧客管理CRM — Ryu兵衛 山文SaaS</title>
    <meta name="apple-mobile-web-app-capable" content="yes">
    <link rel="stylesheet" href="assets/css/style.css">
    <style>
        .customers-header {
            background: #FFFFFF;
            padding: 30px 24px 20px;
            border-bottom: 1px solid var(--border);
        }

        .customers-header h1 {
            font-size: 1.8rem;
            margin-bottom: 6px;
        }

        .search-wrap {
            padding: 12px 20px;
        }

        .search-wrap input {
            width: 100%;
            padding: 12px 16px;
            border-radius: var(--r-pill);
            border: 1px solid var(--border);
            font-size: 0.95rem;
        }

        .customer-list {
            padding: 0 20px 120px;
        }

        .customer-card {
            background: #fff;
            border-radius: var(--r-xl);
            padding: 20px;
            margin-bottom: 12px;
            box-shadow: var(--shadow-sm);
            border: 1px solid var(--border);
            cursor: pointer;
            transition: transform 0.15s;
        }

        .customer-card:active {
            transform: scale(0.98);
        }

        .cc-top {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            margin-bottom: 8px;
        }

        .cc-name {
            font-weight: 700;
            font-size: 1.1rem;
        }

        .cc-meta {
            font-size: 0.85rem;
            color: var(--text-secondary);
            margin-bottom: 3px;
        }

        .cc-expiry {
            font-size: 0.8rem;
            color: var(--orange);
            font-weight: 600;
        }

        /* モーダル */
        .cust-modal-overlay {
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.36);
            backdrop-filter: blur(10px);
            display: none;
            z-index: 3000;
            align-items: flex-end;
            justify-content: center;
        }

        .cust-modal-overlay.show {
            display: flex;
        }

        .cust-modal {
            background: #fff;
            border-radius: var(--r-xl) var(--r-xl) 0 0;
            width: 100%;
            max-width: 600px;
            padding: 24px 20px 40px;
            max-height: 90vh;
            overflow-y: auto;
            animation: sheetUp 0.3s cubic-bezier(0.25, 1, 0.5, 1);
        }
    </style>
</head>

<body>

    <header class="customers-header">
        <h1>🏢 顧客管理</h1>
        <p style="color: var(--text-secondary); font-size: 0.9rem;">顧客の登録・編集・契約管理</p>
    </header>

    <div class="search-wrap">
        <input type="text" id="searchInput" placeholder="🔍 顧客名・住所・電話で検索..." oninput="filterCustomers()">
        <div style="display:flex; gap:8px; margin-top:12px;">
            <button class="btn btn-primary" id="btn-tab-all" style="flex:1" onclick="setCustTab('all')">全て</button>
            <button class="btn btn-secondary" id="btn-tab-a" style="flex:1"
                onclick="setCustTab('group_a')">10・15・25</button>
            <button class="btn btn-secondary" id="btn-tab-20" style="flex:1"
                onclick="setCustTab('group_20')">20日</button>
            <button class="btn btn-secondary" id="btn-tab-end" style="flex:1"
                onclick="setCustTab('group_end')">末日</button>
            <button class="btn btn-secondary" id="btn-tab-auto" style="flex:1"
                onclick="setCustTab('auto')">自動振替</button>
        </div>
    </div>

    <div class="customer-list" id="customerList">
        <p style="text-align:center; color: var(--text-tertiary); margin-top: 20px;">読み込み中...</p>
    </div>

    <button class="fab" onclick="openModal()">+</button>

    <!-- 顧客プレビューモーダル -->
    <div class="cust-modal-overlay" id="previewOverlay" onclick="if(event.target===this) this.classList.remove('show')">
        <div class="cust-modal" style="padding-top:16px;">
            <div class="modal-drag-handle"></div>
            <button class="modal-close"
                onclick="document.getElementById('previewOverlay').classList.remove('show')">✕</button>
            <div id="previewContent"></div>
            <button class="btn btn-primary mt-2" onclick="openEditFromPreview()">✏️ 編集する</button>
            <button class="btn btn-secondary mt-1"
                onclick="document.getElementById('previewOverlay').classList.remove('show')">閉じる</button>
        </div>
    </div>

    <!-- 顧客編集モーダル -->
    <div class="cust-modal-overlay" id="custOverlay">
        <div class="cust-modal">
            <style>
                .section-title {
                    font-size: 1.05rem;
                    margin: 24px 0 12px;
                    font-weight: 800;
                    color: var(--primary);
                    border-bottom: 2px solid var(--border);
                    padding-bottom: 6px;
                }

                .pricing-row {
                    display: flex;
                    gap: 8px;
                    margin-bottom: 8px;
                }

                .pricing-row input {
                    flex: 1;
                }

                .pricing-row .del-btn {
                    background: var(--danger);
                    color: white;
                    border: none;
                    border-radius: 8px;
                    width: 40px;
                    cursor: pointer;
                }
            </style>
            <div class="modal-drag-handle"></div>
            <h3 class="card-title" id="modalTitle">顧客を登録</h3>
            <input type="hidden" id="editId">

            <h4 class="section-title">🏢 基本情報</h4>
            <div style="display:grid;grid-template-columns:1fr 2fr;gap:8px;">
                <div class="form-group"><label>山文管理番号 *</label><input type="text" id="custYamabunNumber"
                        placeholder="例: Y-101"></div>
                <div class="form-group"><label>法人名 / 会社名 *</label><input type="text" id="custName" placeholder="株式会社○○">
                </div>
            </div>
            <div class="form-group">
                <label>廃棄物カテゴリ (管理用)</label>
                <select id="custWasteCategory">
                    <option value="general">一般ゴミ</option>
                    <option value="industrial">産業廃棄物</option>
                    <option value="large">大型ゴミ等</option>
                </select>
            </div>
            <div class="form-group"><label>ご住所</label><input type="text" id="custAddress" placeholder="京都市..."></div>
            <div class="form-group"><label>担当者名</label><input type="text" id="custContact" placeholder="山田太郎"></div>
            <div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;">
                <div class="form-group"><label>電話番号</label><input type="text" id="custPhone" placeholder="075-XXX-XXXX">
                </div>
                <div class="form-group"><label>携帯番号</label><input type="text" id="custMobile"
                        placeholder="090-XXXX-XXXX"></div>
            </div>
            <div class="form-group"><label>メールアドレス</label><input type="text" id="custEmail"
                    placeholder="info@example.com"></div>

            <h4 class="section-title">📍 事業所・回収情報</h4>
            <div class="form-group"><label>事業所名（店舗名・マンション名）</label><input type="text" id="custBranchName"></div>
            <div class="form-group"><label>事業所住所</label><input type="text" id="custBranchAddress"></div>
            <div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;">
                <div class="form-group"><label>業種形態</label>
                    <select id="custIndustryType">
                        <option value="">選択してください</option>
                        <option value="マンション">マンション</option>
                        <option value="飲食店">飲食店</option>
                        <option value="オフィス">オフィス</option>
                        <option value="ファミリー・単身">ファミリー・単身</option>
                        <option value="その他">その他</option>
                    </select>
                </div>
                <div class="form-group"><label>平均回収量</label><input type="text" id="custAvgVolume"
                        placeholder="例: 2m3/回"></div>
            </div>
            <div style="background:var(--bg-secondary);padding:12px;border-radius:var(--r-md);margin-bottom:12px;">
                <label style="font-size:0.85rem;font-weight:700;">回収頻度・内容</label>
                <div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:8px;">
                    <div class="form-group" style="margin:0;"><label style="font-size:0.75rem;">一般ごみ（可燃）</label><input
                            type="text" id="custFreqGeneral" placeholder="例: 毎日"></div>
                    <div class="form-group" style="margin:0;"><label style="font-size:0.75rem;">資源（缶ビンペット）</label><input
                            type="text" id="custFreqRecycle" placeholder="例: 週2回"></div>
                    <div class="form-group" style="margin:0;"><label style="font-size:0.75rem;">プラ産廃（包装）</label><input
                            type="text" id="custFreqPlastic" placeholder="例: 月1回"></div>
                    <div class="form-group" style="margin:0;"><label style="font-size:0.75rem;">ダンボール・雑紙</label><input
                            type="text" id="custFreqPaper" placeholder="例: 週1回"></div>
                </div>
            </div>
            <div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;">
                <div class="form-group"><label>営業時間</label><input type="text" id="custBusinessHours"
                        placeholder="9:00 - 18:00"></div>
                <div class="form-group"><label>定休日</label><input type="text" id="custHoliday" placeholder="土日祝"></div>
            </div>
            <div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;">
                <div class="form-group"><label>回収開始予定日</label><input type="date" id="custStartDate"></div>
                <div class="form-group"><label>終了日/解約日</label><input type="date" id="custEndDate"></div>
            </div>

            <h4 class="section-title">💰 請求・契約情報</h4>
            <div class="form-group">
                <label>契約タイプ</label>
                <select id="custType">
                    <option value="spot">スポット</option>
                    <option value="subscription">定期契約</option>
                </select>
            </div>
            <div class="form-group"><label>委託契約書 期限</label><input type="date" id="custExpiry"></div>

            <div style="background:var(--bg-secondary);padding:14px;border-radius:var(--r-md);margin:8px 0;">
                <label style="font-weight:700;font-size:0.85rem;">📅 締め・支払サイクル</label>
                <div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:8px;">
                    <div class="form-group" style="margin:0;">
                        <label style="font-size:0.78rem;">支払方法</label>
                        <select id="custPaymentMethod">
                            <option value="振込">振込</option>
                            <option value="自動引落し">自動引落し</option>
                        </select>
                    </div>
                    <div class="form-group" style="margin:0;">
                        <label style="font-size:0.78rem;">締め日</label>
                        <select id="custClosingDay">
                            <option value="31">月末</option>
                            <option value="25">25日</option>
                            <option value="20">20日</option>
                            <option value="15">15日</option>
                            <option value="10">10日</option>
                        </select>
                    </div>
                    <div class="form-group" style="margin:0;">
                        <label style="font-size:0.78rem;">支払月</label>
                        <select id="custPayMonthOffset">
                            <option value="0">当月</option>
                            <option value="1" selected>翌月</option>
                            <option value="2">翌々月</option>
                        </select>
                    </div>
                    <div class="form-group" style="margin:0;">
                        <label style="font-size:0.78rem;">支払日</label>
                        <select id="custPayDay">
                            <option value="31">月末</option>
                            <option value="25">25日</option>
                            <option value="20">20日</option>
                            <option value="15">15日</option>
                            <option value="10">10日</option>
                        </select>
                    </div>
                </div>
            </div>

            <div class="form-group"><label>ご請求先 宛名 / 住所</label><input type="text" id="custBillingAddress"
                    placeholder="○○株式会社 京都市..."></div>
            <div class="form-group"><label>ご請求先 メールアドレス (freee等)</label><input type="email" id="custBillingEmail"
                    placeholder="billing@example.com"></div>
            <div class="form-group"><label>ご請求先 ご担当者名</label><input type="text" id="custBillingContact"
                    placeholder="経理担当者名"></div>

            <h4 class="section-title">📄 単価・契約リスト</h4>
            <p style="font-size:0.8rem;color:var(--text-secondary);margin-bottom:12px;">顧客固有の品目別単価（例: 一般ごみ / 40 / kg）
            </p>
            <div id="pricingListContainer"></div>
            <button class="btn btn-secondary btn-sm mt-1" style="width:100%;" onclick="addPricingRow()">＋ 品目を追加</button>

            <div class="form-group mt-2"><label>社内用メモ</label><textarea id="custNotes"
                    placeholder="特記事項など..."></textarea></div>

            <div style="margin-top:24px;">
                <button class="btn btn-primary" id="saveBtn" onclick="saveCustomer()">登録する</button>
                <a class="btn btn-primary mt-1" id="printContractBtn"
                    style="display:none; text-align:center; text-decoration:none; background:#34C759; color:#fff;"
                    target="_blank">📄 産廃契約書を作成</a>
                <button class="btn btn-secondary mt-1" onclick="closeModal()">キャンセル</button>
                <button class="btn btn-danger mt-1" id="deleteBtn" onclick="deleteCustomer()" style="display:none;">🗑
                    削除</button>
            </div>
        </div>
    </div>

    <!-- Bottom Nav -->
    <nav class="bottom-nav">
        <a href="index.html" class="nav-item"><span class="nav-icon">🏠</span><span>ホーム</span></a>
        <a href="calendar.html" class="nav-item"><span class="nav-icon">📅</span><span>配車</span></a>
        <a href="pipeline.html" class="nav-item"><span class="nav-icon">📊</span><span>案件</span></a>
        <a href="billing.html" class="nav-item"><span class="nav-icon">💰</span><span>請求</span></a>
        <a href="customers.html" class="nav-item active"><span class="nav-icon">🏢</span><span>顧客</span></a>
    </nav>

    <script src="assets/js/utils.js"></script>
    <script src="assets/js/api.js"></script>
    <script>
        // 強制的にService Workerを解除する（一度だけ）
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.getRegistrations().then(function (registrations) {
                for (let registration of registrations) {
                    registration.unregister();
                }
            });
        }
    </script>
    <script>
        if (!RyubeeAPI.requireAuth()) throw new Error("Not authenticated");

        let allCustomers = [];
        let editingId = null;

        document.addEventListener('DOMContentLoaded', loadCustomers);

        async function loadCustomers() {
            try {
                allCustomers = await RyubeeAPI.fetchCustomers();
                allCustomers.forEach(c => {
                    try { c.parsed_form = JSON.parse(c.form_data || "{}"); } catch (e) { c.parsed_form = {}; }
                });
                filterCustomers();
            } catch (e) {
                document.getElementById('customerList').innerHTML = `<div class="alert alert-danger">${e.message}</div>`;
            }
        }

        let currentCustTab = 'all';
        function setCustTab(tab) {
            currentCustTab = tab;
            ['all', 'a', '20', 'end', 'auto'].forEach(k => {
                const el = document.getElementById('btn-tab-' + k);
                if (!el) return;
                const tabKey = k === 'a' ? 'group_a' : k === '20' ? 'group_20' : k === 'end' ? 'group_end' : k;
                el.className = 'btn ' + (tab === tabKey ? 'btn-primary' : 'btn-secondary');
            });
            filterCustomers();
        }

        function filterCustomers() {
            const q = document.getElementById('searchInput').value.toLowerCase();
            const filtered = allCustomers.filter(c => {
                const fd = c.parsed_form || {};
                let pricingItems = '';
                if (fd.pricing_list) pricingItems = fd.pricing_list.map(p => p.item).join(' ');

                const text = (
                    c.name + ' ' + (c.address || '') + ' ' + (c.phone || '') + ' ' + (c.contact_person || '') + ' ' + (c.email || '') +
                    ' ' + (fd.yamabun_management_number || '') +
                    ' ' + (fd.collection_general || '') + ' ' + (fd.collection_recycle || '') +
                    ' ' + (fd.collection_plastic || '') + ' ' + (fd.collection_paper || '') +
                    ' ' + pricingItems
                ).toLowerCase();

                const matchQ = text.includes(q);
                let matchT = true;
                const closingDay = c.billing_closing_day || 31;
                const payMethod = fd.payment_method || '振込';

                if (currentCustTab === 'group_a') {
                    matchT = [10, 15, 25].includes(closingDay);
                } else if (currentCustTab === 'group_20') {
                    matchT = closingDay === 20;
                } else if (currentCustTab === 'group_end') {
                    matchT = closingDay === 31;
                } else if (currentCustTab === 'auto') {
                    matchT = payMethod === '自動引落し';
                }
                return matchQ && matchT;
            });
            // 締め日順 -> 管理番号順にソート (Phase 5)
            filtered.sort((a, b) => {
                const dayA = a.billing_closing_day || 31;
                const dayB = b.billing_closing_day || 31;
                if (dayA !== dayB) return dayA - dayB;

                const numA = a.parsed_form?.yamabun_management_number || "";
                const numB = b.parsed_form?.yamabun_management_number || "";
                return numA.localeCompare(numB);
            });
            renderCustomers(filtered);
        }

        function renderCustomers(customers) {
            const list = document.getElementById('customerList');
            if (!customers.length) {
                list.innerHTML = '<p style="text-align:center;color:var(--text-tertiary);margin-top:30px;">顧客が見つかりません</p>';
                return;
            }
            list.innerHTML = customers.map(c => {
                const typeBadge = c.contract_type === 'subscription'
                    ? '<span class="badge badge-success">定期契約</span>'
                    : '<span class="badge badge-primary">スポット</span>';

                let wasteBadge = '<span class="badge" style="background:#48BB78; color:white;">一般</span>'; // general
                const wc = c.parsed_form?.waste_category;
                if (wc === 'industrial') wasteBadge = '<span class="badge" style="background:#5A67D8; color:white;">産廃</span>';
                if (wc === 'large') wasteBadge = '<span class="badge" style="background:#ED8936; color:white;">大型</span>';

                const expiry = c.contract_expiry_date
                    ? `<div class="cc-expiry">📋 契約期限: ${c.contract_expiry_date}</div>` : '';
                return `
                    <div class="customer-card" onclick="openPreview('${c.id}')">
                        <div class="cc-top">
                            <span class="cc-name">${utils.escapeHtml(c.name)}</span>
                            <div>${wasteBadge} ${typeBadge}</div>
                        </div>
                        ${c.parsed_form?.yamabun_management_number ? `<div class="cc-meta" style="font-weight:700; color:var(--primary); margin-top:2px; font-size:13px;">🎫 山文管理番号: ${utils.escapeHtml(c.parsed_form.yamabun_management_number)}</div>` : ''}
                        <div class="cc-meta" style="font-size:12px; color:var(--text-tertiary); margin-bottom:8px;">📅 締め日: ${c.billing_closing_day === 31 ? '月末' : c.billing_closing_day + '日'}締め</div>
                        ${c.contact_person ? `<div class="cc-meta">👤 ${utils.escapeHtml(c.contact_person)}</div>` : ''}
                        <div class="cc-meta">📍 ${utils.escapeHtml(c.address || '未設定')}</div>
                        <div class="cc-meta">📞 ${utils.escapeHtml(c.phone || '未設定')}</div>
                        ${c.email ? `<div class="cc-meta">✉️ ${utils.escapeHtml(c.email)}</div>` : ''}
                        ${expiry}
                    </div>
                `;
            }).join('');
        }

        function openModal(cust = null) {
            editingId = cust ? cust.id : null;
            document.getElementById('modalTitle').textContent = cust ? '顧客を編集' : '顧客を登録';
            document.getElementById('saveBtn').textContent = cust ? '更新する' : '登録する';
            document.getElementById('deleteBtn').style.display = cust ? 'block' : 'none';
            const printBtn = document.getElementById('printContractBtn');
            if (cust) {
                printBtn.style.display = 'block';
                printBtn.href = `contract-form.html?id=${cust.id}`;
            } else {
                printBtn.style.display = 'none';
            }
            document.getElementById('custName').value = cust?.name || '';
            document.getElementById('custContact').value = cust?.contact_person || '';
            document.getElementById('custAddress').value = cust?.address || '';
            document.getElementById('custPhone').value = cust?.phone || '';
            document.getElementById('custEmail').value = cust?.email || '';
            document.getElementById('custType').value = cust?.contract_type || 'spot';
            document.getElementById('custExpiry').value = cust?.contract_expiry_date || '';
            document.getElementById('custClosingDay').value = cust?.billing_closing_day || '31';
            document.getElementById('custPayMonthOffset').value = cust?.payment_due_month_offset ?? '1';
            document.getElementById('custPayDay').value = cust?.payment_due_day || '31';
            document.getElementById('custNotes').value = cust?.notes || '';

            // 拡張データ(JSON)の展開
            let fd = {};
            if (cust && cust.form_data) {
                try { fd = JSON.parse(cust.form_data); } catch (e) { }
            }
            document.getElementById('custYamabunNumber').value = fd.yamabun_management_number || '';
            document.getElementById('custWasteCategory').value = fd.waste_category || 'general';
            document.getElementById('custMobile').value = fd.mobile || '';
            document.getElementById('custBranchName').value = fd.branch_name || '';
            document.getElementById('custBranchAddress').value = fd.branch_address || '';
            document.getElementById('custIndustryType').value = fd.industry_type || '';
            document.getElementById('custAvgVolume').value = fd.average_volume || '';
            document.getElementById('custFreqGeneral').value = fd.collection_general || '';
            document.getElementById('custFreqRecycle').value = fd.collection_recycle || '';
            document.getElementById('custFreqPlastic').value = fd.collection_plastic || '';
            document.getElementById('custFreqPaper').value = fd.collection_paper || '';
            document.getElementById('custBusinessHours').value = fd.business_hours || '';
            document.getElementById('custHoliday').value = fd.regular_holiday || '';
            document.getElementById('custStartDate').value = fd.collection_start_date || '';
            document.getElementById('custEndDate').value = fd.collection_end_date || '';
            document.getElementById('custPaymentMethod').value = fd.payment_method || '振込';
            document.getElementById('custBillingAddress').value = fd.billing_address || '';
            document.getElementById('custBillingEmail').value = fd.billing_email || '';
            document.getElementById('custBillingContact').value = fd.billing_contact || '';

            // 単価リストの展開
            document.getElementById('pricingListContainer').innerHTML = '';
            if (fd.pricing_list && Array.isArray(fd.pricing_list) && fd.pricing_list.length > 0) {
                fd.pricing_list.forEach(p => addPricingRow(p.item, p.price, p.unit));
            } else {
                if (!cust) addPricingRow('', '', 'kg');
            }

            document.getElementById('custOverlay').classList.add('show');
        }

        function addPricingRow(item = '', price = '', unit = 'kg') {
            const container = document.getElementById('pricingListContainer');
            const row = document.createElement('div');
            row.className = 'pricing-row';
            row.innerHTML = `
                <input type="text" class="pr-item" placeholder="品名(例: 一般ごみ)" value="${utils.escapeHtml(item)}">
                <input type="number" class="pr-price" placeholder="単価" style="max-width:80px;" value="${price}">
                <input type="text" class="pr-unit" placeholder="単位(kg等)" style="max-width:70px;" value="${utils.escapeHtml(unit)}">
                <button class="del-btn" onclick="this.parentElement.remove()">×</button>
            `;
            container.appendChild(row);
        }

        function closeModal() { document.getElementById('custOverlay').classList.remove('show'); editingId = null; }

        let previewingId = null;
        async function openPreview(id) {
            const c = allCustomers.find(x => x.id === id);
            if (!c) return;
            previewingId = id;

            let fd = c.parsed_form || {};
            let history = [];
            try { history = await RyubeeAPI.fetchCustomerHistory(id); } catch (e) { }

            const pc = document.getElementById('previewContent');
            pc.innerHTML = `
                <h3 style="font-size:1.4rem;font-weight:700;margin-bottom:8px;">${utils.escapeHtml(c.name)}</h3>
                <div style="font-size:0.9rem; color:var(--text-secondary); margin-bottom:16px;">
                    ${fd.yamabun_management_number ? `🎫 山文管理番号: <strong style="color:var(--primary);">${utils.escapeHtml(fd.yamabun_management_number)}</strong><br>` : ''}
                    ${fd.waste_category === 'industrial' ? '♻️ 産業廃棄物' : fd.waste_category === 'large' ? '🛋 大型ゴミ等' : '🗑 一般ゴミ'} | 
                    ${c.contract_type === 'subscription' ? '🔄 定期契約' : '📍 スポット契約'}
                </div>
                
                <div style="background:var(--bg-secondary); padding:16px; border-radius:12px; margin-bottom:16px; font-size:0.95rem; line-height:1.6;">
                    📍 <strong style="margin-left:4px;">基本情報</strong><br>
                    <span style="display:inline-block;width:60px;color:var(--text-tertiary);font-size:0.85rem;">住所:</span> ${utils.escapeHtml(c.address || '-')} 
                    ${c.address ? `<a href="https://www.google.com/maps/search/?api=1&query=${encodeURIComponent(c.address)}" target="_blank" style="font-size:0.8rem;text-decoration:none;margin-left:8px;background:#E2E8F0;padding:2px 8px;border-radius:4px;color:var(--text-primary);">🗺 マップ</a>` : ''}<br>
                    <span style="display:inline-block;width:60px;color:var(--text-tertiary);font-size:0.85rem;">TEL:</span> ${utils.escapeHtml(c.phone || '-')} <span style="margin-left:8px;color:var(--text-tertiary);font-size:0.85rem;">携帯:</span> ${utils.escapeHtml(fd.mobile || '-')}<br>
                    <span style="display:inline-block;width:60px;color:var(--text-tertiary);font-size:0.85rem;">担当:</span> ${utils.escapeHtml(c.contact_person || '-')}<br>
                    <span style="display:inline-block;width:60px;color:var(--text-tertiary);font-size:0.85rem;">Email:</span> ${utils.escapeHtml(c.email || '-')}
                </div>
                
                <div style="background:var(--bg-secondary); padding:16px; border-radius:12px; margin-bottom:16px; font-size:0.95rem; line-height:1.6;">
                    📝 <strong style="margin-left:4px;">回収・契約情報</strong><br>
                    <span style="display:inline-block;width:70px;color:var(--text-tertiary);font-size:0.85rem;">開始予定:</span> ${utils.escapeHtml(fd.collection_start_date || '-')} <span style="margin-left:8px;color:var(--text-tertiary);font-size:0.85rem;">解約日:</span> <strong style="color:var(--danger);">${utils.escapeHtml(fd.collection_end_date || '-')}</strong><br>
                    <span style="display:inline-block;width:70px;color:var(--text-tertiary);font-size:0.85rem;">平均量:</span> ${utils.escapeHtml(fd.average_volume || '-')} <span style="color:var(--text-tertiary);font-size:0.75rem;">(※実績推移は今後実装)</span><br>
                    <span style="display:inline-block;width:70px;color:var(--text-tertiary);font-size:0.85rem;">一般ごみ:</span> ${utils.escapeHtml(fd.collection_general || '-')} <span style="margin-left:8px;color:var(--text-tertiary);font-size:0.85rem;">資源:</span> ${utils.escapeHtml(fd.collection_recycle || '-')}<br>
                    <span style="display:inline-block;width:70px;color:var(--text-tertiary);font-size:0.85rem;">支払締:</span> ${utils.escapeHtml(fd.payment_method || '振込')} / ${c.billing_closing_day === 31 ? '月末' : c.billing_closing_day + '日'}締め
                </div>

                <div style="margin-top:16px; display:grid; grid-template-columns:1fr 1fr; gap:8px;">
                    <a href="manifests.html?customer_id=${c.id}" class="btn btn-sm btn-secondary" style="text-align:center;text-decoration:none;padding:12px;">♻️ マニフェスト発行</a>
                    <a href="contract-form.html?id=${c.id}" class="btn btn-sm btn-secondary" style="text-align:center;text-decoration:none;padding:12px;">📄 契約書確認</a>
                </div>

                <!-- 履歴・対応ログ (CRM Timeline) -->
                <div style="margin-top:24px; padding-top:16px; border-top:1px solid var(--border);">
                    <h4 style="font-size:1rem;color:var(--text-primary);margin-bottom:12px;">🕰 対応履歴・メモ</h4>
                    <div style="display:flex;gap:8px;margin-bottom:16px;">
                        <input type="text" id="newHistoryNote" placeholder="クレームや追加依頼などをメモ..." style="flex:1;font-size:0.9rem;padding:10px;border-radius:8px;border:1px solid var(--border);">
                        <button class="btn btn-primary" style="padding:10px 16px;font-size:0.9rem;" onclick="addHistoryNote('${id}')">追記</button>
                    </div>
                    <div style="display:flex;flex-direction:column;gap:12px;">
                        ${history.length === 0 ? '<div style="font-size:0.85rem;color:var(--text-tertiary);text-align:center;padding:10px;">まだ履歴はありません</div>' :
                    history.map(h => `
                              <div style="background:var(--bg-secondary);padding:10px 12px;border-left:3px solid var(--blue);border-radius:0 8px 8px 0;font-size:0.85rem;">
                                  <div style="font-size:0.75rem;color:var(--text-tertiary);margin-bottom:4px;">
                                      📅 ${new Date(h.created_at).toLocaleDateString('ja-JP', { year: 'numeric', month: 'numeric', day: 'numeric', hour: '2-digit', minute: '2-digit' })}
                                  </div>
                                  <div style="color:var(--text-primary);white-space:pre-wrap;word-break:break-all;">${utils.escapeHtml(h.description)}</div>
                              </div>
                          `).join('')
                }
                    </div>
                </div>
            `;
            document.getElementById('previewOverlay').classList.add('show');
        }

        async function addHistoryNote(custId) {
            const input = document.getElementById('newHistoryNote');
            const text = input.value.trim();
            if (!text) return;
            try {
                await RyubeeAPI.addCustomerHistory(custId, text, 'note');
                input.value = '';
                showToast('✍️ 履歴を追加しました');
                openPreview(custId); // UIリフレッシュ
            } catch (e) {
                alert('エラー: ' + e.message);
            }
        }

        function openEditFromPreview() {
            document.getElementById('previewOverlay').classList.remove('show');
            openEdit(previewingId);
        }

        function openEdit(id) {
            const c = allCustomers.find(x => x.id === id);
            if (c) openModal(c);
        }

        async function saveCustomer() {
            const pricing_list = [];
            document.querySelectorAll('.pricing-row').forEach(row => {
                const item = row.querySelector('.pr-item').value.trim();
                const price = row.querySelector('.pr-price').value.trim();
                const unit = row.querySelector('.pr-unit').value.trim();
                if (item || price) pricing_list.push({ item, price, unit });
            });

            const formData = {
                yamabun_management_number: document.getElementById('custYamabunNumber').value.trim(),
                waste_category: document.getElementById('custWasteCategory').value,
                mobile: document.getElementById('custMobile').value.trim(),
                branch_name: document.getElementById('custBranchName').value.trim(),
                branch_address: document.getElementById('custBranchAddress').value.trim(),
                industry_type: document.getElementById('custIndustryType').value,
                average_volume: document.getElementById('custAvgVolume').value.trim(),
                collection_general: document.getElementById('custFreqGeneral').value.trim(),
                collection_recycle: document.getElementById('custFreqRecycle').value.trim(),
                collection_plastic: document.getElementById('custFreqPlastic').value.trim(),
                collection_paper: document.getElementById('custFreqPaper').value.trim(),
                business_hours: document.getElementById('custBusinessHours').value.trim(),
                regular_holiday: document.getElementById('custHoliday').value.trim(),
                collection_start_date: document.getElementById('custStartDate').value,
                collection_end_date: document.getElementById('custEndDate').value,
                payment_method: document.getElementById('custPaymentMethod').value,
                billing_address: document.getElementById('custBillingAddress').value.trim(),
                billing_email: document.getElementById('custBillingEmail').value.trim(),
                billing_contact: document.getElementById('custBillingContact').value.trim(),
                pricing_list: pricing_list
            };

            const body = {
                name: document.getElementById('custName').value.trim(),
                contact_person: document.getElementById('custContact').value.trim(),
                address: document.getElementById('custAddress').value.trim(),
                phone: document.getElementById('custPhone').value.trim(),
                email: document.getElementById('custEmail').value.trim(),
                contract_type: document.getElementById('custType').value,
                contract_expiry_date: document.getElementById('custExpiry').value || null,
                billing_closing_day: parseInt(document.getElementById('custClosingDay').value) || 31,
                payment_due_month_offset: parseInt(document.getElementById('custPayMonthOffset').value) || 1,
                payment_due_day: parseInt(document.getElementById('custPayDay').value) || 31,
                notes: document.getElementById('custNotes').value.trim(),
                form_data: JSON.stringify(formData)
            };
            if (!body.name) { alert('顧客名を入力してください'); return; }
            try {
                if (editingId) {
                    await RyubeeAPI.updateCustomer(editingId, body);
                    showToast('✅ 更新しました');
                } else {
                    await RyubeeAPI.createCustomer(body);
                    showToast('✅ 登録しました');
                }
                closeModal();
                loadCustomers();
            } catch (e) { alert('エラー: ' + e.message); }
        }

        async function deleteCustomer() {
            if (!editingId || !confirm('この顧客を削除しますか？')) return;
            try {
                await RyubeeAPI.deleteCustomer(editingId);
                closeModal();
                showToast('🗑 削除しました');
                loadCustomers();
            } catch (e) { alert('エラー: ' + e.message); }
        }

        function showToast(msg) {
            const t = document.createElement('div');
            t.textContent = msg;
            t.style.cssText = 'position:fixed;bottom:90px;left:50%;transform:translateX(-50%);background:#34C759;color:#fff;padding:10px 20px;border-radius:20px;font-weight:600;z-index:9999;';
            document.body.appendChild(t);
            setTimeout(() => t.remove(), 2500);
        }
    </script>
</body>

</html>
