<!DOCTYPE html>
<html lang="ja">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ログイン — Ryu兵衛</title>
    <link rel="stylesheet" href="assets/css/style.css">
    <style>
        body {
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 24px;
            padding-bottom: 24px;
            background: linear-gradient(155deg, #0A84FF 0%, #0055CC 50%, #0A3B8C 100%);
        }

        .login-wrap {
            width: 100%;
            max-width: 400px;
        }

        .logo-area {
            text-align: center;
            margin-bottom: 36px;
        }

        .logo-icon {
            width: 76px;
            height: 76px;
            background: rgba(255, 255, 255, 0.15);
            border: 1.5px solid rgba(255, 255, 255, 0.3);
            backdrop-filter: blur(12px);
            border-radius: 22px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 36px;
            margin: 0 auto 18px;
        }

        .logo-area h1 {
            font-size: 1.9rem;
            font-weight: 800;
            letter-spacing: -0.04em;
            color: #ffffff;
            margin-bottom: 6px;
        }

        .logo-area p {
            font-size: 0.9rem;
            color: rgba(255, 255, 255, 0.72);
            font-weight: 500;
        }

        .login-card {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(28px);
            -webkit-backdrop-filter: blur(28px);
            border-radius: 28px;
            padding: 32px 24px;
            box-shadow: 0 24px 60px rgba(0, 0, 0, 0.25), 0 8px 24px rgba(0, 0, 0, 0.12);
            border: 1px solid rgba(255, 255, 255, 0.6);
        }

        .login-card h2 {
            font-size: 1.05rem;
            font-weight: 700;
            margin-bottom: 24px;
            color: var(--text-primary);
            letter-spacing: -0.025em;
        }

        .login-card input,
        .login-card select {
            background: #F5F5F7;
            border-color: rgba(0, 0, 0, 0.07);
        }

        .forgot-link {
            display: block;
            text-align: center;
            margin-top: 20px;
            font-size: 0.88rem;
            color: var(--blue);
            font-weight: 600;
        }

        .bottom-nav {
            display: none;
        }

        .demo-note {
            text-align: center;
            margin-top: 20px;
            padding: 14px;
            background: rgba(255, 255, 255, 0.12);
            border-radius: 14px;
            border: 1px solid rgba(255, 255, 255, 0.2);
        }

        .demo-note p {
            font-size: 0.8rem;
            color: rgba(255, 255, 255, 0.7);
            font-weight: 500;
            line-height: 1.5;
        }

        .role-selector {
            display: flex;
            gap: 8px;
            margin-bottom: 20px;
        }

        .role-option {
            flex: 1;
            padding: 10px 8px;
            border-radius: 12px;
            border: 2px solid rgba(0, 0, 0, 0.07);
            background: #F5F5F7;
            text-align: center;
            cursor: pointer;
            transition: all 0.18s;
            font-size: 0.82rem;
            font-weight: 600;
            color: var(--text-secondary);
        }

        .role-option.selected {
            border-color: var(--blue);
            background: var(--blue-light);
            color: var(--blue-dark);
        }

        .role-option .role-icon {
            font-size: 1.5rem;
            display: block;
            margin-bottom: 4px;
        }
    </style>
</head>

<body>
    <div class="login-wrap">
        <div class="logo-area">
            <div class="logo-icon">📦</div>
            <h1>Ryu兵衛</h1>
            <p>現場見積もり AIアシスタント</p>
        </div>

        <div class="login-card">
            <h2>ログイン</h2>
            <form id="login-form" onsubmit="handleLogin(event)">
                <div class="form-group">
                    <label>メールアドレス</label>
                    <input type="email" id="email" required placeholder="example@company.com" autocomplete="email">
                </div>
                <div class="form-group">
                    <label>パスワード</label>
                    <input type="password" id="password" required placeholder="••••••••"
                        autocomplete="current-password">
                </div>

                <div class="form-group mb-0">
                    <label>権限 (デモ用)</label>
                    <div class="role-selector">
                        <div class="role-option selected" id="role-staff" onclick="selectRole('staff')">
                            <span class="role-icon">👷</span>現場スタッフ
                        </div>
                        <div class="role-option" id="role-admin" onclick="selectRole('admin')">
                            <span class="role-icon">👔</span>管理者
                        </div>
                    </div>
                </div>

                <input type="hidden" id="user-role" value="staff">
                <button type="submit" class="btn btn-primary" id="login-btn">ログイン</button>
            </form>

            <a href="#" class="forgot-link" onclick="alert('準備中です。')">パスワードをお忘れですか？</a>
        </div>

        <div class="demo-note">
            <p>※ デモ版のため、メールアドレスとパスワードは<br>何でも入力できます。権限を選んでログイン。</p>
        </div>
    </div>

    <script>
        let selectedRole = 'staff';

        function selectRole(role) {
            selectedRole = role;
            document.getElementById('user-role').value = role;
            document.getElementById('role-staff').classList.toggle('selected', role === 'staff');
            document.getElementById('role-admin').classList.toggle('selected', role === 'admin');
        }

        async function handleLogin(e) {
            e.preventDefault();
            const email = document.getElementById('email').value;
            const btn = document.getElementById('login-btn');

            btn.disabled = true;
            btn.textContent = '認証中…';

            setTimeout(() => {
                localStorage.setItem('ryubee_token', 'mock_token_' + Date.now());
                localStorage.setItem('ryubee_user_email', email);
                localStorage.setItem('ryubee_user_role', selectedRole);
                window.location.href = 'index.html';
            }, 800);
        }
    </script>
</body>

</html>
