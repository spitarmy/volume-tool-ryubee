<!DOCTYPE html>
<html lang="ja">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ログイン｜立米AI Ryu兵衛</title>
    <link rel="stylesheet" href="assets/css/style.css">
    <style>
        body {
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background: linear-gradient(135deg, #F2F2F7 0%, #E5E5EA 100%);
            padding: 0;
        }

        .login-container {
            width: 100%;
            max-width: 400px;
            padding: 24px;
        }

        .logo-area {
            text-align: center;
            margin-bottom: 32px;
        }

        .logo-area h1 {
            font-size: 1.8rem;
            margin-bottom: 8px;
            background: linear-gradient(135deg, var(--primary) 0%, var(--secondary) 100%);
            background-clip: text;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            font-weight: 800;
        }

        .logo-area p {
            color: var(--text-muted);
            font-size: 0.95rem;
            font-weight: 500;
        }

        .login-card {
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-radius: var(--border-radius-xl);
            padding: 32px 24px;
            box-shadow: var(--shadow-lg);
            border: 1px solid rgba(255, 255, 255, 0.5);
        }

        .login-card label {
            font-size: 0.8rem;
            font-weight: 700;
            color: #6E6E73;
        }

        .login-card input {
            background: rgba(0, 0, 0, 0.03);
            border: 1px solid rgba(0, 0, 0, 0.05);
            margin-bottom: 24px;
        }

        .login-card input:focus {
            background: #FFF;
            border-color: var(--primary);
        }

        .forgot-link {
            display: block;
            text-align: center;
            margin-top: 24px;
            font-size: 0.85rem;
            color: var(--primary);
            font-weight: 600;
        }

        /* ボトムナビはログイン画面では非表示 */
        .bottom-nav {
            display: none;
        }
    </style>
</head>

<body>

    <div class="login-container">
        <div class="logo-area">
            <div style="font-size: 48px; margin-bottom: 8px;">📦</div>
            <h1>Ryu兵衛</h1>
            <p>現場見積もりAIアシスタント</p>
        </div>

        <div class="login-card">
            <form id="login-form" onsubmit="handleLogin(event)">
                <div class="form-group mb-0">
                    <label>メールアドレス (会社名・ID)</label>
                    <input type="email" id="email" required placeholder="example@company.com">
                </div>

                <div class="form-group mb-0">
                    <label>パスワード</label>
                    <input type="password" id="password" required placeholder="••••••••">
                </div>

                <button type="submit" class="btn btn-primary" id="login-btn">
                    ログインして始める
                </button>
            </form>

            <a href="#" class="forgot-link" onclick="alert('パスワードのリセット機能は準備中です。')">パスワードをお忘れですか？</a>

            <!-- テスト用：設定画面への仮リンク -->
            <div class="text-center mt-2" style="border-top: 1px solid #eee; padding-top: 16px;">
                <span class="small-text">【デモ用】</span><br>
                <a href="index.html" class="forgot-link mt-1"
                    style="display:inline-block; margin-right: 12px; color: var(--text-muted);">ホームへスキップ</a>
                <a href="settings.html" class="forgot-link mt-1"
                    style="display:inline-block; color: var(--secondary);">料金設定（マスタ）へ</a>
            </div>
        </div>
    </div>

    <script src="assets/js/api.js"></script>
    <script src="assets/js/utils.js"></script>
    <script>
        async function handleLogin(e) {
            e.preventDefault();
            const email = document.getElementById('email').value;
            const pwd = document.getElementById('password').value;
            const btn = document.getElementById('login-btn');

            if (!email || !pwd) return;

            btn.disabled = true;
            btn.textContent = '認証中...';

            try {
                // --- 実際のAPIがある場合の処理 ---
                // const res = await api.login(email, pwd);
                // localStorage.setItem('ryubee_token', res.token);
                // localStorage.setItem('ryubee_company', res.company_name);

                // --- 仮：何が入力されても成功とし、モックトークンを入れてホーム画面へ ---
                setTimeout(() => {
                    localStorage.setItem('ryubee_token', 'mock_token_12345');
                    localStorage.setItem('ryubee_user_email', email);

                    alert(`ようこそ、${email} さん\n（※現在はマルチテナントUIの実装デモです）`);
                    window.location.href = 'index.html';
                }, 1000);

            } catch (err) {
                alert('ログインに失敗しました: ' + err.message);
                btn.disabled = false;
                btn.textContent = 'ログインして始める';
            }
        }
    </script>
</body>

</html>
