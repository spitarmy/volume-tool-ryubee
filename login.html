<!DOCTYPE html>
<html lang="ja">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ログイン — Ryu兵衛</title>
    <link rel="stylesheet" href="assets/css/style.css">
    <style>
        body {
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 24px;
            padding-bottom: 24px;
            background: var(--bg);
        }

        .login-wrap {
            width: 100%;
            max-width: 420px;
        }

        .logo-area {
            text-align: center;
            margin-bottom: 40px;
        }

        .logo-icon {
            width: 88px;
            height: 88px;
            background: #FFFFFF;
            border: 1px solid var(--border);
            box-shadow: var(--shadow-sm);
            border-radius: 28px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 42px;
            margin: 0 auto 24px;
        }

        .logo-area h1 {
            font-size: 2.2rem;
            font-weight: 800;
            letter-spacing: -0.02em;
            color: var(--text-primary);
            margin-bottom: 8px;
        }

        .logo-area p {
            font-size: 1rem;
            color: var(--text-secondary);
            font-weight: 500;
        }

        .login-card {
            background: #FFFFFF;
            border-radius: 32px;
            padding: 40px 32px;
            box-shadow: var(--shadow-md);
            border: 1px solid var(--border);
            position: relative;
            overflow: hidden;
        }

        .login-card h2 {
            font-size: 1.25rem;
            font-weight: 800;
            margin-bottom: 32px;
            color: var(--text-primary);
            letter-spacing: -0.01em;
            text-align: center;
        }

        .login-card input,
        .login-card select {
            background: var(--bg);
            border-color: var(--border);
            font-size: 1.1rem;
            padding: 16px 20px;
            border-radius: var(--r-lg);
        }

        .forgot-link {
            display: block;
            text-align: center;
            margin-top: 20px;
            font-size: 0.88rem;
            color: var(--blue);
            font-weight: 600;
        }

        .bottom-nav {
            display: none;
        }

        .demo-note {
            text-align: center;
            margin-top: 20px;
            padding: 14px;
            background: rgba(255, 255, 255, 0.12);
            border-radius: 14px;
            border: 1px solid rgba(255, 255, 255, 0.2);
        }

        .demo-note p {
            font-size: 0.8rem;
            color: rgba(255, 255, 255, 0.7);
            font-weight: 500;
            line-height: 1.5;
        }

        .error-msg {
            display: none;
            color: #ff3b30;
            font-size: 0.85rem;
            font-weight: 600;
            text-align: center;
            background: rgba(255, 59, 48, 0.08);
            border-radius: 10px;
            padding: 10px 14px;
            margin-bottom: 16px;
        }

        .register-link {
            display: block;
            text-align: center;
            margin-top: 14px;
            font-size: 0.88rem;
            color: var(--text-secondary);
            font-weight: 500;
        }

        .register-link a {
            color: var(--blue);
            font-weight: 700;
            text-decoration: underline;
            cursor: pointer;
        }

        /* ── 新規登録モーダル ── */
        .modal-backdrop {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.55);
            z-index: 1000;
            align-items: center;
            justify-content: center;
        }

        .modal-backdrop.open {
            display: flex;
        }

        .modal-box {
            background: #fff;
            border-radius: 24px;
            padding: 28px 22px;
            width: 92%;
            max-width: 420px;
            box-shadow: 0 24px 60px rgba(0, 0, 0, 0.3);
        }

        .modal-box h3 {
            font-size: 1rem;
            font-weight: 700;
            margin-bottom: 20px;
        }

        .modal-close-btn {
            float: right;
            background: none;
            border: none;
            font-size: 1.3rem;
            cursor: pointer;
            color: #888;
        }
    </style>
</head>

<body>
    <div class="login-wrap">
        <div class="logo-area">
            <div class="logo-icon">📦</div>
            <h1>Ryu兵衛</h1>
            <p>現場見積もり AIアシスタント</p>
        </div>

        <div class="login-card">
            <h2>ログイン</h2>
            <div class="error-msg" id="login-error"></div>
            <form id="login-form" onsubmit="handleLogin(event)">
                <div class="form-group">
                    <label>メールアドレス</label>
                    <input type="email" id="email" required placeholder="example@company.com" autocomplete="email">
                </div>
                <div class="form-group">
                    <label>パスワード</label>
                    <input type="password" id="password" required placeholder="••••••••"
                        autocomplete="current-password">
                </div>
                <button type="submit" class="btn btn-primary" id="login-btn">ログイン</button>
            </form>
            <a href="#" class="forgot-link" onclick="alert('準備中です。')" style="margin-top:16px">パスワードをお忘れですか？</a>
        </div>

        <div class="register-link">
            アカウントをお持ちでない方は
            <a onclick="openRegister()">新規会社登録</a>
        </div>
    </div>

    <!-- 新規会社登録モーダル -->
    <div class="modal-backdrop" id="register-modal">
        <div class="modal-box">
            <button class="modal-close-btn" onclick="closeRegister()">✕</button>
            <h3>🏢 新規会社登録</h3>
            <div class="error-msg" id="register-error"></div>
            <form id="register-form" onsubmit="handleRegister(event)">
                <div class="form-group">
                    <label>会社名</label>
                    <input type="text" id="reg-company" required placeholder="株式会社〇〇" />
                </div>
                <div class="form-group">
                    <label>メールアドレス（管理者）</label>
                    <input type="email" id="reg-email" required placeholder="admin@company.com" />
                </div>
                <div class="form-group">
                    <label>お名前</label>
                    <input type="text" id="reg-name" placeholder="山田 太郎" />
                </div>
                <div class="form-group">
                    <label>パスワード</label>
                    <input type="password" id="reg-password" required placeholder="8文字以上" />
                </div>
                <button type="submit" class="btn btn-primary" id="register-btn">アカウントを作成</button>
            </form>
        </div>
    </div>

    <script src="assets/js/api.js"></script>
    <script>
        // 既にログイン済みならリダイレクト
        if (localStorage.getItem('ryubee_token')) {
            window.location.href = 'index.html';
        }

        function showError(id, msg) {
            const el = document.getElementById(id);
            el.textContent = msg;
            el.style.display = 'block';
        }
        function hideError(id) {
            document.getElementById(id).style.display = 'none';
        }

        async function handleLogin(e) {
            e.preventDefault();
            hideError('login-error');
            const email = document.getElementById('email').value.trim();
            const password = document.getElementById('password').value;
            const btn = document.getElementById('login-btn');
            btn.disabled = true;
            btn.textContent = '認証中…';
            try {
                await RyubeeAPI.authLogin(email, password);
                window.location.href = 'index.html';
            } catch (err) {
                showError('login-error', err.message || 'ログインに失敗しました');
                btn.disabled = false;
                btn.textContent = 'ログイン';
            }
        }

        function openRegister() {
            document.getElementById('register-modal').classList.add('open');
        }
        function closeRegister() {
            document.getElementById('register-modal').classList.remove('open');
            hideError('register-error');
        }

        async function handleRegister(e) {
            e.preventDefault();
            hideError('register-error');
            const company = document.getElementById('reg-company').value.trim();
            const email = document.getElementById('reg-email').value.trim();
            const name = document.getElementById('reg-name').value.trim();
            const password = document.getElementById('reg-password').value;
            const btn = document.getElementById('register-btn');
            btn.disabled = true;
            btn.textContent = '作成中…';
            try {
                await RyubeeAPI.authRegister(company, email, password, name);
                window.location.href = 'index.html';
            } catch (err) {
                showError('register-error', err.message || '登録に失敗しました');
                btn.disabled = false;
                btn.textContent = 'アカウントを作成';
            }
        }
    </script>
</body>

</html>
