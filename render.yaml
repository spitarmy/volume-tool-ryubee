services:
  # バックエンドAPIサービス (FastAPI)
  - type: web
    name: ryubee-api-v2
    env: python
    region: singapore
    rootDir: ryubee-backend
    buildCommand: "pip install -r requirements.txt && playwright install chromium"
    startCommand: "uvicorn app.main:app --host 0.0.0.0 --port 10000"
    envVars:
      - key: PLAYWRIGHT_BROWSERS_PATH
        value: "/opt/render/project/src/.ms-playwright"
      - key: DATABASE_URL
        fromDatabase:
          name: ryubee-postgres
          property: connectionString
      - key: PYTHON_VERSION
        value: "3.11.0"
      - key: SECRET_KEY
        generateValue: true

  # 今回フロントエンドもRenderでホストしたい場合のStatic Web
  - type: web
    name: ryubee-frontend-app
    env: static
    buildCommand: "echo 'No build required'"
    staticPublishPath: "./"

databases:
  # PostgreSQLデータベース
  - name: ryubee-postgres
    region: singapore
    plan: free
