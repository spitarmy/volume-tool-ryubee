<!DOCTYPE html>
<html lang="ja">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ドライバー指示書 — Ryu兵衛</title>
    <link rel="stylesheet" href="assets/css/style.css">
    <style>
        @media print {
            @page {
                size: A4;
                margin: 5mm 10mm;
            }

            body {
                background: #fff;
                padding: 0;
            }

            .no-print {
                display: none !important;
            }

            .sheet {
                box-shadow: none;
                margin: 0;
                padding: 0;
                transform: scale(0.95);
                transform-origin: top left;
                width: 105%;
            }

            .driver-table th,
            .driver-table td {
                padding: 6px 8px;
                /* Compact padding for print */
                font-size: 0.9rem;
            }

            #photoSection.hidden-for-print {
                display: none !important;
            }
        }

        body {
            background: #f5f5f7;
        }

        .sheet-header {
            padding: 16px 20px;
            background: var(--glass-bg);
            backdrop-filter: var(--glass-blur);
            position: sticky;
            top: 0;
            z-index: 100;
            display: flex;
            align-items: center;
            justify-content: space-between;
            border-bottom: 0.5px solid rgba(0, 0, 0, 0.06);
        }

        .sheet {
            background: #fff;
            max-width: 800px;
            margin: 20px auto;
            padding: 40px;
            box-shadow: var(--shadow-md);
            border-radius: var(--r-xl);
        }

        .sheet h1 {
            font-size: 1.6rem;
            text-align: center;
            margin-bottom: 24px;
            border-bottom: 2px solid #333;
            padding-bottom: 12px;
        }

        .driver-table {
            width: 100%;
            border-collapse: collapse;
            font-size: 0.95rem;
            color: #111;
        }

        .driver-table th,
        .driver-table td {
            border: 2px solid #333;
            padding: 10px 12px;
        }

        .driver-table th {
            background: #f0f0f0;
            font-weight: 700;
        }

        .text-center {
            text-align: center;
        }

        .text-left {
            text-align: left;
        }

        .print-field {
            display: inline-block;
            width: 100%;
            min-height: 1.2rem;
        }

        .photo-gallery {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 10px;
            margin-top: 10px;
        }

        .photo-gallery img {
            width: 100%;
            height: 180px;
            object-fit: cover;
            border: 1px solid #d1d5db;
            border-radius: 4px;
        }

        @media screen and (max-width: 768px) {
            .sheet {
                padding: 16px;
                border-radius: 0;
                margin: 0;
            }

            .driver-table {
                font-size: 0.75rem;
            }

            .driver-table th,
            .driver-table td {
                padding: 6px 4px;
            }

            .sheet h1 {
                font-size: 1.2rem;
                margin-bottom: 12px;
                padding-bottom: 8px;
            }

            .photo-gallery {
                grid-template-columns: 1fr 1fr;
            }
        }
    </style>
</head>

<body>

    <div class="sheet-header no-print"
        style="display:flex; align-items:center; justify-content:space-between; padding:12px 16px;">
        <button onclick="if(document.referrer){history.back();}else{window.location.href='jobs.html';}"
            style="background:none; border:none; color:var(--primary); font-size:1.1rem; padding:8px 0; cursor:pointer; flex-shrink:0;">‹
            戻る</button>
        <h2
            style="font-size:1.1rem; margin:0; flex:1; text-align:center; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; padding:0 8px;">
            ドライバー指示書</h2>
        <div style="display:flex;align-items:center;gap:8px;flex-shrink:0;">
            <label id="photoToggleLabel" style="display:none;font-size:0.8rem;cursor:pointer;white-space:nowrap;">
                <input type="checkbox" id="photoToggle" onchange="togglePhotoPrint()" style="margin-right:4px;">📷 写真も印刷
            </label>
            <button onclick="window.print()" class="btn btn-primary"
                style="margin:0;padding:6px 12px;font-size:0.9rem;width:auto;flex-shrink:0;">🖨 印刷</button>
        </div>
    </div>

    <div class="sheet" id="driverSheet">
        <h1 style="border:none; margin-bottom: 12px;">収集運搬指示書</h1>

        <!-- Верхняя таблица -->
        <table class="driver-table">
            <tr>
                <th width="20%" class="text-left">コード / 締日</th>
                <td colspan="3"><span class="print-field" id="dsCodeClosing"></span></td>
                <th width="30%" class="text-center" style="font-size:1.1rem; letter-spacing:0.05em; line-height:1.8;">
                    引上げ ・ 交換 ・ 積込み</th>
            </tr>
            <tr>
                <th class="text-left">排出業者</th>
                <td colspan="4"><span class="print-field" id="dsCustomer"
                        style="font-size:1.1rem;font-weight:bold;"></span></td>
            </tr>
            <tr>
                <th class="text-left">担当者</th>
                <td width="25%"><span class="print-field" id="dsContact"></span></td>
                <th width="10%" class="text-center">電話</th>
                <td width="30%"><span class="print-field" id="dsPhone" style="font-size:1.05rem;"></span></td>
                <td width="15%" class="text-center">連絡必要</td>
            </tr>
            <tr>
                <th class="text-left">車両 / 号車</th>
                <td colspan="4"><span class="print-field"></span></td>
            </tr>
            <tr>
                <th class="text-left">運搬日 / 予定</th>
                <td colspan="4"><span class="print-field" id="dsWorkDate"></span></td>
            </tr>
            <tr>
                <th class="text-left">運転手</th>
                <td colspan="2"><span class="print-field" id="dsAssignee"></span></td>
                <th class="text-center">助手</th>
                <td><span class="print-field"></span></td>
            </tr>
            <tr>
                <th colspan="5" style="border-bottom:none;text-align:left;padding-top:16px;">※注意事項 / 現場情報</th>
            </tr>
            <tr>
                <td colspan="5" style="border-top:none;padding-bottom:16px;height:100px;vertical-align:top;">
                    <div id="dsNotes" style="font-size:0.95rem; white-space:pre-wrap;"></div>
                    <div id="dsAddress" style="font-size:0.9rem; margin-top: 8px;"></div>
                </td>
            </tr>
        </table>

        <!-- 大型ゴミ請求 -->
        <table class="driver-table" style="margin-top: 24px;">
            <tr style="height: 48px;">
                <th class="text-left" colspan="1" style="vertical-align:middle;">大型ごみ 請求:</th>
                <td colspan="3" class="text-left" style="vertical-align:middle;font-weight:bold;">
                    <span id="dsPrice" style="margin-right:20px;">円</span>
                    <span>・集金 ・事前振込済 ・請求書</span>
                </td>
            </tr>
        </table>

        <!-- 産業廃棄物 品目 混載 -->
        <table class="driver-table" style="margin-top: 24px;">
            <tr>
                <th colspan="4" class="text-center" style="font-size:1.05rem;">産業廃棄物 品目 混載</th>
            </tr>
            <tr>
                <td class="text-center" width="33%">木材</td>
                <td class="text-center" width="33%" colspan="2">廃プラ</td>
                <td class="text-center" width="33%">がれき類</td>
            </tr>
            <tr>
                <td class="text-center" colspan="2">機密文書(トータルエコ)FAX済</td>
                <td class="text-center" colspan="2">有機 連絡済</td>
            </tr>
            <tr style="height: 40px;">
                <th class="text-center">分別日</th>
                <td colspan="3" class="text-center">月　　　　　　　日</td>
            </tr>
            <tr style="height: 40px;">
                <th class="text-center">分別開始時間</th>
                <td colspan="3" class="text-center">時　　　　　　　分</td>
            </tr>
            <tr style="height: 40px;">
                <th class="text-center">分別終了時間</th>
                <td colspan="3" class="text-center">時　　　　　　　分</td>
            </tr>
            <tr style="height: 40px;">
                <th class="text-center">分別指導</th>
                <td colspan="3"></td>
            </tr>
            <tr style="height: 40px;">
                <th class="text-center">処分先</th>
                <td colspan="3"></td>
            </tr>
            <tr style="height: 40px;">
                <th class="text-center">処分完了日</th>
                <td colspan="3" class="text-center">令和　　　年　　　月　　　日(　　)</td>
            </tr>
        </table>

        <!-- 印刷後手書き用 特記事項ボックス -->
        <div style="margin-top: 24px; border: 2px solid #333; border-radius: 4px; padding: 12px;">
            <h3 style="font-size: 0.95rem; margin-bottom: 8px; color: #333;">📝 特記事項（現場メモ）</h3>
            <div style="min-height: 120px; width: 100%;"></div>
        </div>

        <div id="photoSection" style="display:none; margin-top:30px;">
            <h3 style="font-size:0.95rem;">📷 現場写真</h3>
            <div class="photo-gallery" id="dsPhotos"></div>
        </div>
    </div>

    <script src="assets/js/utils.js"></script>
    <script src="assets/js/api.js"></script>
    <script>
        if (!RyubeeAPI.requireAuth()) throw new Error("Not authenticated");

        const TYPE_LABELS = {
            store_removal: '店舗残置物撤去', estate: '遺品整理',
            welfare: '福祉残置物撤去', general_waste: '一般ゴミ収集', other: 'その他'
        };

        document.addEventListener('DOMContentLoaded', async () => {
            const jobId = new URLSearchParams(location.search).get('id');
            if (!jobId) { alert('案件IDが未指定です'); return; }
            try {
                const job = await RyubeeAPI.fetchJob(jobId);

                let customer = null;
                if (job.customer_id) {
                    try {
                        const allC = await RyubeeAPI.fetchCustomers();
                        customer = allC.find(c => c.id === job.customer_id);
                    } catch (e) { }
                }

                document.getElementById('dsCustomer').textContent = job.customer_name || '–';
                document.getElementById('dsWorkDate').textContent = job.work_date || '未定';
                document.getElementById('dsAssignee').textContent = job.assigned_to_name || '';

                let notes = `案件名: ${job.job_name || '–'}\n`;
                if (job.notes) {
                    let cleanNotes = job.notes;
                    // Remove legacy raw JSON dumps from older database records that stretch A4 prints
                    const jsonIdx1 = cleanNotes.indexOf('"items":');
                    if (jsonIdx1 !== -1) cleanNotes = cleanNotes.substring(0, cleanNotes.lastIndexOf('{', jsonIdx1)).trim();
                    const jsonIdx2 = cleanNotes.indexOf('\n{');
                    if (jsonIdx2 !== -1) cleanNotes = cleanNotes.substring(0, jsonIdx2).trim();
                    const jsonIdx3 = cleanNotes.indexOf('```json');
                    if (jsonIdx3 !== -1) cleanNotes = cleanNotes.substring(0, jsonIdx3).trim();

                    if (cleanNotes) notes += `メモ: ${cleanNotes}\n`;
                }
                document.getElementById('dsNotes').textContent = notes;

                document.getElementById('dsAddress').textContent = job.address ? `現場住所: ${job.address}` : '';
                document.getElementById('dsPrice').textContent = job.price_total ? job.price_total.toLocaleString() : '          ';

                if (customer) {
                    let codeText = `C-${customer.id.substring(0, 4).toUpperCase()} / `;
                    let closing = customer.billing_closing_day === 31 ? '末日' : `${customer.billing_closing_day}日`;
                    document.getElementById('dsCodeClosing').textContent = codeText + closing + '締';
                    if (customer.contact_person) document.getElementById('dsContact').textContent = customer.contact_person;
                    if (customer.phone) document.getElementById('dsPhone').textContent = customer.phone;
                }

                if (Array.isArray(job.photos) && job.photos.length) {
                    document.getElementById('photoSection').style.display = 'block';
                    document.getElementById('photoSection').classList.add('hidden-for-print');
                    document.getElementById('dsPhotos').innerHTML = job.photos.map(url =>
                        `<img src="${utils.escapeHtml(url)}" alt="現場写真">`
                    ).join('');
                    document.getElementById('photoToggleLabel').style.display = 'inline-flex';
                }
            } catch (e) { alert('読み込みエラー: ' + e.message); }
        });

        function togglePhotoPrint() {
            const section = document.getElementById('photoSection');
            const checked = document.getElementById('photoToggle').checked;
            if (checked) {
                section.classList.remove('hidden-for-print');
            } else {
                section.classList.add('hidden-for-print');
            }
        }
    </script>
</body>

</html>
