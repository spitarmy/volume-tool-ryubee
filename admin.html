<!DOCTYPE html>
<html lang="ja">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>管理者ダッシュボード｜立米AI Ryu兵衛</title>
    <link rel="stylesheet" href="assets/css/style.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

    <style>
        /* 管理者ダッシュボード専用スタイル */
        .dashboard-header {
            background: var(--surface-color);
            padding: 16px 20px;
            position: sticky;
            top: 0;
            z-index: 100;
            box-shadow: var(--shadow-sm);
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .kpi-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 12px;
            margin-bottom: 24px;
        }

        .kpi-card {
            background: var(--surface-solid);
            border-radius: var(--border-radius-xl);
            padding: 16px;
            box-shadow: var(--shadow-sm);
            border: 1px solid rgba(255, 255, 255, 0.8);
            display: flex;
            flex-direction: column;
            justify-content: center;
        }

        .kpi-label {
            font-size: 0.8rem;
            color: var(--text-muted);
            margin-bottom: 4px;
        }

        .kpi-value {
            font-size: 1.5rem;
            font-weight: bold;
            color: var(--primary);
        }

        .kpi-value.secondary {
            color: #34C759;
            /* iOS Green */
        }

        .chart-container {
            background: var(--surface-solid);
            border-radius: var(--border-radius-xl);
            padding: 16px;
            box-shadow: var(--shadow-sm);
            border: 1px solid rgba(255, 255, 255, 0.8);
            margin-bottom: 24px;
        }

        .list-item-staff {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px 0;
            border-bottom: 1px solid var(--border-color);
        }

        .list-item-staff:last-child {
            border-bottom: none;
        }

        .staff-name {
            font-weight: 600;
            font-size: 0.95rem;
        }

        .staff-sales {
            font-weight: bold;
            color: var(--text-main);
        }

        .staff-count {
            font-size: 0.8rem;
            color: var(--text-muted);
        }
    </style>
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#1A237E">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Ryu兵衛">
    <link rel="apple-touch-icon" href="assets/icons/icon-192.png">
</head>

<body>

    <div class="dashboard-header">
        <button onclick="window.location.href='index.html'" class="btn btn-secondary"
            style="margin:0; padding: 6px 12px; font-size: 0.9rem;">‹ ホーム</button>
        <h1 style="font-size: 1.1rem; margin: 0;">📊 管理者ボード</h1>
        <div style="width: 60px;"></div>
    </div>

    <div class="container pb-5">

        <!-- KPI Cards -->
        <div class="kpi-grid mt-3">
            <div class="kpi-card">
                <div class="kpi-label">今月の売上見込</div>
                <div class="kpi-value" id="kpi-sales">¥0</div>
            </div>
            <div class="kpi-card">
                <div class="kpi-label">今月の案件数</div>
                <div class="kpi-value secondary" id="kpi-jobs">0 件</div>
            </div>
            <div class="kpi-card">
                <div class="kpi-label">成約率 (見積→完了)</div>
                <div class="kpi-value" id="kpi-conversion" style="color: #FF9500;">0%</div>
            </div>
            <div class="kpi-card">
                <div class="kpi-label">平均単価</div>
                <div class="kpi-value" id="kpi-average">¥0</div>
            </div>
        </div>

        <!-- Chart: 売上推移 -->
        <h3 class="card-title text-primary mb-2">📈 直近7日間の売上推移</h3>
        <div class="chart-container">
            <canvas id="salesChart" height="200"></canvas>
        </div>

        <!-- Staff Ranking -->
        <div class="card mb-3">
            <h3 class="card-title text-primary"><span style="font-size:1.4rem;">🏆</span> 担当者別 成績</h3>
            <div id="staff-ranking-list">
                <!-- JSで挿入 -->
            </div>
        </div>

    </div>

    <script src="assets/js/utils.js"></script>
    <script src="assets/js/api.js"></script>
    <script>
        if (!RyubeeAPI.requireAuth()) throw new Error("Not authenticated");
        document.addEventListener('DOMContentLoaded', async () => {
            // 本来は管理者権限チェックを入れる
            const role = localStorage.getItem('ryubee_user_role');
            if (role !== 'admin') {
                alert("このページにアクセスする権限がありません。");
                window.location.href = 'index.html';
                return;
            }

            await loadDashboardData();
        });

        async function loadDashboardData() {
            try {
                // 1. サマリーデータの取得
                const summary = await RyubeeAPI.fetchAdminSummary();
                document.getElementById('kpi-sales').textContent = `¥${summary.month_sales.toLocaleString()}`;
                document.getElementById('kpi-jobs').textContent = `${summary.month_jobs} 件`;
                document.getElementById('kpi-conversion').textContent = `${summary.conversion_rate}%`;
                document.getElementById('kpi-average').textContent = `¥${summary.avg_price.toLocaleString()}`;

                // 2. 売上推移チャートデータの取得
                const chartData = await RyubeeAPI.fetchSalesChart();
                drawSalesChart(chartData);

                // 3. 担当者ランキングデータの取得
                const staffArr = await RyubeeAPI.fetchStaffRanking();

                // 担当者ランキング描画
                const staffListEl = document.getElementById('staff-ranking-list');
                staffListEl.innerHTML = '';

                if (!staffArr || staffArr.length === 0) {
                    staffListEl.innerHTML = '<p class="text-center small-text">データがありません</p>';
                } else {
                    staffArr.forEach((staff, index) => {
                        let rankMedal = `${index + 1}位`;
                        if (index === 0) rankMedal = '🥇';
                        if (index === 1) rankMedal = '🥈';
                        if (index === 2) rankMedal = '🥉';

                        staffListEl.innerHTML += `
                <div class="list-item-staff">
                  <div>
                    <span style="display:inline-block; width:24px; text-align:center; font-weight:bold; margin-right:8px;">${rankMedal}</span>
                    <span class="staff-name">${utils.escapeHtml(staff.user_name)}</span>
                  </div>
                  <div style="text-align:right;">
                    <div class="staff-sales">¥${(staff.sales || 0).toLocaleString()}</div>
                    <div class="staff-count">${staff.count}件</div>
                  </div>
                </div>
              `;
                    });
                }

            } catch (err) {
                console.error("Dashboard Error:", err);
            }
        }

        function drawSalesChart(chartData) {
            const ctx = document.getElementById('salesChart').getContext('2d');

            // APIのレスポンスは [{date: '03/01', sales: 10000}, ...]
            const labels = chartData.map(d => d.date);
            const dataPoints = chartData.map(d => d.sales);

            new Chart(ctx, {
                type: 'line',
                data: {
                    labels: labels,
                    datasets: [{
                        label: '売上 (円)',
                        data: dataPoints,
                        borderColor: '#0A84FF',
                        backgroundColor: 'rgba(10, 132, 255, 0.1)',
                        borderWidth: 3,
                        tension: 0.4,
                        fill: true,
                        pointBackgroundColor: '#fff',
                        pointBorderColor: '#0A84FF',
                        pointRadius: 4
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    plugins: {
                        legend: { display: false }
                    },
                    scales: {
                        y: {
                            beginAtZero: true,
                            ticks: {
                                callback: function (value) { return '¥' + value.toLocaleString(); }
                            }
                        }
                    }
                }
            });
        }
    </script>
    <script>
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('sw.js').catch(e => console.log('SW registration failed:', e));
        }
    </script>
</body>

</html>
