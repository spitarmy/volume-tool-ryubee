<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>許可証</title>
    <style>
        @page {
            size: A4;
            margin: 10mm;
        }
        body {
            margin: 0;
            padding: 0;
        }
        .image-page {
            page-break-before: always;
            width: 100%;
            height: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .image-page img {
            max-width: 100%;
            max-height: 270mm;
            object-fit: contain;
        }
        .title {
            text-align: center;
            font-size: 14px;
            margin-bottom: 5px;
            font-family: 'Noto Serif JP', serif;
        }
    </style>
</head>
<body>

{% for img_path in images %}
    <div class="image-page">
        <div>
            <div class="title">{{ img_path.title }}</div>
            <img src="{{ img_path.url }}" alt="許可証">
        </div>
    </div>
{% endfor %}

</body>
</html>
