    <style>

        /* 印刷/PDF生成用のA4コンテナ */
        .invoice-container {
            background: #fff;
            width: 100%;
            max-width: 800px;
            margin: 20px auto;
            padding: 40px;
            box-sizing: border-box;
            color: #000;
            font-family: 'Noto Sans JP', 'MS Mincho', sans-serif;
            font-size: 11pt;
            line-height: 1.5;
        }

        .title {
            text-align: center;
            margin-bottom: 30px;
            letter-spacing: 16px;
            font-size: 20pt;
        }

        .top-section {
            display: table;
            width: 100%;
            margin-bottom: 20px;
        }

        .left-box {
            display: table-cell;
            width: 50%;
            vertical-align: top;
        }

        .right-box {
            display: table-cell;
            width: 50%;
            vertical-align: top;
            text-align: right;
        }

        .customer-name {
            font-size: 16pt;
            border-bottom: 1px solid #000;
            margin-bottom: 8px;
            padding-bottom: 4px;
            width: 90%;
        }

        .customer-name-inner {
            display: table;
            width: 100%;
        }

        .customer-name-left {
            display: table-cell;
            text-align: left;
        }

        .customer-name-right {
            display: table-cell;
            text-align: right;
            vertical-align: bottom;
            white-space: nowrap;
            width: 80px;
        }

        .meta-table {
            width: 100%;
            border: none;
            font-size: 10pt;
            margin-bottom: 20px;
        }

        .meta-table td {
            text-align: right;
            padding: 2px;
        }

        .company-box {
            font-size: 11pt;
            line-height: 1.6;
            position: relative;
            text-align: left;
            margin-left: 15%;
        }

        .company-name {
            font-size: 14pt;
            margin-bottom: 8px;
            letter-spacing: 2px;
        }

        .middle-section {
            display: table;
            width: 100%;
            margin-bottom: 10px;
        }

        .bank-box {
            display: table-cell;
            width: 60%;
            vertical-align: bottom;
        }

        .elephant-box {
            display: table-cell;
            width: 40%;
            text-align: right;
            vertical-align: bottom;
        }

        .meta-inputs {
            font-size: 10pt;
            margin-bottom: 16px;
        }
        .meta-line {
            display: flex;
            align-items: center;
            margin-bottom: 4px;
        }
        .meta-line label {
            width: 100px;
        }
        .meta-line input {
            flex: 1;
            border: none;
            border-bottom: 1px solid #ccc;
            font-family: inherit;
            font-size: inherit;
            background: transparent;
        }

        .items-table {
            width: 100%;
            border-collapse: collapse;
            border: 2px solid #000;
            margin-bottom: 0;
        }

        .items-table th {
            border: 1px solid #000;
            border-bottom: 2px solid #000;
            padding: 6px;
            font-size: 11pt;
            font-weight: normal;
            text-align: center;
        }

        .items-table td {
            border: 1px solid #000;
            padding: 12px 10px; /* パディングを増やして行の高さを出す */
            font-size: 11pt;
            height: 40px; /* 明示的な高さも設定 */
        }

        .items-table .num {
            text-align: right;
        }
        
        .items-table .center {
            text-align: center;
        }

        .totals-table {
            width: 50%;
            border-collapse: collapse;
            border: 2px solid #000;
            border-top: none;
            float: right;
        }

        .totals-table td {
            padding: 6px 12px;
            font-size: 11pt;
        }

        .totals-table .label {
            border-right: 1px solid #000;
            background: #f8f9fa;
        }

        .totals-table .num {
            text-align: right;
            font-size: 12pt;
        }
        
        .clearfix::after {
            content: "";
            display: table;
            clear: both;
        }

        /* Editable row controls */
        .items-table input {
            border: 1px solid transparent;
            padding: 8px 6px; /* 入力欄も高さを合わせる */
            font-size: 11pt;
            background: transparent;
            width: 100%;
            box-sizing: border-box;
            font-family: inherit;
        }

        .items-table input:focus {
            outline: none;
            border-color: #ccc;
            background: #fafbfc;
        }

        .row-delete-btn {
            background: none;
            border: none;
            color: #DC2626;
            cursor: pointer;
            font-size: 16px;
            padding: 4px;
            border-radius: 4px;
            line-height: 1;
        }

        .row-delete-btn:hover {
            background: #FEE2E2;
        }

        .add-row-bar {
            text-align: center;
            margin: 8px 0 24px;
        }

        .add-row-bar button {
            background: #EFF6FF;
            border: 1px dashed #2563eb;
            color: #2563eb;
            font-weight: 600;
            font-size: 13px;
            padding: 8px 20px;
            border-radius: 6px;
            cursor: pointer;
        }

        .add-row-bar button:hover {
            background: #DBEAFE;
        }

        .app-header {
            background: var(--surface-color);
            padding: 16px 20px;
            position: sticky;
            top: 0;
            z-index: 100;
            box-shadow: var(--shadow-sm);
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .action-buttons {
            display: flex;
            gap: 12px;
            max-width: 800px;
            margin: 0 auto 40px auto;
            padding: 0 20px;
        }

        @media print {
            @page {
                size: A4;
                margin: 15mm;
            }

            body {
                background: #fff;
                margin: 0;
                padding: 0;
            }

            .app-header,
            .action-buttons,
            .bottom-nav {
                display: none !important;
            }

            .invoice-container {
                box-shadow: none;
                margin: 0;
                padding: 0;
                max-width: none;
                width: 100%;
            }

            .items-table input {
                border: none;
                background: transparent;
                padding: 0;
            }

            .row-delete-btn,
            .add-row-bar {
                display: none !important;
            }
        }

</style>

        <datalist id="item-presets">
            <!-- 品目マスターからAPIで動的読み込み -->
        </datalist>
        <script>
        // ★ 品目マスターを動的にロード
        (async function loadItemTemplates() {
            try {
                const token = localStorage.getItem('ryubee_token');
                const res = await fetch('https://ryubee-backend.onrender.com/v1/templates', {
                    headers: token ? { 'Authorization': `Bearer ${token}` } : {}
                });
                if (!res.ok) return;
                const templates = await res.json();
                window._itemTemplates = templates; // キャッシュ
                const dl = document.getElementById('item-presets');
                dl.innerHTML = '';
                templates.forEach(t => {
                    const opt = document.createElement('option');
                    opt.value = t.name;
                    opt.dataset.unitPrice = t.unit_price || '';
                    opt.dataset.unit = t.unit || '式';
                    dl.appendChild(opt);
                });
            } catch(e) { console.warn('品目マスター読込失敗:', e); }
        })();
        // 品目選択時に単価・単位を自動入力
        document.addEventListener('input', function(e) {
            if (!e.target.classList.contains('desc-input') || !window._itemTemplates) return;
            const tmpl = window._itemTemplates.find(t => t.name === e.target.value);
            if (!tmpl) return;
            const row = e.target.closest('tr');
            if (!row) return;
            const priceInput = row.querySelector('input[type="number"][oninput*="recalc"], input.price-input');
            const unitInput = row.querySelector('input.unit-input, select.unit-select');
            if (priceInput && tmpl.unit_price) priceInput.value = tmpl.unit_price;
            if (unitInput && tmpl.unit) unitInput.value = tmpl.unit;
            if (typeof recalcAll === 'function') recalcAll();
        });
        </script>

    <script>
        if (!RyubeeAPI.requireAuth()) throw new Error("Not authenticated");
        // URLから案件IDを取得
        const urlParams = new URLSearchParams(window.location.search);
        const jobId = urlParams.get('id');

        document.addEventListener('DOMContentLoaded', async () => {
            // 1. 会社情報の読み込み（APIから取得）
            try {
                const settings = await RyubeeAPI.fetchSettings();
                if (settings) {
                    document.getElementById('out-company-name').textContent = settings.company_name || '会社名未設定';
                    document.getElementById('out-company-address').textContent = settings.company_address || '';
                    document.getElementById('out-company-phone').textContent = settings.company_phone || '';
                    document.getElementById('out-company-invoice').textContent = settings.company_invoice_no || '未設定';
                    if (settings.company_logo) {
                        const logoEl = document.getElementById('out-company-logo');
                        logoEl.src = settings.company_logo;
                        logoEl.style.display = 'block';
                    }
                    if (settings.company_stamp) {
                        const stampEl = document.getElementById('out-company-stamp');
                        stampEl.src = settings.company_stamp;
                        stampEl.style.display = 'block';
                    }
                }
            } catch (e) {
                console.error('Settings load failed', e);
                // フォールバック: localStorageから
                const savedStr = localStorage.getItem('ryubee_pricing_settings');
                if (savedStr) {
                    try {
                        const settings = JSON.parse(savedStr);
                        document.getElementById('out-company-name').textContent = settings.company_name || '会社名未設定';
                        document.getElementById('out-company-address').textContent = settings.company_address || '';
                        document.getElementById('out-company-phone').textContent = settings.company_phone || '';
                        document.getElementById('out-company-invoice').textContent = settings.company_invoice_no || '未設定';
                    } catch (e) { }
                }
            }

            // 2. 案件データの読み込み
            if (!jobId) {
                alert("案件IDが指定されていません。");
                return;
            }

            try {
                const job = await RyubeeAPI.fetchJob(jobId);

                // ヘッダー・宛名情報
                const today = new Date();
                const todayStr = `${today.getFullYear()}年${today.getMonth() + 1}月${today.getDate()}日`;
                document.getElementById('out-date').textContent = todayStr;
                
                const rawName = job.customer_name || 'お客様';
                // Convert spaces to br if needed or just display as is
                document.getElementById('out-customer-name').innerHTML = utils.escapeHtml(rawName).replace(/\s/g, '<br>');
                document.getElementById('out-address').value = job.address || '';

                let fd = {};
                try { fd = JSON.parse(job.form_data || "{}"); } catch(e) {}

                if (fd.pic_name || fd.contact_name) document.getElementById('out-pic').value = fd.pic_name || fd.contact_name;
                if (fd.period) document.getElementById('out-period').value = fd.period;
                if (fd.validity) document.getElementById('out-validity').value = fd.validity;

                // 明細テーブル作成
                if (fd.estimate_items && fd.estimate_items.length > 0) {
                    fd.estimate_items.forEach(item => {
                        addItemRow(item.description, item.quantity, item.unit_price, item.unit || '', item.notes || '');
                    });
                } else {
                    const priceTotal = job.final_price || job.estimated_price || job.price_total || 0;
                    const subtotal = Math.round(priceTotal / 1.1);
                    addItemRow('不用品回収・運搬費一式', 1, subtotal, '式', '');
                }

                // 10行に満たない場合は空行を追加して見た目を整える
                fillEmptyRows();
                if (job.signature_data) {
                    const sigImg = document.getElementById('out-signature');
                    sigImg.src = job.signature_data;
                    document.getElementById('sig-container').style.display = 'flex';
                }

                // 敬称の設定
                if (job.customer_id) {
                    try {
                        const cust = await RyubeeAPI.fetchCustomer(job.customer_id);
                        if (cust) {
                            if (cust.address) {
                                document.getElementById('out-customer-address').textContent = cust.address;
                            }
                            if (cust.form_data) {
                                const cfd = JSON.parse(cust.form_data);
                                if (cfd.honorific) {
                                    document.getElementById('out-honorific').value = cfd.honorific;
                                }
                            }
                            customerEmail = cust.email || "";
                        }
                    } catch (e) { console.error(e); }
                }

            } catch (err) {
                alert("案件データの取得に失敗しました。");
                console.error(err);
            }
        });

        // ── Editable Row System ──
        let rowCounter = 0;

        function addItemRow(name, qty, unitPrice, unit, notes) {
            rowCounter++;
            const rid = 'row-' + rowCounter;
            const tbody = document.getElementById('out-table-body');
            
            // Remove empty filler rows if any
            document.querySelectorAll('.empty-filler-row').forEach(e => e.remove());

            const tr = document.createElement('tr');
            tr.id = rid;
            tr.className = "item-row";
            // 数量と単位を一つのカラムに表示させるため、inputを2つ並べる
            const unitVal = unit || '';
            const notesVal = notes || '';
            tr.innerHTML = `
                <td><input type="text" list="item-presets" value="${escAttr(name)}" oninput="recalcAll()" placeholder="品目名" class="desc-input"></td>
                <td style="display:flex; align-items:center; justify-content:center; height:100%;">
                    <input type="number" value="${qty}" style="width:40px; text-align:right;" oninput="recalcAll()" class="qty-input">
                    <input type="text" list="unit-presets" value="${escAttr(unitVal)}" placeholder="単位" style="width:40px; text-align:center; margin-left:4px;" class="unit-input">
                </td>
                <td><input type="number" value="${unitPrice}" style="text-align:right;" oninput="recalcAll()" class="price-input"></td>
                <td class="price amt-cell" style="text-align:right;">0</td>
                <td style="display:flex; align-items:center; height:100%;">
                    <input type="text" value="${escAttr(notesVal)}" placeholder="備考" style="width:100%;" class="notes-input">
                    <button class="row-delete-btn" onclick="deleteRow('${rid}')" title="削除">✕</button>
                </td>
            `;
            tbody.appendChild(tr);
            recalcAll();
            fillEmptyRows();
        }

        function fillEmptyRows() {
            const tbody = document.getElementById('out-table-body');
            const MIN_ROWS = 10;
            const currentRows = document.querySelectorAll('.item-row').length;
            
            // Remove existing fillers
            document.querySelectorAll('.empty-filler-row').forEach(e => e.remove());

            const rowsToAdd = MIN_ROWS - currentRows;
            for(let i=0; i<rowsToAdd; i++) {
                const tr = document.createElement('tr');
                tr.className = 'empty-filler-row';
                tr.innerHTML = `
                    <td></td>
                    <td></td>
                    <td></td>
                    <td></td>
                    <td></td>
                `;
                tbody.appendChild(tr);
            }
        }

        function deleteRow(rid) {
            const row = document.getElementById(rid);
            if (row) row.remove();
            recalcAll();
            fillEmptyRows();
        }

        function escAttr(s) {
            return (s || '').replace(/"/g, '&quot;').replace(/</g, '&lt;');
        }

        function recalcAll() {
            const rows = document.querySelectorAll('.item-row');
            let subtotal = 0;

            rows.forEach(tr => {
                const qtyInput = tr.querySelector('.qty-input');
                const priceInput = tr.querySelector('.price-input');
                if (!qtyInput || !priceInput) return;
                
                const qty = parseFloat(qtyInput.value) || 0;
                const unit = parseFloat(priceInput.value) || 0;
                const amt = Math.round(qty * unit);
                subtotal += amt;
                
                const amtCell = tr.querySelector('.amt-cell');
                if (amtCell) amtCell.textContent = amt.toLocaleString();
            });

            const taxAmt = Math.round(subtotal * 0.1);
            const total = subtotal + taxAmt;

            // Update header total
            document.getElementById('out-total-price').textContent = total.toLocaleString();

            // Update summary table
            document.getElementById('out-subtotal').textContent = subtotal.toLocaleString();
            document.getElementById('out-tax').textContent = taxAmt.toLocaleString();
            document.getElementById('out-total-bottom').textContent = total.toLocaleString();
        }

        async function saveEstimateItems() {
            const btn = document.getElementById('saveEstBtn');
            const origText = btn.textContent;
            btn.disabled = true;
            btn.textContent = "保存中...";

            const rows = document.querySelectorAll('.item-row');
            const items = [];
            rows.forEach(tr => {
                const desc = tr.querySelector('.desc-input')?.value.trim();
                const qty = parseFloat(tr.querySelector('.qty-input')?.value) || 0;
                const unit = tr.querySelector('.unit-input')?.value.trim() || '式';
                const price = parseFloat(tr.querySelector('.price-input')?.value) || 0;
                const notes = tr.querySelector('.notes-input')?.value.trim() || '';
                
                if (desc) {
                    items.push({ description: desc, quantity: qty, unit_price: price, unit: unit, notes: notes });
                }
            });

            const picName = document.getElementById('out-pic').value;
            const period = document.getElementById('out-period').value;
            const validity = document.getElementById('out-validity').value;
            
            try {
                const job = await RyubeeAPI.fetchJob(jobId);
                let fd = {};
                try { fd = JSON.parse(job.form_data || "{}"); } catch (e) {}
                
                fd.estimate_items = items;
                fd.pic_name = picName;
                fd.period = period;
                fd.validity = validity;
                
                const totalStr = document.getElementById('out-total-price').textContent.replace(/,/g, '');
                const totalAmt = parseInt(totalStr, 10) || 0;
                
                await RyubeeAPI.updateJob(jobId, { 
                    form_data: JSON.stringify(fd),
                    estimated_price: totalAmt,
                    price_total: totalAmt
                });
                
                // 履歴に自動記録
                if (job.customer_id) {
                    try {
                        const total = document.getElementById('out-total-price').textContent;
                        await RyubeeAPI.addCustomerHistory(job.customer_id, `見積書を作成/更新 (¥${total})`, 'note');
                    } catch(e) { console.error("History logging failed", e); }
                }

                alert("✅ 見積書の内容を保存しました！\n（請求書を発行する際、この項目が引き継がれます）");
            } catch (err) {
                alert("保存に失敗しました: " + err.message);
            } finally {
                btn.disabled = false;
                btn.textContent = origText;
            }
        }

        // ── Excel Upload ──
        function handleExcelUpload(e) {
            const file = e.target.files[0];
            if (!file) return;

            const reader = new FileReader();
            reader.onload = function(evt) {
                try {
                    const data = new Uint8Array(evt.target.result);
                    const workbook = XLSX.read(data, {type: 'array'});
                    const firstSheet = workbook.Sheets[workbook.SheetNames[0]];
                    const json = XLSX.utils.sheet_to_json(firstSheet, {header: 1});

                    if (json.length === 0) {
                        alert("データが空です");
                        return;
                    }

                    // ヘッダー行を探す (品目/内容 などの列が含まれる行)
                    let headerRowIdx = 0;
                    for (let i = 0; i < json.length; i++) {
                        const row = json[i].map(c => String(c).trim());
                        if (row.includes("品目") || row.includes("内容") || row.includes("品名")) {
                            headerRowIdx = i;
                            break;
                        }
                    }

                    const headers = json[headerRowIdx].map(c => String(c).trim());
                    const descIdx = headers.findIndex(h => h === '品目' || h === '内容' || h === '品名');
                    const qtyIdx = headers.findIndex(h => h === '数量');
                    const unitPriceIdx = headers.findIndex(h => h === '単価');
                    const unitIdx = headers.findIndex(h => h === '単位');
                    const noteIdx = headers.findIndex(h => h === '備考');

                    if (descIdx === -1) {
                        alert("「品目」または「内容」という列が見つかりません");
                        return;
                    }

                    // 現在の行をクリア
                    document.getElementById('out-table-body').innerHTML = '';
                    rowCounter = 0;

                    for (let i = headerRowIdx + 1; i < json.length; i++) {
                        const row = json[i];
                        if (!row || row.length === 0) continue;
                        
                        const desc = row[descIdx] || '';
                        if (!desc) continue; // 品目が空ならスキップ

                        const qty = qtyIdx >= 0 ? (parseFloat(row[qtyIdx]) || 1) : 1;
                        const unitPrice = unitPriceIdx >= 0 ? (parseFloat(row[unitPriceIdx]) || 0) : 0;
                        const unit = unitIdx >= 0 ? (row[unitIdx] || '式') : '式';
                        const note = noteIdx >= 0 ? (row[noteIdx] || '') : '';

                        addItemRow(desc, qty, unitPrice, unit, note);
                    }
                    
                    e.target.value = ''; // reset
                    alert("Excelを取り込みました");

                } catch (err) {
                    console.error(err);
                    alert("Excelの読み込みに失敗しました");
                }
            };
            reader.readAsArrayBuffer(file);
        }

        
        let customerEmail = "";

        function openEmailModal() {
            document.getElementById('emailModal').classList.add('show');
            document.getElementById('emailTo').value = customerEmail || "※顧客にメールアドレスが登録されていません";
        }
        function closeEmailModal() {
            document.getElementById('emailModal').classList.remove('show');
        }

        async function sendEstimateEmail() {
            if (!customerEmail) {
                alert("顧客のメールアドレスが登録されていません。顧客情報を編集してください。");
                return;
            }
            const btn = document.getElementById('sendEmailBtn');
            const subject = document.getElementById('emailSubject').value;
            const body = document.getElementById('emailBody').value;
            
            btn.disabled = true;
            btn.textContent = "送信中...";

            try {
                // まずPDFのBlobを生成する
                const element = document.getElementById('invoice-doc');
                const opt = {
                    margin: [15, 15, 15, 15],
                    filename: 'Estimate.pdf',
                    image: { type: 'jpeg', quality: 0.98 },
                    html2canvas: { scale: 2, useCORS: true },
                    jsPDF: { unit: 'mm', format: 'a4', orientation: 'portrait' }
                };

                const pdfBlob = await html2pdf().set(opt).from(element).output('blob');
                
                // FormDataを使って送信
                const formData = new FormData();
                formData.append('subject', subject);
                formData.append('body', body);
                formData.append('file', pdfBlob, 'Estimate.pdf');

                const res = await fetch(`https://ryubee-backend.onrender.com/v1/jobs/${jobId}/send-estimate`, {
                    method: 'POST',
                    headers: {
                        'Authorization': `Bearer ${localStorage.getItem('ryubee_token')}`
                    },
                    body: formData
                });

                if (!res.ok) {
                    const data = await res.json();
                    throw new Error(data.detail || "メール送信エラー");
                }
                
                // 履歴記録
                if (jobId) {
                    const job = await RyubeeAPI.fetchJob(jobId);
                    if (job && job.customer_id) {
                        await RyubeeAPI.addCustomerHistory(job.customer_id, `見積書をメール送信: ${subject}`, 'note');
                    }
                }

                alert("メールを送信しました！");
                closeEmailModal();
            } catch (err) {
                alert("送信失敗: " + err.message);
                console.error(err);
            } finally {
                btn.disabled = false;
                btn.textContent = "送信する";
            }
        }

        // html2pdf によるPDF生成機能
        function generatePDF() {
            const element = document.getElementById('invoice-doc');
            const customerName = document.getElementById('out-customer-name').textContent;
            const fileName = `御見積書_${customerName}_${new Date().getTime()}.pdf`;

            // Hide edit controls for PDF
            document.getElementById('addRowBar').style.display = 'none';
            document.querySelectorAll('.row-delete-btn').forEach(b => b.style.display = 'none');
            const saveBtn = document.getElementById('saveEstBtn');
            if (saveBtn) saveBtn.style.display = 'none';

            // Freeze inputs to plain text
            const allInputs = element.querySelectorAll('input');
            const savedData = [];
            allInputs.forEach(inp => {
                savedData.push({ el: inp, parent: inp.parentNode, val: inp.value });
                const span = document.createElement('span');
                
                let valStr = inp.value;
                if(inp.type === 'number') {
                    valStr = Number(inp.value).toLocaleString();
                }
                span.innerHTML = valStr;
                span.style.fontSize = '13px';
                
                // Inherit alignment and bold
                if (inp.style.textAlign === 'right') span.style.textAlign = 'right';
                if (inp.style.textAlign === 'center') span.style.textAlign = 'center';
                if (inp.style.fontWeight === 'bold') span.style.fontWeight = 'bold';
                
                inp.parentNode.replaceChild(span, inp);
                span._origInput = inp;
            });

            // Adjust borders for PDF
            const bordersToRestore = [];
            element.querySelectorAll('.inv-info-line-val span').forEach(s => {
                s.style.display = 'inline-block';
                s.style.width = '100%';
                s.style.borderBottom = '1px solid #ccc';
            });

            const opt = {
                margin: 0,
                filename: fileName,
                image: { type: 'jpeg', quality: 0.98 },
                html2canvas: { scale: 2, useCORS: true },
                jsPDF: { unit: 'in', format: 'letter', orientation: 'portrait' }
            };

            const restoreInputs = () => {
                savedData.forEach(d => {
                    const span = d.parent.querySelector('span');
                    if (span && span._origInput) {
                        d.parent.replaceChild(d.el, span);
                    }
                });
                document.getElementById('addRowBar').style.display = '';
                document.querySelectorAll('.row-delete-btn').forEach(b => b.style.display = '');
                const saveBtn = document.getElementById('saveEstBtn');
                if (saveBtn) saveBtn.style.display = '';
            };

            html2pdf().set(opt).from(element).outputPdf('blob').then((pdfBlob) => {
                restoreInputs();

                if (navigator.canShare && navigator.canShare({ files: [new File([pdfBlob], fileName, { type: 'application/pdf' })] })) {
                    const file = new File([pdfBlob], fileName, { type: 'application/pdf' });
                    navigator.share({
                        title: 'お見積書',
                        text: 'お見積書をPDFでお送りいたします。',
                        files: [file]
                    }).catch(console.error);
                } else {
                    html2pdf().set(opt).from(element).save();
                }
            }).catch(err => {
                restoreInputs();
                console.error('PDF generation failed', err);
            });
        }
    </script>
    <script>
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('sw.js').catch(e => console.log('SW registration failed:', e));
        }
    </script>
