<!DOCTYPE html>
<html lang="ja">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>お見積書｜立米AI Ryu兵衛</title>
    <link rel="stylesheet" href="assets/css/style.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>

    <style>
        body {
            background-color: #f5f5f7;
            margin: 0;
            padding: 0;
        }

        .app-header {
            background: var(--surface-color);
            padding: 16px 20px;
            position: sticky;
            top: 0;
            z-index: 100;
            box-shadow: var(--shadow-sm);
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        /* 印刷/PDF生成用のA4コンテナ */
        .invoice-container {
            background: #fff;
            width: 100%;
            max-width: 800px;
            margin: 20px auto;
            padding: 40px;
            box-sizing: border-box;
            color: #000;
            font-family: "MS Mincho", "Noto Serif JP", serif;
        }

        /* --- タイトル部 --- */
        .inv-title-container {
            text-align: center;
            margin-bottom: 20px;
        }
        .inv-title {
            display: inline-block;
            border: 1px solid #000;
            padding: 4px 60px;
            font-size: 24px;
            letter-spacing: 16px;
            font-weight: normal;
        }
        .inv-date {
            text-align: right;
            font-size: 13px;
            margin-top: 10px;
        }

        /* --- ヘッダー部 --- */
        .inv-top-wrapper {
            display: flex;
            justify-content: space-between;
            margin-bottom: 30px;
        }
        .inv-customer {
            width: 50%;
        }
        .inv-customer-name-wrapper {
            border-bottom: 1px solid #000;
            padding-bottom: 4px;
            margin-bottom: 8px;
            font-size: 20px;
        }
        .inv-greeting {
            font-size: 13px;
            margin-bottom: 20px;
        }
        
        /* 合計金額ボックス */
        .inv-total-box {
            display: flex;
            border: 2px solid #000;
            width: 90%;
            margin-bottom: 4px;
        }
        .inv-total-label {
            width: 40%;
            padding: 10px;
            text-align: center;
            font-size: 16px;
            letter-spacing: 4px;
            border-right: 1px solid #000;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .inv-total-price {
            width: 60%;
            padding: 10px;
            text-align: center;
            font-size: 22px;
            font-weight: bold;
        }
        .inv-tax-note {
            text-align: right;
            font-size: 11px;
            width: 90%;
            margin-bottom: 20px;
        }

        /* 詳細情報ライン */
        .inv-info-line {
            display: flex;
            align-items: center;
            border-bottom: 1px solid #000;
            padding: 6px 0;
            font-size: 13px;
            margin-bottom: 4px;
        }
        .inv-info-line-label {
            width: 100px;
            letter-spacing: 2px;
        }
        .inv-info-line-val {
            flex: 1;
        }

        /* --- 自社情報 --- */
        .inv-company {
            width: 40%;
            font-size: 13px;
            line-height: 1.6;
            text-align: center;
            padding-top: 50px;
            position: relative;
        }
        .inv-company-name {
            font-size: 18px;
            letter-spacing: 4px;
            margin-bottom: 8px;
        }
        .inv-company-address {
            margin-bottom: 4px;
        }

        /* --- テーブル --- */
        table.inv-table {
            width: 100%;
            border-collapse: collapse;
            border: 2px solid #000;
            margin-bottom: 32px;
        }
        .inv-table th,
        .inv-table td {
            border: 1px solid #000;
            padding: 8px;
            font-size: 13px;
        }
        .inv-table th {
            text-align: center;
            letter-spacing: 4px;
            font-weight: normal;
            border-bottom: 2px solid #000;
        }
        .inv-table td.center {
            text-align: center;
        }
        .inv-table td.right {
            text-align: right;
        }
        .inv-table td.qty {
            text-align: center;
        }
        .inv-table td.price {
            text-align: right;
        }
        
        /* 15行固定にするためのスタイル */
        .inv-table tbody tr {
            height: 32px;
        }

        /* まとめ行 */
        .summary-row td {
            border-top: 1px solid #000;
        }
        .summary-label {
            text-align: center;
            letter-spacing: 8px;
        }

        @media print {
            @page {
                size: A4;
                margin: 5mm 10mm;
            }

            body {
                background: #fff;
                margin: 0;
                padding: 0;
            }

            .app-header,
            .action-buttons,
            .bottom-nav {
                display: none !important;
            }

            .invoice-container {
                box-shadow: none;
                margin: 0;
                padding: 0;
                max-width: none;
                width: 105%;
                transform: scale(0.95);
                transform-origin: top left;
            }
        }

        @media screen and (max-width: 600px) {
            .app-header {
                padding: 12px;
            }

            .app-header h1 {
                font-size: 1rem;
            }

            .invoice-container {
                padding: 16px;
                margin: 0;
            }

            .inv-top-wrapper {
                flex-direction: column;
                gap: 20px;
                margin-bottom: 24px;
            }

            .inv-customer,
            .inv-company {
                width: 100%;
            }

            .inv-title {
                font-size: 20px;
            }

            .inv-footer-info {
                flex-direction: column;
                gap: 12px;
            }

            .inv-table th,
            .inv-table td {
                padding: 8px 4px;
                font-size: 12px;
            }
        }

        .action-buttons {
            display: flex;
            gap: 12px;
            max-width: 800px;
            margin: 0 auto 40px auto;
            padding: 0 20px;
        }

        /* Editable row controls */
        .inv-table input {
            border: 1px solid transparent;
            padding: 4px 6px;
            font-size: 13px;
            background: transparent;
            width: 100%;
            box-sizing: border-box;
            font-family: inherit;
        }

        .inv-table input:focus {
            outline: none;
            border-color: #ccc;
            background: #fafbfc;
        }

        .row-delete-btn {
            background: none;
            border: none;
            color: #DC2626;
            cursor: pointer;
            font-size: 16px;
            padding: 4px;
            border-radius: 4px;
            line-height: 1;
        }

        .row-delete-btn:hover {
            background: #FEE2E2;
        }

        .add-row-bar {
            text-align: center;
            margin: 8px 0 24px;
        }

        .add-row-bar button {
            background: #EFF6FF;
            border: 1px dashed #2563eb;
            color: #2563eb;
            font-weight: 600;
            font-size: 13px;
            padding: 8px 20px;
            border-radius: 6px;
            cursor: pointer;
        }

        .add-row-bar button:hover {
            background: #DBEAFE;
        }

        @media print {
            .inv-table input {
                border: none;
                background: transparent;
                padding: 0;
            }

            .row-delete-btn,
            .add-row-bar {
                display: none !important;
            }
        }
    </style>
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#1A237E">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Ryu兵衛">
    <link rel="apple-touch-icon" href="assets/icons/icon-192.png">
</head>

<body>

    <div class="app-header header-glass"
        style="background:var(--surface); display:flex; align-items:center; justify-content:space-between; padding:16px; border-bottom:1px solid var(--border);">
        <button onclick="history.back()"
            style="background:none; border:none; color:var(--primary); font-size:1.1rem; padding:8px 0; cursor:pointer; flex-shrink:0;">‹
            戻る</button>
        <h1
            style="font-size: 1.1rem; margin: 0; flex:1; text-align:center; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; padding:0 8px;">
            見積書プレビュー</h1>
        <div style="width: 60px; flex-shrink:0;"></div>
    </div>

    <div class="action-buttons mt-3">
        <button class="btn btn-secondary" onclick="saveEstimateItems()" style="flex:1; margin-right:8px;" id="saveEstBtn">
            💾 内容を保存
        </button>
        <button class="btn btn-primary" onclick="generatePDF()" style="flex:2;">
            📄 PDFを生成 / 共有
        </button>
    </div>

    <!-- PDF化される領域 -->
    <div class="invoice-container" id="invoice-doc">

        <div class="inv-title-container">
            <div class="inv-title">御見積書</div>
            <div class="inv-date"><span id="out-date">2025年10月16日</span></div>
        </div>

        <div class="inv-top-wrapper">
            <div class="inv-customer">
                <div class="inv-customer-name-wrapper">
                    <span id="out-customer-name">特別養護老人ホーム<br>アムールうずまさ</span><span style="float:right;">様</span>
                </div>
                <div class="inv-greeting">下記の通り御見積り申し上げます。</div>
                
                <div class="inv-total-box">
                    <div class="inv-total-label">合計金額</div>
                    <div class="inv-total-price">￥<span id="out-total-price">163,020</span></div>
                </div>
                <div class="inv-tax-note">（税込）</div>

                <div class="inv-info-line">
                    <div class="inv-info-line-label">担当者様：</div>
                    <div class="inv-info-line-val"><input type="text" id="out-pic" value="" placeholder="シマダ 様" style="border:none; border-bottom:1px solid #ccc; font-family:inherit;"></div>
                </div>
                <div class="inv-info-line">
                    <div class="inv-info-line-label">収集場所：</div>
                    <div class="inv-info-line-val"><input type="text" id="out-address" value="" placeholder="京都市右京区..." style="border:none; border-bottom:1px solid #ccc; font-family:inherit; width:100%;"></div>
                </div>
                <div class="inv-info-line">
                    <div class="inv-info-line-label">収集期間：</div>
                    <div class="inv-info-line-val"><input type="text" id="out-period" value="" style="border:none; border-bottom:1px solid #ccc; font-family:inherit; width:100%;"></div>
                </div>
                <div class="inv-info-line">
                    <div class="inv-info-line-label">見積有効期限：</div>
                    <div class="inv-info-line-val"><input type="text" id="out-validity" value="発行日より3か月" style="border:none; border-bottom:1px solid #ccc; font-family:inherit; width:100%;"></div>
                </div>
            </div>

            <div class="inv-company">
                <div class="inv-company-name" id="out-company-name">株式会社　山　文</div>
                <div class="inv-company-address" id="out-company-address">京都市伏見区深草西浦町2丁目61番地</div>
                <div class="inv-company-address">代表取締役　山本　和広</div>
                <div>TEL : <span id="out-company-phone">075-643-3456</span></div>
                <div>FAX : <span id="out-company-fax">075-643-3455</span></div>
                <!-- 登録番号などはデザインにないが、設定があれば裏に持っておくか小さく表示 -->
                <div style="margin-top: 4px; font-size: 10px; display:none;">登録番号: <span id="out-company-invoice">-</span></div>
                <img id="out-company-stamp" src="" alt="" style="max-width:80px; max-height:80px; position:absolute; right:10px; top:40px; opacity:0.85; display:none;">
            </div>
        </div>

        <datalist id="item-presets">
            <option value="産業廃棄物処理費（４ｔ）"></option>
            <option value="人件費"></option>
            <option value="収集運搬費"></option>
            <option value="マニフェスト"></option>
            <option value="リサイクル運搬料（洗濯機・ＴＶ・衣類乾燥機）"></option>
            <option value="不用品回収・運搬費一式"></option>
            <option value="金額調整"></option>
        </datalist>

        <table class="inv-table" id="inv-items-table">
            <thead>
                <tr>
                    <th style="width: 40%;">品　　目</th>
                    <th style="width: 15%;">数　量</th>
                    <th style="width: 15%;">単　価</th>
                    <th style="width: 15%;">金　額</th>
                    <th style="width: 15%;">備　考<span class="row-delete-btn" style="float:right; opacity:0;">✕</span></th>
                </tr>
            </thead>
            <tbody id="out-table-body">
                <!-- Rows will be injected here. Fixed 10 rows minimum visually. -->
            </tbody>
            <tbody id="out-summary-body">
                <tr class="summary-row">
                    <td colspan="2" class="summary-label">小計</td>
                    <td></td>
                    <td class="price" id="out-subtotal">0</td>
                    <td></td>
                </tr>
                <tr class="summary-row">
                    <td colspan="2" class="summary-label">消費税</td>
                    <td class="center">10 %</td>
                    <td class="price" id="out-tax">0</td>
                    <td></td>
                </tr>
                <tr class="summary-row">
                    <td colspan="2" class="summary-label" style="border-bottom: 2px solid #000;">合　　計</td>
                    <td style="border-bottom: 2px solid #000;"></td>
                    <td class="price" id="out-total-bottom" style="border-bottom: 2px solid #000;">0</td>
                    <td style="border-bottom: 2px solid #000;"></td>
                </tr>
            </tbody>
        </table>

        <div class="add-row-bar" id="addRowBar">
            <button onclick="addItemRow('', 1, 0, '式', '')">＋ 行を追加</button>
        </div>

        <!-- サイン印字エリア -->
        <div class="inv-signature-box" id="sig-container" style="display: none;">
            <div class="inv-sig-label">上記内容にて承諾いたしました。ご署名：</div>
            <img id="out-signature" class="inv-sig-img" src="" alt="お客様サイン">
        </div>

    </div>

    <script src="assets/js/utils.js"></script>
    <script src="assets/js/api.js"></script>
    <script>
        if (!RyubeeAPI.requireAuth()) throw new Error("Not authenticated");
        // URLから案件IDを取得
        const urlParams = new URLSearchParams(window.location.search);
        const jobId = urlParams.get('id');

        document.addEventListener('DOMContentLoaded', async () => {
            // 1. 会社情報の読み込み（APIから取得）
            try {
                const settings = await RyubeeAPI.fetchSettings();
                if (settings) {
                    document.getElementById('out-company-name').textContent = settings.company_name || '会社名未設定';
                    document.getElementById('out-company-address').textContent = settings.company_address || '';
                    document.getElementById('out-company-phone').textContent = settings.company_phone || '';
                    document.getElementById('out-company-invoice').textContent = settings.company_invoice_no || '未設定';
                    if (settings.company_logo) {
                        const logoEl = document.getElementById('out-company-logo');
                        logoEl.src = settings.company_logo;
                        logoEl.style.display = 'block';
                    }
                    if (settings.company_stamp) {
                        const stampEl = document.getElementById('out-company-stamp');
                        stampEl.src = settings.company_stamp;
                        stampEl.style.display = 'block';
                    }
                }
            } catch (e) {
                console.error('Settings load failed', e);
                // フォールバック: localStorageから
                const savedStr = localStorage.getItem('ryubee_pricing_settings');
                if (savedStr) {
                    try {
                        const settings = JSON.parse(savedStr);
                        document.getElementById('out-company-name').textContent = settings.company_name || '会社名未設定';
                        document.getElementById('out-company-address').textContent = settings.company_address || '';
                        document.getElementById('out-company-phone').textContent = settings.company_phone || '';
                        document.getElementById('out-company-invoice').textContent = settings.company_invoice_no || '未設定';
                    } catch (e) { }
                }
            }

            // 2. 案件データの読み込み
            if (!jobId) {
                alert("案件IDが指定されていません。");
                return;
            }

            try {
                const job = await RyubeeAPI.fetchJob(jobId);

                // ヘッダー・宛名情報
                const today = new Date();
                const todayStr = `${today.getFullYear()}年${today.getMonth() + 1}月${today.getDate()}日`;
                document.getElementById('out-date').textContent = todayStr;
                
                const rawName = job.customer_name || 'お客様';
                // Convert spaces to br if needed or just display as is
                document.getElementById('out-customer-name').innerHTML = utils.escapeHtml(rawName).replace(/\s/g, '<br>');
                document.getElementById('out-address').value = job.address || '';

                let fd = {};
                try { fd = JSON.parse(job.form_data || "{}"); } catch(e) {}

                if (fd.pic_name) document.getElementById('out-pic').value = fd.pic_name;
                if (fd.period) document.getElementById('out-period').value = fd.period;
                if (fd.validity) document.getElementById('out-validity').value = fd.validity;

                // 明細テーブル作成
                if (fd.estimate_items && fd.estimate_items.length > 0) {
                    fd.estimate_items.forEach(item => {
                        addItemRow(item.description, item.quantity, item.unit_price, item.unit || '', item.notes || '');
                    });
                } else {
                    const priceTotal = job.price_total || 0;
                    const subtotal = Math.round(priceTotal / 1.1);
                    addItemRow('不用品回収・運搬費一式', 1, subtotal, '式', '');
                }

                // 10行に満たない場合は空行を追加して見た目を整える
                fillEmptyRows();
                if (job.signature_data) {
                    const sigImg = document.getElementById('out-signature');
                    sigImg.src = job.signature_data;
                    document.getElementById('sig-container').style.display = 'flex';
                }

            } catch (err) {
                alert("案件データの取得に失敗しました。");
                console.error(err);
            }
        });

        // ── Editable Row System ──
        let rowCounter = 0;

        function addItemRow(name, qty, unitPrice, unit, notes) {
            rowCounter++;
            const rid = 'row-' + rowCounter;
            const tbody = document.getElementById('out-table-body');
            
            // Remove empty filler rows if any
            document.querySelectorAll('.empty-filler-row').forEach(e => e.remove());

            const tr = document.createElement('tr');
            tr.id = rid;
            tr.className = "item-row";
            // 数量と単位を一つのカラムに表示させるため、inputを2つ並べる
            const unitVal = unit || '';
            const notesVal = notes || '';
            tr.innerHTML = `
                <td><input type="text" list="item-presets" value="${escAttr(name)}" oninput="recalcAll()" placeholder="品目名" class="desc-input"></td>
                <td style="display:flex; align-items:center; justify-content:center; height:100%;">
                    <input type="number" value="${qty}" style="width:40px; text-align:right;" oninput="recalcAll()" class="qty-input">
                    <input type="text" value="${escAttr(unitVal)}" placeholder="単位" style="width:30px; text-align:center; margin-left:4px;" class="unit-input">
                </td>
                <td><input type="number" value="${unitPrice}" style="text-align:right;" oninput="recalcAll()" class="price-input"></td>
                <td class="price amt-cell" style="text-align:right;">0</td>
                <td style="display:flex; align-items:center; height:100%;">
                    <input type="text" value="${escAttr(notesVal)}" placeholder="備考" style="width:100%;" class="notes-input">
                    <button class="row-delete-btn" onclick="deleteRow('${rid}')" title="削除">✕</button>
                </td>
            `;
            tbody.appendChild(tr);
            recalcAll();
            fillEmptyRows();
        }

        function fillEmptyRows() {
            const tbody = document.getElementById('out-table-body');
            const MIN_ROWS = 10;
            const currentRows = document.querySelectorAll('.item-row').length;
            
            // Remove existing fillers
            document.querySelectorAll('.empty-filler-row').forEach(e => e.remove());

            const rowsToAdd = MIN_ROWS - currentRows;
            for(let i=0; i<rowsToAdd; i++) {
                const tr = document.createElement('tr');
                tr.className = 'empty-filler-row';
                tr.innerHTML = `
                    <td></td>
                    <td></td>
                    <td></td>
                    <td></td>
                    <td></td>
                `;
                tbody.appendChild(tr);
            }
        }

        function deleteRow(rid) {
            const row = document.getElementById(rid);
            if (row) row.remove();
            recalcAll();
            fillEmptyRows();
        }

        function escAttr(s) {
            return (s || '').replace(/"/g, '&quot;').replace(/</g, '&lt;');
        }

        function recalcAll() {
            const rows = document.querySelectorAll('.item-row');
            let subtotal = 0;

            rows.forEach(tr => {
                const qtyInput = tr.querySelector('.qty-input');
                const priceInput = tr.querySelector('.price-input');
                if (!qtyInput || !priceInput) return;
                
                const qty = parseFloat(qtyInput.value) || 0;
                const unit = parseFloat(priceInput.value) || 0;
                const amt = Math.round(qty * unit);
                subtotal += amt;
                
                const amtCell = tr.querySelector('.amt-cell');
                if (amtCell) amtCell.textContent = amt.toLocaleString();
            });

            const taxAmt = Math.round(subtotal * 0.1);
            const total = subtotal + taxAmt;

            // Update header total
            document.getElementById('out-total-price').textContent = total.toLocaleString();

            // Update summary table
            document.getElementById('out-subtotal').textContent = subtotal.toLocaleString();
            document.getElementById('out-tax').textContent = taxAmt.toLocaleString();
            document.getElementById('out-total-bottom').textContent = total.toLocaleString();
        }

        async function saveEstimateItems() {
            const btn = document.getElementById('saveEstBtn');
            const origText = btn.textContent;
            btn.disabled = true;
            btn.textContent = "保存中...";

            const rows = document.querySelectorAll('.item-row');
            const items = [];
            rows.forEach(tr => {
                const desc = tr.querySelector('.desc-input')?.value.trim();
                const qty = parseFloat(tr.querySelector('.qty-input')?.value) || 0;
                const unit = tr.querySelector('.unit-input')?.value.trim() || '式';
                const price = parseFloat(tr.querySelector('.price-input')?.value) || 0;
                const notes = tr.querySelector('.notes-input')?.value.trim() || '';
                
                if (desc) {
                    items.push({ description: desc, quantity: qty, unit_price: price, unit: unit, notes: notes });
                }
            });

            const picName = document.getElementById('out-pic').value;
            const period = document.getElementById('out-period').value;
            const validity = document.getElementById('out-validity').value;
            
            try {
                const job = await RyubeeAPI.fetchJob(jobId);
                let fd = {};
                try { fd = JSON.parse(job.form_data || "{}"); } catch (e) {}
                
                fd.estimate_items = items;
                fd.pic_name = picName;
                fd.period = period;
                fd.validity = validity;
                
                await RyubeeAPI.updateJob(jobId, { form_data: JSON.stringify(fd) });
                alert("✅ 見積書の内容を保存しました！\n（請求書を発行する際、この項目が引き継がれます）");
            } catch (err) {
                alert("保存に失敗しました: " + err.message);
            } finally {
                btn.disabled = false;
                btn.textContent = origText;
            }
        }

        // html2pdf によるPDF生成機能
        function generatePDF() {
            const element = document.getElementById('invoice-doc');
            const customerName = document.getElementById('out-customer-name').textContent;
            const fileName = `御見積書_${customerName}_${new Date().getTime()}.pdf`;

            // Hide edit controls for PDF
            document.getElementById('addRowBar').style.display = 'none';
            document.querySelectorAll('.row-delete-btn').forEach(b => b.style.display = 'none');
            const saveBtn = document.getElementById('saveEstBtn');
            if (saveBtn) saveBtn.style.display = 'none';

            // Freeze inputs to plain text
            const allInputs = element.querySelectorAll('input');
            const savedData = [];
            allInputs.forEach(inp => {
                savedData.push({ el: inp, parent: inp.parentNode, val: inp.value });
                const span = document.createElement('span');
                
                let valStr = inp.value;
                if(inp.type === 'number') {
                    valStr = Number(inp.value).toLocaleString();
                }
                span.innerHTML = valStr;
                span.style.fontSize = '13px';
                
                // Inherit alignment and bold
                if (inp.style.textAlign === 'right') span.style.textAlign = 'right';
                if (inp.style.textAlign === 'center') span.style.textAlign = 'center';
                if (inp.style.fontWeight === 'bold') span.style.fontWeight = 'bold';
                
                inp.parentNode.replaceChild(span, inp);
                span._origInput = inp;
            });

            // Adjust borders for PDF
            const bordersToRestore = [];
            element.querySelectorAll('.inv-info-line-val span').forEach(s => {
                s.style.display = 'inline-block';
                s.style.width = '100%';
                s.style.borderBottom = '1px solid #ccc';
            });

            const opt = {
                margin: 0,
                filename: fileName,
                image: { type: 'jpeg', quality: 0.98 },
                html2canvas: { scale: 2, useCORS: true },
                jsPDF: { unit: 'in', format: 'letter', orientation: 'portrait' }
            };

            const restoreInputs = () => {
                savedData.forEach(d => {
                    const span = d.parent.querySelector('span');
                    if (span && span._origInput) {
                        d.parent.replaceChild(d.el, span);
                    }
                });
                document.getElementById('addRowBar').style.display = '';
                document.querySelectorAll('.row-delete-btn').forEach(b => b.style.display = '');
                const saveBtn = document.getElementById('saveEstBtn');
                if (saveBtn) saveBtn.style.display = '';
            };

            html2pdf().set(opt).from(element).outputPdf('blob').then((pdfBlob) => {
                restoreInputs();

                if (navigator.canShare && navigator.canShare({ files: [new File([pdfBlob], fileName, { type: 'application/pdf' })] })) {
                    const file = new File([pdfBlob], fileName, { type: 'application/pdf' });
                    navigator.share({
                        title: 'お見積書',
                        text: 'お見積書をPDFでお送りいたします。',
                        files: [file]
                    }).catch(console.error);
                } else {
                    html2pdf().set(opt).from(element).save();
                }
            }).catch(err => {
                restoreInputs();
                console.error('PDF generation failed', err);
            });
        }
    </script>
    <script>
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('sw.js').catch(e => console.log('SW registration failed:', e));
        }
    </script>
