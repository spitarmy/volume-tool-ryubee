<!DOCTYPE html>
<html lang="ja">

<head>
    <meta charset="UTF-8">
    <meta name="viewport"
        content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>請求・入金管理 — Ryu兵衛 山文SaaS</title>
    <meta name="apple-mobile-web-app-capable" content="yes">
    <link rel="stylesheet" href="assets/css/style.css">
    <style>
        .billing-header {
            background: #FFFFFF;
            padding: 30px 24px 20px;
            border-bottom: 1px solid var(--border);
        }

        .billing-header h1 {
            font-size: 1.8rem;
            color: var(--text-primary);
            margin-bottom: 6px;
        }

        .month-picker {
            display: flex;
            gap: 8px;
            margin-top: 16px;
            align-items: center;
        }

        .month-picker input[type="month"] {
            flex: 1;
            padding: 10px 14px;
            border-radius: var(--r-md);
            border: 1px solid var(--border);
            font-size: 1rem;
        }

        .alert-panel {
            margin: 16px 20px;
            padding: 20px;
            background: var(--red-light);
            border-radius: var(--r-xl);
            border: 1px solid rgba(239, 68, 68, 0.2);
        }

        .alert-panel h3 {
            color: #B00B06;
            font-size: 1rem;
            margin-bottom: 12px;
        }

        .alert-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 10px 0;
            border-bottom: 1px solid rgba(239, 68, 68, 0.1);
        }

        .alert-item:last-child {
            border-bottom: none;
        }

        .alert-customer {
            font-weight: 600;
            font-size: 0.95rem;
        }

        .alert-amount {
            color: var(--red);
            font-weight: 700;
            font-size: 1.05rem;
        }

        .fiscal-badge {
            display: inline-block;
            background: #DA1E28;
            color: #fff;
            font-size: 0.7rem;
            font-weight: 700;
            padding: 2px 6px;
            border-radius: 4px;
            margin-left: 6px;
        }

        .invoice-list {
            padding: 0 20px 30px;
        }

        .invoice-card {
            background: #fff;
            border-radius: var(--r-xl);
            padding: 20px;
            margin-bottom: 12px;
            box-shadow: var(--shadow-sm);
            border: 1px solid var(--border);
            cursor: pointer;
            transition: transform 0.2s;
        }

        .invoice-card:active {
            transform: scale(0.98);
        }

        .inv-top {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 8px;
        }

        .inv-customer {
            font-weight: 700;
            font-size: 1.05rem;
        }

        .inv-amount {
            font-weight: 800;
            font-size: 1.15rem;
        }

        .inv-meta {
            font-size: 0.85rem;
            color: var(--text-secondary);
        }

        .inv-status {
            display: inline-block;
            padding: 3px 10px;
            border-radius: 50px;
            font-size: 0.75rem;
            font-weight: 700;
        }

        .inv-status.draft {
            background: var(--bg-secondary);
            color: var(--text-secondary);
        }

        .inv-status.sent {
            background: var(--blue-light);
            color: var(--blue-dark);
        }

        .inv-status.paid {
            background: var(--green-light);
            color: var(--green-dark);
        }

        .inv-status.partial {
            background: var(--orange-light);
            color: #C06000;
        }

        .inv-status.overdue {
            background: var(--red-light);
            color: var(--red);
        }

        .action-bar {
            display: flex;
            gap: 8px;
            padding: 12px 20px;
            background: var(--glass-bg);
            backdrop-filter: var(--glass-blur);
        }

        .action-bar button {
            flex: 1;
        }

        /* 入金モーダル */
        .payment-modal-overlay {
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.36);
            backdrop-filter: blur(10px);
            display: none;
            z-index: 3000;
            align-items: flex-end;
            justify-content: center;
        }

        .payment-modal-overlay.show {
            display: flex;
        }

        .payment-modal {
            background: #fff;
            border-radius: var(--r-xl) var(--r-xl) 0 0;
            width: 100%;
            max-width: 600px;
            padding: 24px 20px 40px;
            max-height: 85vh;
            overflow-y: auto;
            animation: sheetUp 0.3s cubic-bezier(0.25, 1, 0.5, 1);
        }

        .month-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 8px;
            margin-top: 12px;
        }

        .month-cell {
            padding: 12px 8px;
            border-radius: var(--r-md);
            text-align: center;
            font-size: 0.85rem;
            font-weight: 600;
            border: 1px solid var(--border);
        }

        .month-cell.paid {
            background: var(--green-light);
            color: var(--green-dark);
            border-color: var(--green);
        }

        .month-cell.unpaid {
            background: var(--red-light);
            color: var(--red);
            border-color: var(--red);
        }

        .month-cell.partial {
            background: var(--orange-light);
            color: #C06000;
            border-color: var(--orange);
        }

        /* 請求書詳細モーダル */
        .inv-detail-overlay {
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.4);
            backdrop-filter: blur(8px);
            display: none;
            z-index: 3000;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .inv-detail-overlay.show {
            display: flex;
        }

        .inv-detail-modal {
            background: #fff;
            border-radius: 12px;
            width: 100%;
            max-width: 600px;
            max-height: 90vh;
            overflow-y: auto;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.2);
            animation: sheetUp 0.25s ease-out;
        }

        .inv-doc {
            padding: 32px 28px;
        }

        .inv-doc-header {
            text-align: center;
            border-bottom: 3px double #333;
            padding-bottom: 16px;
            margin-bottom: 20px;
        }

        .inv-doc-header h2 {
            font-size: 1.6rem;
            letter-spacing: 0.15em;
            margin: 0 0 6px;
        }

        .inv-doc-meta {
            display: flex;
            justify-content: space-between;
            margin-bottom: 20px;
            font-size: 0.9rem;
        }

        .inv-doc-to {
            font-size: 1.15rem;
            font-weight: 700;
            border-bottom: 1px solid #333;
            display: inline-block;
            padding-bottom: 2px;
            margin-bottom: 16px;
        }

        .inv-doc table {
            width: 100%;
            border-collapse: collapse;
            margin-bottom: 16px;
            font-size: 0.9rem;
        }

        .inv-doc table th,
        .inv-doc table td {
            border: 1px solid #ddd;
            padding: 8px 10px;
            text-align: left;
        }

        .inv-doc table th {
            background: #f5f5f7;
            font-weight: 700;
            font-size: 0.8rem;
        }

        .inv-doc table td.num {
            text-align: right;
            font-variant-numeric: tabular-nums;
        }

        .inv-doc table tfoot td {
            font-weight: 800;
            background: #f0f4ff;
        }

        .inv-doc-payments {
            margin-top: 16px;
            padding-top: 12px;
            border-top: 1px solid #eee;
        }

        .inv-doc-payments h4 {
            font-size: 0.85rem;
            color: var(--text-secondary);
            margin-bottom: 8px;
        }

        .inv-doc-pay-row {
            display: flex;
            justify-content: space-between;
            font-size: 0.85rem;
            padding: 4px 0;
            border-bottom: 1px solid #f0f0f0;
        }

        .inv-doc-actions {
            display: flex;
            gap: 8px;
            padding: 16px 28px;
            border-top: 1px solid #eee;
            background: #fafafa;
            border-radius: 0 0 12px 12px;
        }

        .inv-doc-actions button {
            flex: 1;
        }

        @media print {
            .inv-detail-overlay {
                position: static;
                background: none;
                padding: 0;
            }

            .inv-doc-actions {
                display: none;
            }

            .bottom-nav,
            .billing-header,
            .action-bar,
            .alert-panel,
            .invoice-list,
            .month-grid {
                display: none !important;
            }

            /* 印刷時に非表示: 入金状況・備考（内部メモ）・ステータスバッジ */
            .print-hide {
                display: none !important;
            }
        }
    </style>
</head>

<body>


    <!-- Header -->
    <header class="billing-header">
        <h1>💰 請求・入金管理</h1>
        <p style="color: var(--text-secondary); font-size: 0.9rem;">請求書の発行・入金消し込み・未入金アラート</p>
        <div class="month-picker">
            <input type="month" id="monthFilter" />
            <button class="btn btn-xs btn-primary" onclick="loadInvoices()">表示</button>
        </div>
    </header>

    <div class="billing-content">
        <div style="max-width: 800px; margin: 0 auto;">

            <!-- 未入金アラートパネル -->
            <div class="alert-panel" id="alertPanel" style="display:none;">
                <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:12px;">
                    <h3 style="margin:0;">🔴 未入金アラート</h3>
                    <button class="btn btn-xs btn-primary" onclick="sendReminders()">✉️ リマインド一斉送信</button>
                </div>
                <div id="alertList"></div>
            </div>

            <!-- アクションバー -->
            <div class="action-bar" style="display:grid; grid-template-columns:1fr 1fr; gap:8px; padding:12px 20px;">
                <button class="btn btn-xs btn-primary" onclick="showOcrModal()"
                    style="width:100%; grid-column: span 2; font-size: 1.05rem; padding: 12px;">📸 写真から請求書自動作成</button>
                <button class="btn btn-xs btn-success" onclick="generateInvoices()" style="width:100%;">📄
                    月次一括生成</button>
                <button class="btn btn-xs btn-secondary" onclick="showPaymentModal()" style="width:100%;">💳
                    入金登録</button>
                <button class="btn btn-xs btn-secondary" onclick="showBankUpload()"
                    style="width:100%;background:var(--blue-light);color:var(--blue-dark);border-color:var(--blue);">🏦
                    銀行入金取込</button>
                <button class="btn btn-xs btn-ghost" onclick="connectFreee()" id="freeeBtn" style="width:100%;">🔗
                    freee連携</button>
            </div>

            <!-- 検索・フィルター -->
            <div style="padding: 16px 20px 0;">
                <div style="display:flex; gap:8px; margin-bottom: 12px;">
                    <input type="text" id="searchInput" placeholder="🔍 顧客名・管理番号で検索..." oninput="renderInvoices()"
                        style="flex: 1; padding: 10px 14px; border-radius: var(--r-pill); border: 1px solid var(--border); font-size: 0.95rem;">
                    <select id="sortSelect" onchange="renderInvoices()"
                        style="width: auto; padding: 10px; border-radius: var(--r-pill); border: 1px solid var(--border); font-size: 0.9rem; background: #fff; cursor: pointer; color: var(--text-primary);">
                        <option value="yama_asc">🎫 管理番号順</option>
                        <option value="updated">🔄 更新順</option>
                    </select>
                </div>
                <div style="display:flex; gap:8px;">
                    <button class="btn btn-xs btn-primary" id="btn-tab-all" style="flex:1"
                        onclick="setInvTab('all')">全て</button>
                    <button class="btn btn-xs btn-secondary" id="btn-tab-a" style="flex:1"
                        onclick="setInvTab('group_a')">10・15・25</button>
                    <button class="btn btn-xs btn-secondary" id="btn-tab-20" style="flex:1"
                        onclick="setInvTab('group_20')">20日</button>
                    <button class="btn btn-xs btn-secondary" id="btn-tab-end" style="flex:1"
                        onclick="setInvTab('group_end')">末日</button>
                    <button class="btn btn-xs btn-secondary" id="btn-tab-auto" style="flex:1"
                        onclick="setInvTab('auto')">自動振替</button>
                </div>
            </div>
            <!-- 月別支払状況 -->
            <div style="padding: 16px 20px;">
                <h3 style="font-size: 0.9rem; color: var(--text-secondary); margin-bottom: 4px;">📅 月別入金状況</h3>
                <div class="month-grid" id="monthGrid"></div>
            </div>

            <!-- ドライバー実績集計 -->
            <div style="padding: 0 20px 16px;">
                <div style="display:flex; justify-content:space-between; align-items:center;">
                    <h3 style="font-size: 0.9rem; color: var(--text-secondary); margin: 0;">📊 今月のドライバー回収実績</h3>
                    <button class="btn btn-xs btn-outline" onclick="loadDriverTally()">🔄 集計を取得</button>
                </div>
                <div id="driverTallyList"
                    style="display:none; background:#fff; padding:12px; border-radius:var(--r-md); box-shadow:var(--shadow-sm); margin-top:8px;">
                </div>
            </div>

            <!-- 請求書一覧 -->
            <div class="invoice-list" id="invoiceList">
                <p style="text-align:center; color: var(--text-tertiary); margin-top: 20px;">読み込み中...</p>
            </div>

            <!-- 入金モーダル -->
            <div class="payment-modal-overlay" id="paymentOverlay">
                <div class="payment-modal">
                    <div class="modal-drag-handle"></div>
                    <h3 class="card-title">💳 入金を登録（消し込み）</h3>
                    <div class="form-group">
                        <label>請求書を選択</label>
                        <select id="payInvoiceId"></select>
                    </div>
                    <div class="form-group">
                        <label>入金額 (円)</label>
                        <input type="number" id="payAmount" placeholder="30000">
                    </div>
                    <div class="form-group">
                        <label>入金日</label>
                        <input type="date" id="payDate">
                    </div>
                    <div class="form-group">
                        <label>支払方法</label>
                        <select id="payMethod">
                            <option value="bank_transfer">銀行振込</option>
                            <option value="cash">現金</option>
                            <option value="other">その他</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label>備考</label>
                        <input type="text" id="payNotes" placeholder="任意">
                    </div>
                    <button class="btn btn-primary" onclick="submitPayment()">入金を登録</button>
                    <button class="btn btn-secondary mt-1" onclick="closePaymentModal()">キャンセル</button>
                </div>
            </div>

            <!-- 銀行入金取込モーダル -->
            <div class="payment-modal-overlay" id="bankOverlay">
                <div class="payment-modal">
                    <div class="modal-drag-handle"></div>
                    <h3 class="card-title">🏦 京都銀行 入金データ取込</h3>
                    <p class="small-text mb-2">CSVファイルをアップロードして入金データを取り込みます。<br>フォーマット: 日付, 振込人名義, 入金額</p>
                    <div class="form-group">
                        <label>CSVファイル</label>
                        <input type="file" id="bankFile" accept=".csv" style="padding:10px;">
                    </div>
                    <button class="btn btn-primary" onclick="uploadBankCSV()">📤 アップロード</button>
                    <button class="btn btn-success mt-1" onclick="runAutoMatch()">🔍 自動マッチング実行</button>
                    <div id="matchResults" style="margin-top:16px;"></div>
                    <button class="btn btn-secondary mt-1" onclick="closeBankUpload()">閉じる</button>
                </div>
            </div>

            <!-- OCR請求書作成モーダル -->
            <div class="payment-modal-overlay" id="ocrOverlay">
                <div class="payment-modal">
                    <div class="modal-drag-handle"></div>
                    <h3 class="card-title">📸 写真から請求書自動作成</h3>
                    <p class="small-text mb-2">手書きの集計表や伝票の写真をアップロードすると、AIが「合計(量)」を読み取り、選択した顧客向けに下書き請求書を自動作成します。</p>
                    <div class="form-group">
                        <label>顧客を検索（名前または管理番号）</label>
                        <input type="text" id="ocrCustomerSearch" list="ocrCustomerList" placeholder="🔍 名前・管理番号で検索..."
                            oninput="filterOcrCustomers()" autocomplete="off"
                            style="padding:10px 14px; border-radius:var(--r-pill); border:1px solid var(--border);">
                        <datalist id="ocrCustomerList"></datalist>
                        <select id="ocrCustomerId" size="4"
                            style="width:100%; margin-top:8px; border:1px solid var(--border); border-radius:var(--r-sm); font-size:0.9rem;">
                            <option value="">↑ 上の検索欄で絞り込み</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label>写真 (カメラで撮影 または ファイル選択)</label>
                        <input type="file" id="ocrFile" accept="image/*" capture="environment" style="padding:10px;">
                    </div>
                    <button class="btn btn-primary" id="ocrSubmitBtn" onclick="submitOcrInvoice()">📤
                        AIで読み取って作成</button>
                    <button class="btn btn-secondary mt-1" onclick="closeOcrModal()">キャンセル</button>
                </div>
            </div>
        </div>
    </div><!-- /.billing-content -->

    <!-- 請求書詳細モーダル -->
    <div class="inv-detail-overlay" id="invDetailOverlay" onclick="if(event.target===this)closeInvDetail()">
        <div class="inv-detail-modal">
            <div class="inv-doc" id="invDocContent"></div>
            <div class="inv-doc-actions">
                <button class="btn btn-xs btn-primary" onclick="window.print()">🖨 印刷</button>
                <button class="btn btn-xs btn-secondary" onclick="closeInvDetail()">閉じる</button>
            </div>
        </div>
    </div>

    <!-- Bottom Nav -->
    <nav class="bottom-nav">
        <a href="index.html" class="nav-item"><span class="nav-icon">🏠</span><span>ホーム</span></a>
        <a href="calendar.html" class="nav-item"><span class="nav-icon">📅</span><span>配車</span></a>
        <a href="pipeline.html" class="nav-item"><span class="nav-icon">📊</span><span>案件</span></a>
        <a href="billing.html" class="nav-item active"><span class="nav-icon">💰</span><span>請求</span></a>
        <a href="customers.html" class="nav-item"><span class="nav-icon">🏢</span><span>顧客</span></a>
    </nav>

    <script src="assets/js/utils.js"></script>
    <script src="assets/js/api.js"></script>
    <script>
        if (!RyubeeAPI.requireAuth()) throw new Error("Not authenticated");

        let allInvoices = [];
        let allCustomers = [];
        let currentInvTab = 'all';
        let companySettings = {};

        document.addEventListener('DOMContentLoaded', async () => {
            const now = new Date();
            document.getElementById('monthFilter').value = `${now.getFullYear()}-${String(now.getMonth() + 1).padStart(2, '0')}`;
            document.getElementById('payDate').value = now.toISOString().slice(0, 10);
            try {
                allCustomers = await RyubeeAPI.fetchCustomers();
            } catch (e) { console.error('Customers load failed', e); }
            try {
                companySettings = await RyubeeAPI.fetchSettings() || {};
            } catch (e) { console.error('Settings load failed', e); }
            loadAlerts();
            loadInvoices();
        });

        function setInvTab(tab) {
            currentInvTab = tab;
            ['all', 'a', '20', 'end', 'auto'].forEach(k => {
                const el = document.getElementById('btn-tab-' + k);
                if (!el) return;
                const tabKey = k === 'a' ? 'group_a' : k === '20' ? 'group_20' : k === 'end' ? 'group_end' : k;
                el.className = 'btn btn-xs ' + (tab === tabKey ? 'btn-primary' : 'btn-secondary');
            });
            renderInvoices();
        }

        async function loadDriverTally() {
            const m = document.getElementById('monthFilter').value;
            if (!m) return;
            try {
                const req = await RyubeeAPI.fetchDailyReports(m);
                const tally = {};
                for (const r of req) {
                    const cKey = r.customer_id || r.customer_name;
                    if (!tally[cKey]) {
                        tally[cKey] = { name: r.customer_name, bags: 0, weight: 0 };
                    }
                    tally[cKey].bags += r.bag_count;
                    tally[cKey].weight += r.weight_kg;
                }
                const list = document.getElementById('driverTallyList');
                list.style.display = 'block';
                const keys = Object.keys(tally);
                if (keys.length === 0) {
                    list.innerHTML = '<p class="small-text text-center">今月の実績データはありません</p>';
                    return;
                }
                list.innerHTML = keys.map(k => {
                    const t = tally[k];
                    return `
                        <div style="display:flex; justify-content:space-between; border-bottom:1px solid #eee; padding:8px 0;">
                            <span style="font-weight:600; font-size:0.9rem;">${utils.escapeHtml(t.name || '名称未設定')}</span>
                            <span style="font-size:0.85rem; color:var(--text-secondary);">袋: <strong>${t.bags}</strong> | 重量: <strong>${t.weight.toFixed(1)}</strong>kg</span>
                        </div>
                    `;
                }).join('');
            } catch (e) {
                alert("エラー: " + e.message);
            }
        }

        async function loadAlerts() {
            try {
                const alerts = await RyubeeAPI.fetchUnpaidAlerts();
                const panel = document.getElementById('alertPanel');
                const list = document.getElementById('alertList');
                if (!alerts.length) { panel.style.display = 'none'; return; }
                panel.style.display = 'block';
                list.innerHTML = alerts.map(a => `
                    <div class="alert-item">
                        <div>
                            <span class="alert-customer">${utils.escapeHtml(a.customer_name)}</span>
                            <span class="inv-meta" style="margin-left:8px">${a.month}</span>
                            ${a.is_fiscal_crossover ? '<span class="fiscal-badge">売掛金</span>' : ''}
                            ${a.days_overdue > 0 ? `<span style="color:var(--red);font-size:0.8rem;margin-left:6px">${a.days_overdue}日超過</span>` : ''}
                            ${a.last_reminded_at ? `<br><span style="font-size:0.75rem;color:var(--text-muted);">✉️ 送信済: ${a.last_reminded_at.slice(5, 16).replace('T', ' ')}</span>` : ''}
                        </div>
                        <span class="alert-amount">¥${a.remaining.toLocaleString()}</span>
                    </div>
                `).join('');

                // 月別グリッド更新
                updateMonthGrid(alerts);
            } catch (e) { console.error(e); }
        }

        async function sendReminders() {
            if (!confirm("メールアドレスが登録されている未入金顧客へ、一斉にリマインドメールを送信しますか？\n（設定画面のテンプレートが使用されます）")) return;
            try {
                const res = await RyubeeAPI.sendUnpaidReminders();
                alert(`✅ ${res.sent_count}件のメール送信処理が完了しました。\n\n[送信ログ]\n${res.logs.join('\\n')}`);
                loadAlerts(); // 再読み込みして最終送信日時などを反映
            } catch (e) {
                alert("送信エラー: " + e.message);
            }
        }

        function updateMonthGrid(alerts) {
            const grid = document.getElementById('monthGrid');
            const now = new Date();
            const months = [];
            for (let i = 11; i >= 0; i--) {
                const d = new Date(now.getFullYear(), now.getMonth() - i, 1);
                months.push(`${d.getFullYear()}-${String(d.getMonth() + 1).padStart(2, '0')}`);
            }
            // Create status map from alerts
            const monthStatus = {};
            alerts.forEach(a => {
                if (!monthStatus[a.month]) monthStatus[a.month] = 'unpaid';
                if (a.remaining <= 0) monthStatus[a.month] = 'paid';
                else if (a.paid_total > 0) monthStatus[a.month] = 'partial';
            });
            grid.innerHTML = months.map(m => {
                const st = monthStatus[m] || 'paid';
                const label = m.split('-')[1] + '月';
                return `<div class="month-cell ${st}">${label}<br><small>${st === 'paid' ? '✓' : st === 'partial' ? '一部' : '未'}</small></div>`;
            }).join('');
        }

        async function loadInvoices() {
            const month = document.getElementById('monthFilter').value;
            try {
                allInvoices = await RyubeeAPI.fetchInvoices({ month: month || undefined });
                renderInvoices();
                updatePaymentSelect();
            } catch (e) {
                document.getElementById('invoiceList').innerHTML = `<div class="alert alert-danger">${e.message}</div>`;
            }
        }

        function renderInvoices() {
            const list = document.getElementById('invoiceList');
            if (!allInvoices.length) {
                list.innerHTML = '<p style="text-align:center;color:var(--text-tertiary);margin-top:30px;">この月の請求書はありません</p>';
                return;
            }

            const q = document.getElementById('searchInput').value.toLowerCase();
            const filtered = allInvoices.filter(inv => {
                const cust = allCustomers.find(c => c.id === inv.customer_id) || {};
                let fd = {};
                try { fd = JSON.parse(cust.form_data || "{}"); } catch (e) { }
                inv._yamaNum = fd.yamabun_management_number || '';

                const text = (inv.customer_name + ' ' + inv._yamaNum).toLowerCase();
                const matchQ = text.includes(q);

                let matchT = true;
                const closingDay = cust.billing_closing_day || 31;
                const payMethod = fd.payment_method || '振込';

                if (currentInvTab === 'group_a') matchT = [10, 15, 25].includes(closingDay);
                else if (currentInvTab === 'group_20') matchT = closingDay === 20;
                else if (currentInvTab === 'group_end') matchT = closingDay === 31;
                else if (currentInvTab === 'auto') matchT = payMethod === '自動引落し';

                return matchQ && matchT;
            });

            if (!filtered.length) {
                list.innerHTML = '<p style="text-align:center;color:var(--text-tertiary);margin-top:30px;">一致する請求書がありません</p>';
                return;
            }

            const sortVal = document.getElementById('sortSelect').value;
            filtered.sort((a, b) => {
                if (sortVal === 'yama_asc') {
                    const numA = a._yamaNum || "";
                    const numB = b._yamaNum || "";
                    return numA.localeCompare(numB);
                } else {
                    const dateA = new Date(a.updated_at || a.created_at || 0).getTime();
                    const dateB = new Date(b.updated_at || b.created_at || 0).getTime();
                    if (dateA !== dateB) return dateB - dateA;
                    const idA = (a.id || "").toString();
                    const idB = (b.id || "").toString();
                    return idB.localeCompare(idA);
                }
            });

            const statusLabel = { draft: '下書き', sent: '送付済', paid: '入金済', partial: '一部入金', overdue: '期限超過' };
            list.innerHTML = filtered.map(inv => `
                <div class="invoice-card" onclick="viewInvoice('${inv.id}')">
                    <div class="inv-top">
                        <span class="inv-customer">${utils.escapeHtml(inv.customer_name || '顧客')}</span>
                        <span class="inv-status ${inv.status}">${statusLabel[inv.status] || inv.status}</span>
                    </div>
                    ${inv._yamaNum ? `<div class="inv-meta" style="font-weight:700; color:var(--primary); margin-top:2px; font-size:13px;">🎫 山文管理番号: ${utils.escapeHtml(inv._yamaNum)}</div>` : ''}
                    <div class="inv-top" style="margin-top:6px;">
                        <span class="inv-amount">¥${inv.total_amount.toLocaleString()}</span>
                        <span class="inv-meta">${inv.month}</span>
                    </div>
                    <div class="inv-meta" style="margin-top:6px;">
                        入金: ¥${inv.paid_total.toLocaleString()} / 残: ¥${(inv.total_amount - inv.paid_total).toLocaleString()}
                        ${inv.due_date ? ' | 期限: ' + inv.due_date : ''}
                    </div>
                </div>
            `).join('');
        }

        // ── 請求書編集モード ────────────────────────
        let editInvoiceId = null;

        function enterEditMode(invId) {
            editInvoiceId = invId;
            const inv = allInvoices.find(i => i.id === invId);
            if (!inv) return;

            const tbody = document.getElementById('invItemsBody');
            const items = inv.items || [];
            tbody.innerHTML = items.map((it, idx) => `
                <tr>
                    <td><input type="text" value="${utils.escapeHtml(it.description)}" id="edit_desc_${idx}" style="width:100%;padding:4px;border:1px solid var(--border);border-radius:4px;font-size:0.85rem;"></td>
                    <td><input type="number" value="${it.quantity}" id="edit_qty_${idx}" style="width:60px;padding:4px;border:1px solid var(--border);border-radius:4px;text-align:right;" onchange="recalcRow(${idx})"></td>
                    <td><input type="number" value="${it.unit_price}" id="edit_price_${idx}" style="width:80px;padding:4px;border:1px solid var(--border);border-radius:4px;text-align:right;" onchange="recalcRow(${idx})"></td>
                    <td class="num" id="edit_amt_${idx}" style="font-weight:700;">¥${Number(it.amount).toLocaleString()}</td>
                </tr>
                <tr><td colspan="4" style="padding:2px 4px;"><input type="text" value="${it.unit || '式'}" id="edit_unit_${idx}" placeholder="単位" style="width:60px;padding:2px 4px;border:1px solid #eee;border-radius:4px;font-size:0.75rem;color:var(--text-secondary);"></td></tr>
            `).join('') + `
                <tr><td colspan="4" style="text-align:center;">
                    <button class="btn btn-xs btn-ghost" onclick="addEditRow()" style="font-size:0.8rem;">➕ 行を追加</button>
                </td></tr>
            `;

            // アクションボタン更新
            const actionsDiv = document.querySelector('.inv-doc-actions');
            actionsDiv.innerHTML = `
                <button class="btn btn-xs btn-primary" id="editSaveBtn" onclick="saveEditedInvoice()">💾 保存</button>
                <button class="btn btn-xs btn-secondary" onclick="viewInvoice('${invId}')">キャンセル</button>
            `;
        }

        function recalcRow(idx) {
            const qty = parseFloat(document.getElementById(`edit_qty_${idx}`).value) || 0;
            const price = parseFloat(document.getElementById(`edit_price_${idx}`).value) || 0;
            const amt = Math.round(qty * price);
            document.getElementById(`edit_amt_${idx}`).textContent = `¥${amt.toLocaleString()}`;
        }

        function addEditRow() {
            const tbody = document.getElementById('invItemsBody');
            const rows = tbody.querySelectorAll('tr');
            // 編集行は2行1セット（データ行 + 単位行）、最後の1行は「➕行を追加」ボタン
            const dataRowCount = (rows.length - 1) / 2;
            const idx = dataRowCount;
            const addBtnRow = rows[rows.length - 1];
            const newRow1 = document.createElement('tr');
            newRow1.innerHTML = `
                <td><input type="text" value="" id="edit_desc_${idx}" style="width:100%;padding:4px;border:1px solid var(--border);border-radius:4px;font-size:0.85rem;" placeholder="品目名"></td>
                <td><input type="number" value="0" id="edit_qty_${idx}" style="width:60px;padding:4px;border:1px solid var(--border);border-radius:4px;text-align:right;" onchange="recalcRow(${idx})"></td>
                <td><input type="number" value="0" id="edit_price_${idx}" style="width:80px;padding:4px;border:1px solid var(--border);border-radius:4px;text-align:right;" onchange="recalcRow(${idx})"></td>
                <td class="num" id="edit_amt_${idx}" style="font-weight:700;">¥0</td>
            `;
            const newRow2 = document.createElement('tr');
            newRow2.innerHTML = `<td colspan="4" style="padding:2px 4px;"><input type="text" value="式" id="edit_unit_${idx}" placeholder="単位" style="width:60px;padding:2px 4px;border:1px solid #eee;border-radius:4px;font-size:0.75rem;color:var(--text-secondary);"></td>`;
            tbody.insertBefore(newRow1, addBtnRow);
            tbody.insertBefore(newRow2, addBtnRow);
        }

        async function saveEditedInvoice() {
            if (!editInvoiceId) return;
            const tbody = document.getElementById('invItemsBody');
            const descInputs = tbody.querySelectorAll('[id^="edit_desc_"]');
            const items = [];
            for (let i = 0; i < descInputs.length; i++) {
                const desc = document.getElementById(`edit_desc_${i}`)?.value || '';
                const qty = parseFloat(document.getElementById(`edit_qty_${i}`)?.value) || 0;
                const price = parseFloat(document.getElementById(`edit_price_${i}`)?.value) || 0;
                const unit = document.getElementById(`edit_unit_${i}`)?.value || '式';
                if (!desc && qty === 0 && price === 0) continue; // 空行はスキップ
                items.push({
                    description: desc,
                    quantity: qty,
                    unit: unit,
                    unit_price: price,
                    amount: Math.round(qty * price),
                });
            }
            const btn = document.getElementById('editSaveBtn');
            btn.disabled = true;
            btn.innerHTML = '⏳ 保存中...';
            try {
                await RyubeeAPI.updateInvoiceFull(editInvoiceId, { items });
                showToast('✅ 請求書を更新しました');
                await loadInvoices();
                viewInvoice(editInvoiceId);
            } catch (e) {
                alert('エラー: ' + e.message);
                btn.disabled = false;
                btn.innerHTML = '💾 保存';
            }
        }

        async function generateInvoices() {
            const month = document.getElementById('monthFilter').value;
            if (!month) { alert('月を選択してください'); return; }
            if (!confirm(`${month} の請求書を自動生成しますか？\n（産廃マニフェストの重量×単価から自動計算）`)) return;
            try {
                const result = await RyubeeAPI.generateMonthlyInvoices(month);
                alert(`${result.length}件の請求書を生成しました`);
                loadInvoices();
                loadAlerts();
            } catch (e) { alert('エラー: ' + e.message); }
        }

        function showPaymentModal() { document.getElementById('paymentOverlay').classList.add('show'); }
        function closePaymentModal() { document.getElementById('paymentOverlay').classList.remove('show'); }

        function updatePaymentSelect() {
            const sel = document.getElementById('payInvoiceId');
            const unpaid = allInvoices.filter(i => i.status !== 'paid');
            sel.innerHTML = unpaid.map(i =>
                `<option value="${i.id}">${utils.escapeHtml(i.customer_name)} - ${i.month} (残¥${(i.total_amount - i.paid_total).toLocaleString()})</option>`
            ).join('') || '<option value="">未払い請求書なし</option>';
        }

        async function submitPayment() {
            const invoiceId = document.getElementById('payInvoiceId').value;
            if (!invoiceId) { alert('請求書を選択してください'); return; }
            const body = {
                invoice_id: invoiceId,
                amount: parseInt(document.getElementById('payAmount').value) || 0,
                payment_date: document.getElementById('payDate').value,
                payment_method: document.getElementById('payMethod').value,
                notes: document.getElementById('payNotes').value,
            };
            if (!body.amount) { alert('入金額を入力してください'); return; }
            try {
                await RyubeeAPI.registerPayment(body);
                closePaymentModal();
                showToast('✅ 入金を登録しました');
                loadInvoices();
                loadAlerts();
            } catch (e) { alert('エラー: ' + e.message); }
        }

        // ── OCR 請求書作成 ──────────────────────────────
        function showOcrModal() {
            document.getElementById('ocrOverlay').classList.add('show');
            document.getElementById('ocrCustomerSearch').value = '';
            populateOcrCustomerList();
        }

        function populateOcrCustomerList() {
            const sel = document.getElementById('ocrCustomerId');
            const dl = document.getElementById('ocrCustomerList');
            const opts = allCustomers.map(c => {
                const yNum = c.yamabun_number || '';
                const label = yNum ? `[${yNum}] ${c.name}` : c.name;
                return { id: c.id, label, name: c.name, yNum };
            });
            sel.innerHTML = opts.map(o => `<option value="${o.id}">${utils.escapeHtml(o.label)}</option>`).join('') || '<option value="">顧客がありません</option>';
            dl.innerHTML = opts.map(o => `<option value="${utils.escapeHtml(o.label)}">`).join('');
        }

        function filterOcrCustomers() {
            const q = document.getElementById('ocrCustomerSearch').value.toLowerCase();
            const sel = document.getElementById('ocrCustomerId');
            const filtered = allCustomers.filter(c => {
                const name = (c.name || '').toLowerCase();
                const yNum = (c.yamabun_number || '').toLowerCase();
                return name.includes(q) || yNum.includes(q);
            });
            sel.innerHTML = filtered.map(c => {
                const yNum = c.yamabun_number || '';
                const label = yNum ? `[${yNum}] ${c.name}` : c.name;
                return `<option value="${c.id}">${utils.escapeHtml(label)}</option>`;
            }).join('') || '<option value="">該当なし</option>';
        }

        function closeOcrModal() {
            document.getElementById('ocrOverlay').classList.remove('show');
            document.getElementById('ocrFile').value = '';
        }

        async function submitOcrInvoice() {
            const custId = document.getElementById('ocrCustomerId').value;
            const file = document.getElementById('ocrFile').files[0];
            if (!custId) { alert('顧客を選択してください'); return; }
            if (!file) { alert('写真を選択してください'); return; }

            const btn = document.getElementById('ocrSubmitBtn');
            btn.disabled = true;
            btn.innerHTML = '⏳ AI解析中...';

            try {
                const formData = new FormData();
                formData.append("customer_id", custId);
                formData.append("image", file);

                const result = await RyubeeAPI.createOcrInvoice(formData);
                showToast(`✅ 下書き請求書を作成しました`);
                closeOcrModal();
                loadInvoices();
                // 表示された請求書を自動で開く
                if (result && result.id) {
                    setTimeout(() => viewInvoice(result.id), 500);
                }
            } catch (e) {
                alert('エラー: ' + e.message);
            } finally {
                btn.disabled = false;
                btn.innerHTML = '📤 AIで読み取って作成';
            }
        }

        // ── 銀行入金取込 ──────────────────────────────
        function showBankUpload() { document.getElementById('bankOverlay').classList.add('show'); }
        function closeBankUpload() { document.getElementById('bankOverlay').classList.remove('show'); }

        async function uploadBankCSV() {
            const file = document.getElementById('bankFile').files[0];
            if (!file) { alert('CSVファイルを選択してください'); return; }
            try {
                const result = await RyubeeAPI.uploadBankCSV(file);
                showToast(`✅ ${result.imported}件の入金データを取込みました`);
            } catch (e) { alert('エラー: ' + e.message); }
        }

        async function runAutoMatch() {
            try {
                const result = await RyubeeAPI.bankAutoMatch();
                const el = document.getElementById('matchResults');
                if (result.matched === 0 && result.total === 0) {
                    el.innerHTML = '<p class="small-text">取込データがありません</p>';
                    return;
                }
                let html = `<div class="alert alert-info">✅ ${result.matched}/${result.total}件 マッチング成功</div>`;
                if (result.results) {
                    html += result.results.map(r => `
                        <div style="display:flex;justify-content:space-between;padding:8px 0;border-bottom:1px solid var(--border);">
                            <span>${utils.escapeHtml(r.payer_name)}</span>
                            <span>¥${r.amount.toLocaleString()}</span>
                            <span class="badge ${r.status === 'reconciled' ? 'badge-success' : r.status === 'matched' ? 'badge-primary' : 'badge-warning'}">
                                ${r.status === 'reconciled' ? '消込済' : r.status === 'matched' ? 'マッチ' : '未マッチ'}
                            </span>
                        </div>
                    `).join('');
                }
                el.innerHTML = html;
                loadInvoices();
                loadAlerts();
            } catch (e) { alert('エラー: ' + e.message); }
        }

        // ── freee連携 ─────────────────────────────────
        async function connectFreee() {
            try {
                const status = await RyubeeAPI.freeeStatus();
                if (status.connected) {
                    document.getElementById('freeeBtn').textContent = '✅ freee接続済';
                    document.getElementById('freeeBtn').style.color = 'var(--green)';
                    return;
                }
                const data = await RyubeeAPI.freeeAuthUrl();
                window.open(data.auth_url, '_blank');
            } catch (e) {
                if (e.message.includes('APP_ID')) {
                    alert('freee APP_IDが未設定です。\n管理者に環境変数の設定をお願いしてください。');
                } else {
                    alert('freee接続エラー: ' + e.message);
                }
            }
        }

        // freeeステータスチェック
        (async () => {
            try {
                const s = await RyubeeAPI.freeeStatus();
                if (s.connected) {
                    document.getElementById('freeeBtn').textContent = '✅ freee接続済';
                    document.getElementById('freeeBtn').style.color = 'var(--green)';
                }
            } catch (e) { }
        })();

        function showToast(msg) {
            const t = document.createElement('div');
            t.textContent = msg;
            t.style.cssText = 'position:fixed;bottom:90px;left:50%;transform:translateX(-50%);background:#34C759;color:#fff;padding:10px 20px;border-radius:20px;font-weight:600;z-index:9999;';
            document.body.appendChild(t);
            setTimeout(() => t.remove(), 2500);
        }
    </script>
</body>

</html>
