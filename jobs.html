<!DOCTYPE html>
<html lang="ja">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>案件一覧｜立米AI Ryu兵衛</title>
  <link rel="stylesheet" href="assets/css/style.css">
  <style>
    .header-glass {
      position: sticky;
      top: 0;
      z-index: 100;
    }

    .header-glass h1 {
      font-size: 1.25rem;
      margin: 0 0 12px 0;
      padding-top: 4px;
    }

    /* 検索・絞り込み */
    .search-box {
      display: flex;
      gap: 8px;
      margin-bottom: 8px;
    }

    .search-input {
      flex: 1;
      padding: 8px 12px;
      border-radius: 20px;
      border: 1px solid var(--border-color);
      background: var(--bg-color);
      font-size: 0.95rem;
    }

    /* フォルダタブ */
    .folder-tabs {
      display: flex;
      gap: 12px;
      overflow-x: auto;
      padding-bottom: 4px;
      margin-top: 12px;
    }

    .folder-tabs::-webkit-scrollbar {
      display: none;
    }

    .folder-tab {
      background: rgba(0, 0, 0, 0.05);
      border: none;
      border-radius: 20px;
      padding: 6px 16px;
      font-size: 0.85rem;
      font-weight: 600;
      color: var(--text-muted);
      cursor: pointer;
      white-space: nowrap;
      display: flex;
      align-items: center;
      gap: 6px;
      transition: all 0.2s;
    }

    .folder-tab.active {
      background: var(--primary);
      color: #fff;
      box-shadow: 0 4px 12px rgba(10, 132, 255, 0.3);
    }

    .folder-count {
      background: rgba(255, 255, 255, 0.8);
      color: var(--primary);
      border-radius: 10px;
      padding: 2px 6px;
      font-size: 0.7rem;
      font-weight: bold;
    }

    .folder-tab.active .folder-count {
      background: #fff;
    }

    /* 案件カードリスト */
    #jobs-list {
      padding-top: 16px;
    }

    .job-card {
      background: var(--surface-solid);
      border-radius: var(--border-radius-xl);
      padding: 20px;
      margin-bottom: 16px;
      box-shadow: var(--shadow-sm);
      position: relative;
      cursor: pointer;
      border: 1px solid rgba(255, 255, 255, 0.8);
      -webkit-tap-highlight-color: transparent;
      transition: transform 0.2s, box-shadow 0.2s;
    }

    .job-card:active {
      transform: scale(0.97);
      background: #FAFAFA;
    }

    .job-card-header {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      margin-bottom: 8px;
    }

    .job-title {
      font-size: 1.1rem;
      font-weight: 600;
      color: var(--text-main);
      margin: 0;
    }

    .job-date {
      font-size: 0.8rem;
      color: var(--text-muted);
    }

    .job-body {
      display: flex;
      gap: 16px;
      margin-bottom: 12px;
    }

    .job-metric {
      flex: 1;
    }

    .job-metric-label {
      font-size: 0.75rem;
      color: var(--text-muted);
      margin-bottom: 2px;
    }

    .job-metric-val {
      font-size: 1.2rem;
      font-weight: bold;
      color: var(--primary);
    }

    .job-footer {
      border-top: 1px dashed var(--border-color);
      padding-top: 8px;
      font-size: 0.85rem;
      color: var(--text-muted);
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    /* === 案件詳細スライドモーダル === */
    #detail-drawer {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background: var(--bg-color);
      z-index: 2000;
      transform: translateX(100%);
      transition: transform 0.3s cubic-bezier(0.25, 0.8, 0.25, 1);
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    #detail-drawer.open {
      transform: translateX(0);
    }

    .drawer-header {
      background: var(--surface-color);
      padding: 16px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      border-bottom: 1px solid var(--border-color);
      box-shadow: var(--shadow-sm);
      z-index: 10;
    }

    .drawer-back-btn {
      background: none;
      border: none;
      font-size: 1.2rem;
      color: var(--primary);
      padding: 8px;
      cursor: pointer;
    }

    .drawer-title {
      font-size: 1.1rem;
      font-weight: 600;
      margin: 0;
    }

    .drawer-content {
      flex: 1;
      overflow-y: auto;
      padding: 20px 16px 100px;
    }

    .pdf-btn {
      width: 100%;
      background: #E8F5E9;
      color: #2E7D32;
      border: 1px solid #C8E6C9;
      padding: 12px;
      border-radius: var(--border-radius-md);
      font-weight: bold;
      text-align: center;
      margin-bottom: 20px;
      display: flex;
      justify-content: center;
      align-items: center;
      gap: 8px;
      text-decoration: none;
    }

    .pdf-btn:active {
      background: #C8E6C9;
    }

    .section-title {
      font-size: 0.9rem;
      color: var(--text-muted);
      margin: 24px 0 8px 4px;
      text-transform: uppercase;
    }

    /* === 電子サインキャンバス === */
    .signature-area {
      border: 1px solid var(--border-color);
      border-radius: var(--border-radius-md);
      background: #fff;
      margin-bottom: 8px;
    }

    #signature-canvas {
      width: 100%;
      height: 150px;
      border-radius: var(--border-radius-md);
      touch-action: none;
    }

    .signature-controls {
      display: flex;
      justify-content: space-between;
      margin-bottom: 24px;
    }
  </style>

</head>

<body>

  <!-- 固定ヘッダー（一覧画面） -->
  <div class="header-glass" style="flex-direction:column;align-items:stretch;padding-bottom:8px;">
    <h1>📁 案件フォルダ</h1>
    <div class="search-box">
      <input type="text" id="search-input" class="search-input" placeholder="🔍 現場名・お客様名・住所で検索..."
        oninput="filterJobs()">
    </div>
    <div class="folder-tabs">
      <button class="folder-tab active" onclick="setFolder('all',this)">すべて <span class="folder-count"
          id="count-all">0</span></button>
      <button class="folder-tab" onclick="setFolder('estimated',this)">見積済 <span class="folder-count"
          id="count-est">0</span></button>
      <button class="folder-tab" onclick="setFolder('scheduled',this)">作業予定 <span class="folder-count"
          id="count-sch">0</span></button>
      <button class="folder-tab" onclick="setFolder('completed',this)">完了 <span class="folder-count"
          id="count-comp">0</span></button>
      <button class="folder-tab" onclick="setFolder('lost',this)">不成約 <span class="folder-count"
          id="count-lost">0</span></button>
    </div>
  </div>

  <div class="container" id="jobs-container">
    <p id="jobs-status" class="text-center small-text mt-2">読み込み中...</p>
    <div id="jobs-list"></div>
  </div>

  <div class="bottom-nav">
    <a href="index.html" class="nav-item">
      <div class="nav-icon">🏠</div><span>ホーム</span>
    </a>
    <a href="pipeline.html" class="nav-item">
      <div class="nav-icon">📊</div><span>パイプライン</span>
    </a>
    <a href="jobs.html" class="nav-item active">
      <div class="nav-icon">📁</div><span>案件一覧</span>
    </a>
    <a href="billing.html" class="nav-item">
      <div class="nav-icon">💰</div><span>請求</span>
    </a>
  </div>

  <!-- 案件詳細ドロワー -->
  <div id="detail-drawer">
    <div class="drawer-header">
      <button class="drawer-back-btn" onclick="closeDetail()"><i style="font-style:normal;">‹ 戻る</i></button>
      <h3 class="drawer-title" id="drawer-title">案件詳細</h3>
      <button onclick="deleteJob()"
        style="background:none;border:none;color:#ff3b30;font-size:.85rem;font-weight:700;cursor:pointer;">🗑
        削除</button>
    </div>
    <div class="drawer-content">
      <a href="#" target="_blank" id="pdf-link" class="pdf-btn"><span style="font-size:1.2rem;">📄</span>見積書PDFを出力</a>
      <a href="#" target="_blank" id="driver-sheet-link" class="pdf-btn"
        style="background:#E3F2FD;color:#1565C0;border-color:#BBDEFB;"><span
          style="font-size:1.2rem;">🚚</span>ドライバー指示書</a>
      <div class="card">
        <h3 class="card-title">基本情報編集</h3>
        <div class="form-group">
          <label>ステータス（フォルダ）</label>
          <select id="status">
            <option value="estimated">見積済</option>
            <option value="scheduled">作業予定</option>
            <option value="completed">作業完了</option>
            <option value="lost">不成約（失注）</option>
          </select>
        </div>
        <div class="form-group">
          <label>案件タイプ</label>
          <select id="job_type">
            <option value="other">その他</option>
            <option value="store_removal">店舗残置物撤去</option>
            <option value="estate">遺品整理</option>
            <option value="welfare">福祉残置物撤去</option>
            <option value="general_waste">一般ゴミ収集</option>
          </select>
        </div>
        <div class="form-group">
          <label>パイプラインステージ</label>
          <select id="pipeline_stage">
            <option value="inquiry">問合せ</option>
            <option value="estimate">見積</option>
            <option value="negotiation">商談</option>
            <option value="contract">契約</option>
            <option value="scheduled">作業予定</option>
            <option value="completed">完了</option>
            <option value="lost">不成約</option>
          </select>
        </div>
        <div class="form-group" id="tmplSelectorGroup" style="display:none;">
          <label>雛形から入力（任意）</label>
          <select id="tmplSelector" onchange="applyJobTemplate()"
            style="padding:6px; font-size:0.9rem; margin-bottom:12px;">
            <option value="">-- 追加する雛形を選択 --</option>
          </select>
        </div>
        <div class="form-group"><label>現場名（案件名）</label><input type="text" id="job_name"></div>
        <div class="form-group"><label>お客様名</label><input type="text" id="customer_name"></div>
        <div class="form-group"><label>住所</label><input type="text" id="address"></div>
        <div class="d-flex gap-2">
          <div class="form-group flex-1" style="width:50%;"><label>作業日</label><input type="date" id="work_date"></div>
          <div class="form-group flex-1" style="width:50%;"><label>時間帯</label><input type="text" id="work_time"
              placeholder="10:00~"></div>
        </div>
        <div class="d-flex gap-2">
          <div class="form-group flex-1" style="width:50%;"><label>見積金額(円)</label><input type="number" id="price_total">
          </div>
          <div class="form-group flex-1" style="width:50%;"><label>作業員数</label><input type="number" id="workers"></div>
        </div>
        <div class="form-group"><label>備考</label><textarea id="notes" placeholder="注意事項などを入力..."></textarea></div>
        <div class="section-title" style="margin-left:0;">✍️ お客様サイン（電子署名）</div>
        <div class="signature-area"><canvas id="signature-canvas"></canvas></div>
        <div class="signature-controls">
          <button class="btn btn-secondary" onclick="clearSignature()"
            style="margin:0;padding:4px 12px;font-size:.8rem;">書き直す</button>
          <span style="font-size:.8rem;color:var(--text-muted);align-self:center;">※枠内にお書きください</span>
        </div>
        <button class="btn btn-primary" onclick="updateJob()" id="update-btn">更新を保存する</button>
      </div>
      <div class="section-title">AI立米解析結果</div>
      <div class="card" id="ai-summary-area"></div>
    </div>
  </div>

  <script src="assets/js/api.js"></script>
  <script>
    RyubeeAPI.requireAuth();

    let allJobs = [], currentJobId = null, currentFolder = 'all';
    let sigCanvas, sigCtx, isDrawing = false;

    document.addEventListener('DOMContentLoaded', async () => {
      await fetchJobList();
      await loadTemplatesDropdown();
      initSignature();
      const id = new URLSearchParams(location.search).get('id');
      if (id) openDetail(id);
    });

    let allTemplates = [];
    async function loadTemplatesDropdown() {
      try {
        allTemplates = await RyubeeAPI.fetchTemplates();
        if (allTemplates.length > 0) {
          document.getElementById('tmplSelectorGroup').style.display = 'block';
          const sel = document.getElementById('tmplSelector');
          allTemplates.forEach(t => {
            const opt = document.createElement('option');
            opt.value = t.id;
            opt.textContent = `${t.name} (¥${t.unit_price.toLocaleString()})`;
            sel.appendChild(opt);
          });
        }
      } catch (e) { console.error("Template load err:", e); }
    }

    function applyJobTemplate() {
      const id = document.getElementById('tmplSelector').value;
      if (!id) return;
      const t = allTemplates.find(x => x.id === id);
      if (t) {
        document.getElementById('job_name').value = t.name;
        document.getElementById('price_total').value = t.unit_price;
      }
    }

    async function fetchJobList() {
      const el = document.getElementById('jobs-status');
      try {
        el.textContent = '読み込み中...'; el.style.display = 'block';
        allJobs = await RyubeeAPI.fetchJobs();
        if (!Array.isArray(allJobs) || !allJobs.length) { el.textContent = '案件がありません。'; return; }
        el.style.display = 'none';
        updateFolderCounts(); filterJobs();
      } catch (e) {
        el.innerHTML = `<div class="alert alert-danger" style="text-align:left"><strong>取得エラー</strong><br><span style="font-size:.85rem">${e.message}</span></div>`;
      }
    }

    function setFolder(name, btn) {
      currentFolder = name;
      document.querySelectorAll('.folder-tab').forEach(el => el.classList.remove('active'));
      btn.classList.add('active'); filterJobs();
    }

    function updateFolderCounts() {
      const c = { all: allJobs.length, estimated: 0, scheduled: 0, completed: 0, lost: 0 };
      allJobs.forEach(j => {
        if (j.status === 'pending') c.estimated++;
        if (j.status === 'confirmed') c.scheduled++;
        if (j.status === 'completed') c.completed++;
        if (j.status === 'lost') c.lost++;
      });
      ['all', 'est', 'sch', 'comp', 'lost'].forEach((k, i) => {
        const keys = ['all', 'estimated', 'scheduled', 'completed', 'lost'];
        document.getElementById('count-' + k).textContent = c[keys[i]];
      });
    }

    function filterJobs() {
      const q = document.getElementById('search-input').value.toLowerCase();
      const filtered = allJobs.filter(j => {
        const text = ((j.job_name || '') + (j.customer_name || '') + (j.address || '')).toLowerCase();
        const matchQ = text.includes(q);
        let matchF = currentFolder === 'all';
        if (currentFolder === 'estimated') matchF = j.status === 'pending';
        if (currentFolder === 'scheduled') matchF = j.status === 'confirmed';
        if (currentFolder === 'completed') matchF = j.status === 'completed';
        if (currentFolder === 'lost') matchF = j.status === 'lost';
        return matchQ && matchF;
      });
      renderJobs(filtered);
    }

    function renderJobs(jobs) {
      const list = document.getElementById('jobs-list');
      list.innerHTML = '';
      if (!jobs.length) { list.innerHTML = '<p class="text-center small-text">見つかりませんでした。</p>'; return; }
      jobs.forEach(j => {
        const date = new Date(j.created_at).toLocaleDateString('ja-JP');
        const vol = j.total_volume_m3 != null ? `${j.total_volume_m3} ㎥` : '-';
        const price = j.price_total != null ? `${Number(j.price_total).toLocaleString()} 円` : '-';
        const wdate = j.work_date ? `作業日: ${j.work_date}` : '作業日: 未定';
        const slabel = { pending: '見積済', confirmed: '作業予定', completed: '完了', lost: '不成約' }[j.status] || j.status;
        const card = document.createElement('div');
        card.className = 'job-card';
        card.onclick = () => openDetail(j.job_id);
        card.innerHTML = `
          <div class="job-card-header">
            <h3 class="job-title">${esc(j.job_name || '案件')}</h3>
            <span class="job-date">${date}</span>
          </div>
          <div class="job-body">
            <div class="job-metric"><div class="job-metric-label">立米(AI)</div><div class="job-metric-val">${vol}</div></div>
            <div class="job-metric"><div class="job-metric-label">見積金額</div><div class="job-metric-val" style="color:var(--text-main)">${price}</div></div>
          </div>
          <div class="job-footer">
            <span>${esc(j.customer_name || 'お客様名未設定')}</span>
            <span>${wdate} &nbsp;<b>${slabel}</b></span>
          </div>`;
        list.appendChild(card);
      });
    }

    function esc(s) { return String(s).replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;'); }

    function openDetail(jobId) {
      currentJobId = jobId;
      document.getElementById('detail-drawer').classList.add('open');
      const job = allJobs.find(j => j.job_id === jobId);
      if (job) {
        fillForm(job);
        renderAiSummary(job.ai_result);
        document.getElementById('pdf-link').href = `invoice.html?id=${jobId}`;
        document.getElementById('driver-sheet-link').href = `driver-sheet.html?id=${jobId}`;
      }
    }

    function closeDetail() { document.getElementById('detail-drawer').classList.remove('open'); currentJobId = null; }

    function fillForm(job) {
      document.getElementById('drawer-title').textContent = job.job_name || '案件詳細';
      ['job_name', 'customer_name', 'address', 'work_date', 'work_time', 'notes'].forEach(id => {
        document.getElementById(id).value = job[id] || '';
      });
      document.getElementById('price_total').value = job.price_total != null ? job.price_total : '';
      document.getElementById('workers').value = job.workers != null ? job.workers : '';
      const sm = { pending: 'estimated', confirmed: 'scheduled', completed: 'completed', lost: 'lost' };
      document.getElementById('status').value = sm[job.status] || 'estimated';
      document.getElementById('job_type').value = job.job_type || 'other';
      document.getElementById('pipeline_stage').value = job.pipeline_stage || 'inquiry';
      clearSignature();
      if (job.signature_data) { const img = new Image(); img.onload = () => sigCtx.drawImage(img, 0, 0, sigCanvas.width, sigCanvas.height); img.src = job.signature_data; }
    }

    function renderAiSummary(ai) {
      const c = document.getElementById('ai-summary-area');
      if (!ai) { c.innerHTML = "<p class='small-text text-center'>AI結果が存在しません。</p>"; return; }
      let h = `<div style="text-align:center;margin-bottom:12px"><span style="font-size:.85rem;color:var(--text-muted)">総立米</span><br><span style="font-size:2rem;font-weight:bold;color:var(--primary)">${ai.total_volume_m3 ?? '-'} ㎥</span></div>`;
      if (Array.isArray(ai.items) && ai.items.length) {
        h += `<table style="width:100%;border-collapse:collapse;font-size:.9rem"><tr style="border-bottom:1px solid #ccc"><th style="text-align:left;padding:4px">品目</th><th style="padding:4px">量</th><th style="text-align:right;padding:4px">立米</th></tr>`;
        ai.items.forEach(it => { h += `<tr style="border-bottom:1px solid #eee"><td style="padding:6px 4px">${esc(it.category)}</td><td style="text-align:center;padding:6px 4px">${it.quantity ?? ''}</td><td style="text-align:right;padding:6px 4px">${it.volume_total_m3 ?? ''}</td></tr>`; });
        h += `</table>`;
      }
      c.innerHTML = h;
    }

    function initSignature() {
      sigCanvas = document.getElementById('signature-canvas'); sigCtx = sigCanvas.getContext('2d');
      sigCanvas.width = sigCanvas.offsetWidth; sigCanvas.height = 150;
      sigCtx.lineWidth = 3; sigCtx.lineCap = 'round'; sigCtx.strokeStyle = '#000';
      const mp = e => { const r = sigCanvas.getBoundingClientRect(); return { x: e.clientX - r.left, y: e.clientY - r.top }; };
      const tp = e => { const r = sigCanvas.getBoundingClientRect(); return { x: e.touches[0].clientX - r.left, y: e.touches[0].clientY - r.top }; };
      sigCanvas.addEventListener('mousedown', e => { isDrawing = true; const p = mp(e); sigCtx.beginPath(); sigCtx.moveTo(p.x, p.y); });
      sigCanvas.addEventListener('mousemove', e => { if (!isDrawing) return; const p = mp(e); sigCtx.lineTo(p.x, p.y); sigCtx.stroke(); });
      sigCanvas.addEventListener('mouseup', () => isDrawing = false);
      sigCanvas.addEventListener('mouseout', () => isDrawing = false);
      sigCanvas.addEventListener('touchstart', e => { e.preventDefault(); isDrawing = true; const p = tp(e); sigCtx.beginPath(); sigCtx.moveTo(p.x, p.y); }, { passive: false });
      sigCanvas.addEventListener('touchmove', e => { if (!isDrawing) return; e.preventDefault(); const p = tp(e); sigCtx.lineTo(p.x, p.y); sigCtx.stroke(); }, { passive: false });
      sigCanvas.addEventListener('touchend', () => isDrawing = false);
    }
    function clearSignature() { if (sigCtx && sigCanvas) sigCtx.clearRect(0, 0, sigCanvas.width, sigCanvas.height); }
    function isCanvasBlank() { const b = document.createElement('canvas'); b.width = sigCanvas.width; b.height = sigCanvas.height; return sigCanvas.toDataURL() === b.toDataURL(); }

    async function updateJob() {
      if (!currentJobId) return;
      const btn = document.getElementById('update-btn');
      btn.textContent = '保存中...'; btn.disabled = true;
      const sm = { estimated: 'pending', scheduled: 'confirmed', completed: 'completed', lost: 'lost' };
      const payload = {
        job_name: document.getElementById('job_name').value.trim() || undefined,
        customer_name: document.getElementById('customer_name').value.trim() || undefined,
        address: document.getElementById('address').value.trim() || undefined,
        work_date: document.getElementById('work_date').value.trim() || undefined,
        notes: document.getElementById('notes').value.trim() || undefined,
        price_total: Number(document.getElementById('price_total').value) || undefined,
        status: sm[document.getElementById('status').value] || 'pending',
        job_type: document.getElementById('job_type').value || 'other',
        pipeline_stage: document.getElementById('pipeline_stage').value || 'inquiry',
      };
      if (!isCanvasBlank()) payload.signature_data = sigCanvas.toDataURL('image/png');
      Object.keys(payload).forEach(k => payload[k] === undefined && delete payload[k]);
      try {
        await RyubeeAPI.updateJob(currentJobId, payload);
        await fetchJobList();
        document.getElementById('drawer-title').textContent = payload.job_name || '案件詳細';
        showToast('✅ 保存しました');
      } catch (e) { alert('更新に失敗しました：' + e.message); }
      finally { btn.textContent = '更新を保存する'; btn.disabled = false; }
    }

    async function deleteJob() {
      if (!currentJobId) return;
      if (!confirm('この案件を削除してもよろしいですか？')) return;
      try { await RyubeeAPI.deleteJob(currentJobId); closeDetail(); await fetchJobList(); showToast('🗑 削除しました'); }
      catch (e) { alert('削除に失敗しました：' + e.message); }
    }

    function showToast(msg) {
      const t = document.createElement('div');
      t.textContent = msg;
      t.style.cssText = 'position:fixed;bottom:90px;left:50%;transform:translateX(-50%);background:#34C759;color:#fff;padding:10px 20px;border-radius:20px;font-weight:600;z-index:9999;';
      document.body.appendChild(t); setTimeout(() => t.remove(), 2500);
    }
  </script>
</body>

</html>
