<!DOCTYPE html>
<html lang="ja">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>案件一覧｜立米AI Ryu兵衛</title>
  <link rel="stylesheet" href="assets/css/style.css">
  <style>
    .header-fixed {
      position: sticky;
      top: 0;
      background: var(--surface-color);
      z-index: 100;
      box-shadow: var(--shadow-sm);
      padding: 16px 20px 8px;
    }

    .header-fixed h1 {
      font-size: 1.2rem;
      margin: 0 0 12px 0;
    }

    /* 検索・絞り込み */
    .search-box {
      display: flex;
      gap: 8px;
      margin-bottom: 8px;
    }

    .search-input {
      flex: 1;
      padding: 8px 12px;
      border-radius: 20px;
      border: 1px solid var(--border-color);
      background: var(--bg-color);
      font-size: 0.95rem;
    }

    /* 案件カードリスト */
    #jobs-list {
      padding-top: 16px;
    }

    .job-card {
      background: var(--surface-color);
      border-radius: var(--border-radius-lg);
      padding: 16px;
      margin-bottom: 12px;
      box-shadow: var(--shadow-sm);
      position: relative;
      cursor: pointer;
      -webkit-tap-highlight-color: transparent;
    }

    .job-card:active {
      background-color: #f5f5f5;
    }

    .job-card-header {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      margin-bottom: 8px;
    }

    .job-title {
      font-size: 1.1rem;
      font-weight: 600;
      color: var(--text-main);
      margin: 0;
    }

    .job-date {
      font-size: 0.8rem;
      color: var(--text-muted);
    }

    .job-body {
      display: flex;
      gap: 16px;
      margin-bottom: 12px;
    }

    .job-metric {
      flex: 1;
    }

    .job-metric-label {
      font-size: 0.75rem;
      color: var(--text-muted);
      margin-bottom: 2px;
    }

    .job-metric-val {
      font-size: 1.2rem;
      font-weight: bold;
      color: var(--primary);
    }

    .job-footer {
      border-top: 1px dashed var(--border-color);
      padding-top: 8px;
      font-size: 0.85rem;
      color: var(--text-muted);
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    /* === 案件詳細スライドモーダル === */
    #detail-drawer {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background: var(--bg-color);
      z-index: 2000;
      transform: translateX(100%);
      transition: transform 0.3s cubic-bezier(0.25, 0.8, 0.25, 1);
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    #detail-drawer.open {
      transform: translateX(0);
    }

    .drawer-header {
      background: var(--surface-color);
      padding: 16px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      border-bottom: 1px solid var(--border-color);
      box-shadow: var(--shadow-sm);
      z-index: 10;
    }

    .drawer-back-btn {
      background: none;
      border: none;
      font-size: 1.2rem;
      color: var(--primary);
      padding: 8px;
      cursor: pointer;
    }

    .drawer-title {
      font-size: 1.1rem;
      font-weight: 600;
      margin: 0;
    }

    .drawer-content {
      flex: 1;
      overflow-y: auto;
      padding: 20px 16px 100px;
    }

    .pdf-btn {
      width: 100%;
      background: #E8F5E9;
      color: #2E7D32;
      border: 1px solid #C8E6C9;
      padding: 12px;
      border-radius: var(--border-radius-md);
      font-weight: bold;
      text-align: center;
      margin-bottom: 20px;
      display: flex;
      justify-content: center;
      align-items: center;
      gap: 8px;
      text-decoration: none;
    }

    .pdf-btn:active {
      background: #C8E6C9;
    }

    .section-title {
      font-size: 0.9rem;
      color: var(--text-muted);
      margin: 24px 0 8px 4px;
      text-transform: uppercase;
    }
  </style>
</head>

<body>

  <!-- 固定ヘッダー（一覧画面） -->
  <div class="header-fixed">
    <h1>📁 案件一覧</h1>
    <div class="search-box">
      <input type="text" id="search-input" class="search-input" placeholder="現場名・お客様名で検索..." oninput="filterJobs()">
    </div>
  </div>

  <div class="container" id="jobs-container">
    <p id="jobs-status" class="text-center small-text mt-2">読み込み中...</p>
    <div id="jobs-list">
      <!-- カードがJSで挿入される -->
    </div>
  </div>

  <!-- ボトムナビゲーション -->
  <div class="bottom-nav">
    <a href="index.html" class="nav-item">
      <div class="nav-icon">🏠</div>
      <span>ホーム</span>
    </a>
    <a href="volume.html" class="nav-item">
      <div class="nav-icon">📸</div>
      <span>カメラ見積</span>
    </a>
    <a href="jobs.html" class="nav-item active">
      <div class="nav-icon">📁</div>
      <span>案件一覧</span>
    </a>
  </div>

  <!-- ===============================
       案件詳細 ドロワー（スライドメニュー） 
       =============================== -->
  <div id="detail-drawer">
    <div class="drawer-header">
      <button class="drawer-back-btn" onclick="closeDetail()"><i style="font-style:normal;">‹ 戻る</i></button>
      <h3 class="drawer-title" id="drawer-title">案件詳細</h3>
      <div style="width: 40px;"></div><!-- バランス用 -->
    </div>

    <div class="drawer-content">
      <a href="#" target="_blank" id="pdf-link" class="pdf-btn">
        <span style="font-size: 1.2rem;">📄</span> 作業書PDFを出力
      </a>

      <div class="card">
        <h3 class="card-title">基本情報編集</h3>

        <div class="form-group">
          <label>現場名（案件名）</label>
          <input type="text" id="job_name">
        </div>

        <div class="form-group">
          <label>お客様名</label>
          <input type="text" id="customer_name">
        </div>

        <div class="form-group">
          <label>住所</label>
          <input type="text" id="address">
        </div>

        <div class="d-flex gap-2">
          <div class="form-group flex-1" style="width:50%;">
            <label>作業日</label>
            <input type="date" id="work_date">
          </div>
          <div class="form-group flex-1" style="width:50%;">
            <label>時間帯</label>
            <input type="text" id="work_time" placeholder="10:00~">
          </div>
        </div>

        <div class="d-flex gap-2">
          <div class="form-group flex-1" style="width:50%;">
            <label>見積金額(円)</label>
            <input type="number" id="price_total">
          </div>
          <div class="form-group flex-1" style="width:50%;">
            <label>作業員数</label>
            <input type="number" id="workers">
          </div>
        </div>

        <div class="form-group">
          <label>備考</label>
          <textarea id="notes" placeholder="注意事項などを入力..."></textarea>
        </div>

        <button class="btn btn-primary" onclick="updateJob()" id="update-btn">更新を保存する</button>
      </div>

      <!-- AI解析結果の表示領域 -->
      <div class="section-title">AI立米解析結果</div>
      <div class="card" id="ai-summary-area">
        <!-- JSで展開 -->
      </div>
    </div>
  </div>

  <script src="assets/js/utils.js"></script>
  <script src="assets/js/api.js"></script>
  <script>
    let allJobs = [];         // 取得した全案件
    let currentJobId = null;  // 選択中の案件ID

    document.addEventListener('DOMContentLoaded', async () => {
      await fetchJobList();

      // URLパラメータにidがある場合は、その詳細を自動で開く
      const urlParams = new URLSearchParams(window.location.search);
      const targetId = urlParams.get('id');
      if (targetId) {
        openDetail(targetId);
        // パラメータを消す場合
        // window.history.replaceState({}, document.title, window.location.pathname);
      }
    });

    // 案件一覧の取得と描画
    async function fetchJobList() {
      const statusEl = document.getElementById('jobs-status');

      try {
        statusEl.textContent = "読み込み中...";
        statusEl.style.display = 'block';

        allJobs = await api.getJobs();

        if (!Array.isArray(allJobs) || allJobs.length === 0) {
          statusEl.textContent = "案件がありません。";
          return;
        }

        statusEl.style.display = 'none';

        // 取得日が新しい順にソートする（API側でソート済みの場合は不要）
        allJobs.sort((a, b) => new Date(b.created_at) - new Date(a.created_at));

        renderJobs(allJobs);

      } catch (e) {
        statusEl.textContent = "取得に失敗しました。再読み込みしてください。";
        console.error(e);
      }
    }

    // 検索フィルター
    function filterJobs() {
      const query = document.getElementById('search-input').value.toLowerCase();
      const filtered = allJobs.filter(j => {
        const name = (j.job_name || "").toLowerCase();
        const cust = (j.customer_name || "").toLowerCase();
        const addr = (j.address || "").toLowerCase();
        return name.includes(query) || cust.includes(query) || addr.includes(query);
      });
      renderJobs(filtered);
    }

    // カード一覧の描画
    function renderJobs(jobs) {
      const listEl = document.getElementById('jobs-list');
      listEl.innerHTML = '';

      if (jobs.length === 0) {
        listEl.innerHTML = '<p class="text-center small-text">見つかりませんでした。</p>';
        return;
      }

      jobs.forEach(j => {
        const dateStr = utils.formatDateTime(j.created_at).split(' ')[0];
        const title = j.job_name || `案件 ${j.job_id.slice(0, 6)}...`;
        const vol = j.total_volume_m3 != null ? `${j.total_volume_m3} ㎥` : "-";
        const price = j.price_total != null ? `${Number(j.price_total).toLocaleString()} 円` : "-";

        // 作業日がある場合はバッジを表示するなど工夫可能
        const workDateStr = j.work_date ? `作業日: ${j.work_date}` : "作業日: 未定";

        const card = document.createElement('div');
        card.className = 'job-card';
        card.onclick = () => openDetail(j.job_id);

        card.innerHTML = `
          <div class="job-card-header">
            <h3 class="job-title">${utils.escapeHtml(title)}</h3>
            <span class="job-date">${dateStr}</span>
          </div>
          
          <div class="job-body">
            <div class="job-metric">
              <div class="job-metric-label">立米(ai)</div>
              <div class="job-metric-val">${vol}</div>
            </div>
            <div class="job-metric">
              <div class="job-metric-label">見積金額</div>
              <div class="job-metric-val" style="color:var(--text-main);">${price}</div>
            </div>
          </div>
          
          <div class="job-footer">
            <span>${utils.escapeHtml(j.customer_name || 'お客様名未設定')}</span>
            <span class="badge ${j.work_date ? 'badge-primary' : ''}">${workDateStr}</span>
          </div>
        `;
        listEl.appendChild(card);
      });
    }

    // === 詳細・編集（ドロワー）処理 ===

    async function openDetail(jobId) {
      currentJobId = jobId;
      const drawer = document.getElementById('detail-drawer');
      drawer.classList.add('open');

      // データ取得前にとりあえず手持ちのデータを表示するか、
      // 常に最新をAPIから取ってくるか
      const localData = allJobs.find(j => j.job_id === jobId) || {};

      document.getElementById('drawer-title').textContent = localData.job_name || "案件詳細";

      // フォームリセット
      document.getElementById('job_name').value = "読込中...";

      try {
        const jobDetail = await api.getJobDetail(jobId);
        fillForm(jobDetail);
        renderAiSummary(jobDetail.ai_result);

        // 作業書PDFリンクのセット
        const pdfLink = document.getElementById('pdf-link');
        pdfLink.href = api.getWorksheetUrl(jobId);

      } catch (e) {
        alert("詳細データの取得に失敗しました");
        closeDetail();
      }
    }

    function closeDetail() {
      document.getElementById('detail-drawer').classList.remove('open');
      currentJobId = null;
    }

    function fillForm(job) {
      document.getElementById('drawer-title').textContent = job.job_name || "案件詳細";
      document.getElementById("job_name").value = job.job_name || "";
      document.getElementById("customer_name").value = job.customer_name || "";
      document.getElementById("address").value = job.address || "";
      document.getElementById("work_date").value = job.work_date || "";
      document.getElementById("work_time").value = job.work_time || "";
      document.getElementById("price_total").value = job.price_total != null ? job.price_total : "";
      document.getElementById("workers").value = job.workers != null ? job.workers : "";
      document.getElementById("notes").value = job.notes || "";
    }

    function renderAiSummary(ai) {
      const container = document.getElementById("ai-summary-area");
      if (!ai) {
        container.innerHTML = "<p class='small-text text-center'>AI結果が存在しません。</p>";
        return;
      }

      let html = `<div style="text-align:center; margin-bottom:12px;">
        <span style="font-size:0.85rem; color:var(--text-muted);">総立米</span><br>
        <span style="font-size:2rem; font-weight:bold; color:var(--primary);">${ai.total_volume_m3 ?? "-"} ㎥</span>
      </div>`;

      if (Array.isArray(ai.items) && ai.items.length > 0) {
        html += `<table style="width:100%; border-collapse:collapse; font-size:0.9rem;">`;
        html += `<tr style="border-bottom:1px solid #ccc;"><th style="text-align:left; padding:4px;">品目</th><th style="padding:4px;">量</th><th style="text-align:right; padding:4px;">立米</th></tr>`;
        for (const item of ai.items) {
          html += `<tr style="border-bottom:1px solid #eee;">
            <td style="padding:6px 4px;">${utils.escapeHtml(item.category)}</td>
            <td style="text-align:center; padding:6px 4px;">${item.quantity ?? ""}</td>
            <td style="text-align:right; padding:6px 4px;">${item.volume_total_m3 ?? ""}</td>
          </tr>`;
        }
        html += `</table>`;
      }
      container.innerHTML = html;
    }

    async function updateJob() {
      if (!currentJobId) return;

      const btn = document.getElementById('update-btn');
      btn.textContent = "保存中...";
      btn.disabled = true;

      const payload = {};
      const jobName = document.getElementById("job_name").value.trim();
      const customerName = document.getElementById("customer_name").value.trim();
      const address = document.getElementById("address").value.trim();
      const workDate = document.getElementById("work_date").value.trim();
      const workTime = document.getElementById("work_time").value.trim();
      const priceTotal = document.getElementById("price_total").value.trim();
      const workers = document.getElementById("workers").value.trim();
      const notes = document.getElementById("notes").value.trim();

      if (jobName) payload.job_name = jobName;
      if (customerName) payload.customer_name = customerName;
      if (address) payload.address = address;
      if (workDate) payload.work_date = workDate;
      if (workTime) payload.work_time = workTime;
      if (priceTotal) payload.price_total = Number(priceTotal);
      if (workers) payload.workers = Number(workers);
      if (notes) payload.notes = notes;

      try {
        await api.saveJob(currentJobId, payload);
        alert("案件情報を更新しました");

        // 一覧を再取得してリストを更新（裏側で）
        await fetchJobList();
        document.getElementById('drawer-title').textContent = jobName;

      } catch (e) {
        alert("更新に失敗しました：" + e.message);
      } finally {
        btn.textContent = "更新を保存する";
        btn.disabled = false;
      }
    }
  </script>
</body>

</html>
